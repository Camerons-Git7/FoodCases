<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔴 Twitch 🔴</title>
    <style type="text/css">
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #twitch-embed { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="twitch-embed"></div>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script type="text/javascript">
        const options = {
            width: '100%',
            height: '100%',
            channel: 'joe_bartolozzi',
            // video: '0123456789', // use this instead of channel if you want a VOD
            parent: [
                'menist.free.nf',
                'www.menist.free.nf',
                'localhost',
                '127.0.0.1'
            ],
            autoplay: true,
            muted: false // Ensure this is false
        };
        const player = new Twitch.Embed("twitch-embed", options);

        player.addEventListener(Twitch.Embed.READY, () => {
            // Set volume to 100% (1.0)
            player.setVolume(1.0);
            player.setMuted(false);
        });

        // Optional: protect against very late loads or weird timing
        setTimeout(() => {
            if (player.getVolume && player.setVolume) {
                try {
                    player.setVolume(1.0);
                    player.setMuted(false);
                } catch(e) {}
            }
        }, 4000);
    </script>
</body>
</html>
