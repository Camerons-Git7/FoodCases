<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Only My Son</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
      display: none;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="gameframe"></iframe>

<div id="error"></div>

<script>
const GAME_URL = "https://raw.githubusercontent.com/Camerons-Git7/FoodCases/master/only-my-son/index.html";

async function start() {
  const frame = document.getElementById('gameframe');
  const errDiv = document.getElementById('error');

  try {
    const resp = await fetch(GAME_URL);
    if (!resp.ok) {
      throw new Error(`GitHub responded ${resp.status} — maybe rate limit or file moved`);
    }

    const text = await resp.text();

    const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    frame.src = blobUrl;
    setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);

  } catch (err) {
    errDiv.style.display = 'flex';
    errDiv.innerHTML = `
      <strong>Failed to load game</strong><br><br>
      ${err.message}<br><br>
      • Check your internet<br>
      • GitHub may be throttling<br>
      • File might have been removed/renamed<br><br>
      Size hint: original file is ~36 MB — large downloads can fail on slow/unstable connections.
    `;
    console.error(err);
  }
}

start();
</script>

</body>
</html>
