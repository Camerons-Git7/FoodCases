<!DOCTYPE html>
<html>
<head>
<title>Browser</title>
<link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
<style type="text/css">
  /* Reset default body and html margins/paddings */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* Hide scrollbars on the main page */
  }

  /* Style the iframe to cover the full page */
  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none; /* Remove default iframe border */
    display: block; /* Iframes are inline by default */
  }
</style>
</head>
<body>

<!-- The iframe element -->
<iframe src="https://www.watchparty.me/watch/mindless-afternoon-undergo" title="Browser">
</iframe>

</body>
</html>
