<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  
  <style type="text/css">
    /* Reset default margins/paddings */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    iframe {
      position: fixed;     /* better than absolute in most cases */
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<iframe 
  src="https://www.watchparty.me/watch/impolite-letters-bind"
  title="Browser"
  
  <!-- Most permissive sandbox possible in 2025–2026 -->
  sandbox="allow-downloads
           allow-forms
           allow-modals
           allow-orientation-lock
           allow-pointer-lock
           allow-popups
           allow-popups-to-escape-sandbox
           allow-presentation
           allow-same-origin
           allow-scripts
           allow-storage-access-by-user-activation
           allow-top-navigation
           allow-top-navigation-by-user-activation"
  
  <!-- Very permissive permissions policy (formerly Feature Policy) -->
  allow="accelerometer *;
         autoplay *;
         camera *;
         clipboard-read *;
         clipboard-write *;
         display-capture *;
         document-domain *;
         encrypted-media *;
         fullscreen *;
         gamepad *;
         geolocation *;
         gyroscope *;
         keyboard-map *;
         magnetometer *;
         microphone *;
         midi *;
         payment *;
         picture-in-picture *;
         publickey-credentials-get *;
         screen-wake-lock *;
         sync-xhr *;
         usb *;
         xr-spatial-tracking *;
         xr *;"
  
  referrerpolicy="no-referrer-when-downgrade"
  loading="eager"
></iframe>

</body>
</html>
