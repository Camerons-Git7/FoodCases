<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🧱 Droppy Merge 🧱</title>
<link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
<style>
  body { margin:0; background:#222; user-select:none; -webkit-user-select:none; }
  #game-container { width:100vw; height:100vh; position:relative; overflow:hidden; background:#111; }
  canvas { display:block; width:100vw !important; height:100vh !important; }
  #gameover-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 100;
  }
  #gameover-overlay button {
    margin-top: 30px;
    padding: 14px 32px;
    font-size: 24px;
    font-weight: bold;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #gameover-overlay button:hover {
    background: #ff6666;
  }
</style>
</head>
<body>
<div id="game-container"></div>
<div id="gameover-overlay">
  <div id="gameover-text" style="font-size:64px; color:#ff4444; margin-bottom:20px;">GAME OVER</div>
  <button id="try-again-btn">Try Again</button>
</div>

<script>
(() => {
  const FULL_WIDTH  = window.innerWidth;
  const FULL_HEIGHT = window.innerHeight;
  const COLS = 5;
  const ROWS = 7;
  const PADDING = 40;
  const maxTileWidth  = (FULL_WIDTH  - PADDING*2) / COLS;
  const maxTileHeight = (FULL_HEIGHT - PADDING*2 - 80) / ROWS;
  const TILE_SIZE = Math.floor(Math.min(maxTileWidth, maxTileHeight));
  const OFFSET_X = (FULL_WIDTH  - COLS * TILE_SIZE) / 2;
  const OFFSET_Y = 60;

  const DROP_SPEED = 1000;

  const config = {
    type: Phaser.AUTO,
    width: FULL_WIDTH,
    height: FULL_HEIGHT,
    backgroundColor: '#111',
    parent: 'game-container',
    scene: { preload, create, update }
  };

  let game = new Phaser.Game(config);

  let grid = [];
  let currentTile = null;
  let isDropping = false;
  let score = 0;
  let scoreText;
  let inputEnabled = true;

  function preload() {}

  function create() {
    const scene = this;

    grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));

    // Background grid
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = OFFSET_X + c * TILE_SIZE + TILE_SIZE/2;
        const y = OFFSET_Y + r * TILE_SIZE + TILE_SIZE/2;
        scene.add.rectangle(x, y, TILE_SIZE-6, TILE_SIZE-6, 0x222222)
          .setStrokeStyle(2, 0x555555);
      }
    }

    scoreText = scene.add.text(10, 10, 'Score: 0', {
      fontSize: `${Math.floor(TILE_SIZE/3)}px`,
      fill: '#eeeeee',
      fontFamily: 'Arial',
      fontWeight: 'bold'
    }).setOrigin(0,0);

    spawnNewTile(scene);

    scene.input.keyboard.on('keydown-LEFT',  () => { if (inputEnabled && !isDropping) moveTile(-1); });
    scene.input.keyboard.on('keydown-RIGHT', () => { if (inputEnabled && !isDropping) moveTile( 1); });
    scene.input.keyboard.on('keydown-DOWN',  () => { if (inputEnabled && !isDropping) dropTile(scene); });
    scene.input.on('pointerdown',            () => { if (inputEnabled && !isDropping) dropTile(scene); });

    // Try Again button
    document.getElementById('try-again-btn').onclick = () => {
      window.location.reload();
    };
  }

  function update() {}

  function numberToColor(n) {
    const colors = {
       2:0xeee4da,   4:0xede0c8,   8:0xf2b179,  16:0xf59563,  32:0xf67c5f,  64:0xf65e3b,
     128:0xedcf72, 256:0xedcc61, 512:0xedc850,1024:0xedc53f,2048:0xedc22e,
    };
    return colors[n] || 0x3c3a32;
  }

  function getTextColor(n) {
    return n <= 4 ? '#776e65' : '#f9f6f2';
  }

  function spawnNewTile(scene) {
    let startCol = Math.floor(COLS / 2);
    const x = OFFSET_X + startCol * TILE_SIZE + TILE_SIZE/2;
    const y = OFFSET_Y - TILE_SIZE;

    let num = (Math.random() < 0.8) ? 2 : (Math.random() < 0.75) ? 4 : 8;

    let cont = scene.add.container(x, y);
    let rect = scene.add.rectangle(0,0, TILE_SIZE-16, TILE_SIZE-16, numberToColor(num))
      .setStrokeStyle(3, 0xbbada0);
    let textSize = Math.floor(TILE_SIZE / 2);
    let text = scene.add.text(0,0, num, {
      fontFamily:'Arial', fontSize:`${textSize}px`, fontWeight:'bold', color:'#776e65'
    }).setOrigin(0.5);

    cont.add([rect, text]);
    cont.number = num;
    cont.col = startCol;
    cont.row = -1;

    currentTile = cont;
    isDropping = false;
  }

  function moveTile(dir) {
    if (!currentTile) return;
    let nc = currentTile.col + dir;
    if (nc < 0 || nc >= COLS) return;
    currentTile.col = nc;
    const nx = OFFSET_X + nc * TILE_SIZE + TILE_SIZE/2;
    currentTile.scene.tweens.add({
      targets: currentTile,
      x: nx,
      duration: 150,
      ease: 'Power2'
    });
  }

  function dropTile(scene) {
    if (!currentTile) return;
    isDropping = true;
    inputEnabled = false;

    const col = currentTile.col;

    let row = ROWS - 1;
    while (row >= 0 && grid[row][col] !== null) row--;

    if (row < 0) row = 0; // fallback (shouldn't happen)

    const targetY = OFFSET_Y + row * TILE_SIZE + TILE_SIZE/2;
    const distance = targetY - currentTile.y;
    const duration = Math.max(300, (distance / DROP_SPEED) * 1000);

    scene.tweens.add({
      targets: currentTile,
      y: targetY,
      duration,
      ease: 'Linear',
      onComplete: () => {
        currentTile.row = row;
        grid[row][col] = currentTile;

        afterDropMergeSequence(scene, col, row).then(() => {
          // Special check: if landed in top row AND no merge happened anywhere
          if (row === 0 && !wasAnyMergePerformedThisTurn) {
            gameOver(scene);
            return;
          }

          if (isGridFull()) {
            gameOver(scene);
          } else {
            spawnNewTile(scene);
            isDropping = false;
            inputEnabled = true;
          }
        });
      }
    });
  }

  let wasAnyMergePerformedThisTurn = false; // reset per drop

  async function afterDropMergeSequence(scene, startCol, startRow) {
    wasAnyMergePerformedThisTurn = false;

    // Vertical merge in landing column
    if (await mergeVerticalInColumn(scene, startCol)) {
      wasAnyMergePerformedThisTurn = true;
    }

    let changed = true;
    while (changed) {
      changed = false;

      for (let r = 0; r < ROWS; r++) {
        if (await mergeHorizontalInRow(scene, r)) {
          changed = true;
          wasAnyMergePerformedThisTurn = true;
        }
      }

      if (changed) {
        await dropDownAllAboveGaps(scene);
      }

      if (changed) {
        for (let c = 0; c < COLS; c++) {
          if (await mergeVerticalInColumn(scene, c)) {
            changed = true;
            wasAnyMergePerformedThisTurn = true;
          }
        }
      }
    }
  }

  async function mergeVerticalInColumn(scene, col) {
    let mergedSomething = false;

    for (let r = ROWS - 2; r >= 0; r--) {
      const lower = grid[r+1][col];
      const upper = grid[r  ][col];

      if (upper && lower && upper.number === lower.number) {
        await mergeTwoTiles(scene, lower, upper, 'vertical');
        grid[r][col] = null;
        grid[r+1][col] = lower;
        lower.number *= 2;
        lower.row = r+1;
        updateTileVisual(lower);

        score += lower.number;
        scoreText.setText(`Score: ${score}`);
        mergedSomething = true;

        await dropDownColumn(scene, col);
        r = ROWS - 1; // rescan column
      }
    }
    return mergedSomething;
  }

  async function mergeHorizontalInRow(scene, row) {
    let merged = false;
    let c = 0;
    while (c < COLS-1) {
      const a = grid[row][c];
      const b = grid[row][c+1];
      if (a && b && a.number === b.number) {
        await mergeTwoTiles(scene, a, b, 'horizontal');
        grid[row][c+1] = null;
        grid[row][c].number *= 2;
        updateTileVisual(grid[row][c]);
        score += grid[row][c].number;
        scoreText.setText(`Score: ${score}`);
        merged = true;
        c++;
      } else {
        c++;
      }
    }
    return merged;
  }

  function mergeTwoTiles(scene, keep, remove, direction) {
    return new Promise(res => {
      scene.tweens.add({
        targets: remove,
        x: keep.x,
        y: keep.y,
        scale: 0.1,
        alpha: 0,
        duration: 280,
        ease: 'Power2',
        onComplete: () => {
          remove.list.forEach(child => child.destroy());
          remove.destroy();
          res();
        }
      });
    });
  }

  function updateTileVisual(tile) {
    if (!tile) return;
    let rect = tile.list.find(c => c.type === 'Rectangle');
    let text = tile.list.find(c => c.type === 'Text');
    if (rect) rect.fillColor = numberToColor(tile.number);
    if (text) {
      text.setText(tile.number);
      text.setColor(getTextColor(tile.number));
    }
  }

  async function dropDownColumn(scene, col) {
    for (let r = ROWS - 2; r >= 0; r--) {
      if (grid[r][col] !== null && grid[r+1][col] === null) {
        let fallTo = r + 1;
        while (fallTo < ROWS - 1 && grid[fallTo + 1][col] === null) fallTo++;
        if (fallTo > r) {
          const tile = grid[r][col];
          grid[r][col] = null;
          grid[fallTo][col] = tile;
          tile.row = fallTo;
          const ty = OFFSET_Y + fallTo * TILE_SIZE + TILE_SIZE/2;
          await new Promise(res => {
            scene.tweens.add({
              targets: tile,
              y: ty,
              duration: 220,
              ease: 'Bounce.easeOut',
              onComplete: res
            });
          });
        }
      }
    }
  }

  async function dropDownAllAboveGaps(scene) {
    for (let c = 0; c < COLS; c++) await dropDownColumn(scene, c);
  }

  function isGridFull() {
    for (let c = 0; c < COLS; c++) {
      if (grid[0][c] === null) return false;
    }
    return true;
  }

  function gameOver(scene) {
    inputEnabled = false;
    isDropping = true;

    const overlay = document.getElementById('gameover-overlay');
    overlay.style.display = 'flex';

    // Optional: darken or tint the canvas (Phaser way)
    scene.cameras.main.setTint(0x333333);
  }

})();
</script>
</body>
</html>
