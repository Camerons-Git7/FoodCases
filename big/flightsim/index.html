<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Flight Simulator ✈️</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    body { margin:0; height:100vh; background:#000; }
    iframe { width:100%; height:100%; border:none; display:block; }
    #loading { position:fixed; inset:0; background:#111; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
  </style>
</head>
<body>
<div id="loading">
  <div>Loading Game...</div>
  <div style="margin-top:12px; opacity:0.7;">Please Wait — Loading May Take Up To 1 Minute</div>
</div>

<iframe src="https://raw.githack.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/3Dflightsimulator.html" onload="document.getElementById('loading').style.display='none'"></iframe>
</body>
</html>
