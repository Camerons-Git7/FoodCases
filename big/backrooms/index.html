<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✈️ Flight Simulator ✈️</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 999;
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Flight Simulator...</div>
  <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
</div>

<iframe id="gameframe" style="display:none;"></iframe>

<div id="error" style="display:none;"></div>

<script>
const GAME_URL = "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/3Dflightsimulator.html";

async function start() {
  const loading = document.getElementById('loading');
  const frame = document.getElementById('gameframe');
  const errDiv = document.getElementById('error');

  try {
    const resp = await fetch(GAME_URL);
    if (!resp.ok) {
      throw new Error(`GitHub responded ${resp.status} — maybe rate limit, file moved, or doesn't exist`);
    }

    const text = await resp.text();

    // Create blob URL from the fetched HTML content
    const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    frame.src = blobUrl;
    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
      // Clean up blob URL after some time to free memory
      setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);
    };

  } catch (err) {
    loading.style.display = 'none';
    errDiv.style.display = 'flex';
    errDiv.innerHTML = `
      <strong>Failed to load 3D Flight Simulator</strong><br><br>
      ${err.message}<br><br>
      • Check your internet connection<br>
      • GitHub may be rate-limiting your IP<br>
      • The file might have been renamed, moved or removed<br><br>
      Tip: You can also try opening this URL directly:<br>
      <a href="${GAME_URL}" target="_blank" style="color:#4fc3f7;">${GAME_URL}</a>
    `;
    console.error(err);
  }
}

// Start loading immediately
start();
</script>

</body>
</html>
