<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚒️ Minecraft ⚒️</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
      margin: 0 !important;
      padding: 0 !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #111;
      z-index: 999;
      padding-top: 20vh;
    }
    #loading-text {
      text-align: center;
    }
    #download-container {
      position: absolute;
      bottom: 15vh;
      left: 50%;
      transform: translateX(-50%);
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      border: none;
      cursor: pointer;
    }
    .download-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100%;
      min-height: 100%;
      border: none !important;
      position: fixed !important;   /* stronger containment */
      inset: 0 !important;
      background: #000;
    }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-text">
    <div>Loading Game...</div>
    <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
  </div>
  
  <div id="download-container">
    <a href="https://drive.google.com/uc?export=download&id=1uFWzWm1gJ4GuTuUrivmfP_Uf8EBJBR0Q" 
       class="download-btn" 
       download>
      ⬇ Download Cool World File
    </a>
  </div>
</div>

<iframe id="gameframe" style="display:none;"></iframe>

<div id="error" style="display:none;"></div>

<script>
const GAME_URL = "https://cdn.jsdelivr.net/gh/CoolDude2349/Offline-HTML-Games-Pack@master/offline/1.8.html";

async function start() {
  const loading = document.getElementById('loading');
  const frame = document.getElementById('gameframe');
  const errDiv = document.getElementById('error');

  try {
    const resp = await fetch(GAME_URL, { 
      cache: "force-cache"
    });

    if (!resp.ok) {
      throw new Error(`Server responded ${resp.status} — try again later or check connection`);
    }

    const text = await resp.text();

    const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    frame.src = blobUrl;
    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
      setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);
    };

  } catch (err) {
    loading.style.display = 'none';
    errDiv.style.display = 'flex';
    errDiv.innerHTML = `
      <strong>Failed to load game</strong><br><br>
      ${err.message}<br><br>
      • Check internet connection<br>
      • Antivirus / firewall may be blocking<br>
      • Try different network / mobile hotspot<br>
      • jsDelivr / GitHub may be temporarily slow<br><br>
      File size hint: ~36 MB — large files can fail on unstable Wi-Fi
    `;
    console.error(err);
  }
}

start();
</script>

</body>
</html>
