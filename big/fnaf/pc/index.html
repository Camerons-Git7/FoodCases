<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐻 Fnaf 🐻</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
      margin: 0 !important;
      padding: 0 !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #111;
      z-index: 999;
      padding-top: 20vh;
    }
    #loading-text {
      text-align: center;
      margin-bottom: 4rem;
    }
    #download-container {
      position: absolute;
      bottom: 15vh;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100%;
      min-height: 100%;
      border: none !important;
      position: fixed !important;
      inset: 0 !important;
      background: #000;
    }
  </style>
</head>
<body>
<div id="loading">
  <div id="loading-text">
    <div>Loading Game...</div>
    <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute<br>(or type "full" anytime)</div>
  </div>

    <button id="fs-button" class="btn">
      ⛶ Enter Fullscreen (or type "full")
    </button>
  </div>
</div>

<iframe id="gameframe" style="display:none;"></iframe>
<div id="error" style="display:none;"></div>

<script>
const GAME_URL = "https://cdn.jsdelivr.net/gh/CoolDude2349/Offline-HTML-Games-Pack@master/offline/fnaf.html";
const MIN_LOADING_TIME = 2000; // 2 seconds

let keyBuffer = '';
let timeoutId = null;

function enterFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen().catch(() => {});
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.mozRequestFullScreen) {
    elem.mozRequestFullScreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
}

// Listen for typing "full" (case-insensitive) anywhere on page
document.addEventListener('keydown', (e) => {
  // Skip if typing in input/textarea (none here, but future-proof)
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Only collect letter keys (ignore arrows, shift, etc.)
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    keyBuffer += e.key.toLowerCase();

    // Keep only last 10 chars (no need for more)
    if (keyBuffer.length > 10) {
      keyBuffer = keyBuffer.slice(-10);
    }

    // Check if ends with "full"
    if (keyBuffer.endsWith('full')) {
      enterFullscreen();
      keyBuffer = ''; // reset after success
    }

    // Reset buffer after ~2 seconds of no typing
    clearTimeout(timeoutId);
    timeoutId = setTimeout(() => {
      keyBuffer = '';
    }, 2000);
  } else {
    // Non-letter key → reset (prevents partial matches across pauses)
    keyBuffer = '';
    clearTimeout(timeoutId);
  }
});

async function start() {
  const loading  = document.getElementById('loading');
  const frame    = document.getElementById('gameframe');
  const errDiv   = document.getElementById('error');
  const fsButton = document.getElementById('fs-button');

  const startTime = Date.now();

  // Fullscreen button during loading
  fsButton.addEventListener('click', () => {
    enterFullscreen();
    fsButton.style.display = 'none';
  }, { once: true });

  try {
    const resp = await fetch(GAME_URL, { cache: "force-cache" });
    if (!resp.ok) {
      throw new Error(`Server responded ${resp.status}`);
    }
    const text = await resp.text();
    const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);
    
    frame.src = blobUrl;
    
    frame.onload = () => {
      const elapsed = Date.now() - startTime;
      const remaining = MIN_LOADING_TIME - elapsed;

      const hideLoading = () => {
        loading.style.display = 'none';
        frame.style.display = 'block';
        fsButton.style.display = 'none';
        setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);
      };

      if (remaining <= 0) {
        hideLoading();
      } else {
        setTimeout(hideLoading, remaining);
      }
    };
  } catch (err) {
    const elapsed = Date.now() - startTime;
    const remaining = MIN_LOADING_TIME - elapsed;

    const showError = () => {
      loading.style.display = 'none';
      errDiv.style.display = 'flex';
      errDiv.innerHTML = `
        <strong>Failed to load game</strong><br><br>
        ${err.message}<br><br>
        • Check internet connection<br>
        • Antivirus / firewall may be blocking<br>
        • Try different network<br>
        • GitHub/jsDelivr may be slow<br><br>
        File ~36 MB — unstable connection can fail
      `;
      fsButton.style.display = 'none';
      console.error(err);
    };

    if (remaining <= 0) {
      showError();
    } else {
      setTimeout(showError, remaining);
    }
  }
}

start();
</script>
</body>
</html>
