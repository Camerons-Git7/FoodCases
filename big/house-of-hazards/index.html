<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏠 House of Hazards 🏠</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 999;
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
<base target="_blank">
</head>
<body>

<div id="loading">
  <div>Loading Game...</div>
  <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
</div>

<iframe id="gameframe" style="display:none;"></iframe>

<div id="error" style="display:none;"></div>

<script>
  // Block all alert dialogs globally
  window.alert = function() { console.log('[Alert blocked]', arguments); };
  window.confirm = function() { console.log('[Confirm blocked]', arguments); return true; };
  window.prompt = function() { console.log('[Prompt blocked]', arguments); return null; };
</script>

<script>
const GAME_URL = "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/houseofhazards.html";

async function start() {
  const loading = document.getElementById('loading');
  const frame = document.getElementById('gameframe');
  const errDiv = document.getElementById('error');

  try {
    const resp = await fetch(GAME_URL);
    if (!resp.ok) {
      throw new Error(`GitHub responded ${resp.status} — maybe rate limit or file moved`);
    }

    const text = await resp.text();

    // Inject alert blocking into the fetched HTML before creating the blob
    const alertBlocker = `<script>
      window.alert = function() { console.log('[Alert blocked]', arguments); };
      window.confirm = function() { console.log('[Confirm blocked]', arguments); return true; };
      window.prompt = function() { console.log('[Prompt blocked]', arguments); return null; };
    <\/script>`;

    // Insert alert blocker right after the <head> tag or before </head> if no <head>
    let modifiedText = text;
    if (text.includes('<head>')) {
      modifiedText = text.replace('<head>', '<head>' + alertBlocker);
    } else if (text.includes('</head>')) {
      modifiedText = text.replace('</head>', alertBlocker + '</head>');
    } else if (text.includes('<body>')) {
      modifiedText = text.replace('<body>', '<body>' + alertBlocker);
    } else {
      // Fallback: prepend to the very beginning
      modifiedText = alertBlocker + text;
    }

    const blob = new Blob([modifiedText], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    frame.src = blobUrl;
    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
      setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);
    };

  } catch (err) {
    loading.style.display = 'none';
    errDiv.style.display = 'flex';
    errDiv.innerHTML = `
      <strong>Failed to load game</strong><br><br>
      ${err.message}<br><br>
      • Check your internet<br>
      • GitHub may be throttling<br>
      • File might have been removed/renamed<br><br>
      Size hint: original file is ~36 MB — large downloads can fail on slow/unstable connections.
    `;
    console.error(err);
  }
}

start();
</script>

</body>
</html>
