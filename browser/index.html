    <script>
class TabManager{constructor(){this.tabs=[];this.activeTabId=null;this.nextTabId=1;this.sj=null;this.sjReady=false;this.tabBar=document.getElementById('tab-bar');this.contentArea=document.getElementById('browser-content-area');this.addressInput=document.getElementById('uv-address');this.backBtn=document.getElementById('back-btn');this.forwardBtn=document.getElementById('forward-btn');this.reloadBtn=document.getElementById('reload-btn');this.newTabBtn=document.getElementById('new-tab-btn');this.securityIndicator=document.getElementById('security-indicator');this.bookmarkBtn=document.getElementById('bookmark-btn');this.historyBtn=document.getElementById('history-btn');this.historyPanel=document.getElementById('history-panel');this.loadingBar=document.getElementById('loadingbar');this.initScramjet();this.initEventListeners();this.createNewTab()}async initScramjet(){try{const{ScramjetController}=$scramjetLoadController();this.sj=new ScramjetController({files:{wasm:'/scram/scramjet.wasm.wasm',all:'/scram/scramjet.all.js',sync:'/scram/scramjet.sync.js'}});this.sj.init();await registerSW();const connection=new BareMux.BareMuxConnection('/baremux/worker.js');const wispUrl=(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/wisp/';if((await connection.getTransport())!=='/libcurl/index.mjs'){await connection.setTransport('/libcurl/index.mjs',[{websocket:wispUrl}])}this.sjReady=true}catch(e){console.error('Scramjet init failed:',e)}}initEventListeners(){this.newTabBtn.addEventListener('click',()=>this.createNewTab());this.addressInput.addEventListener('keydown',e=>{if(e.key==='Enter')this.navigateActiveTab(this.addressInput.value)});this.addressInput.addEventListener('focus',()=>this.addressInput.select());this.backBtn.addEventListener('click',()=>this.goBack());this.forwardBtn.addEventListener('click',()=>this.goForward());this.reloadBtn.addEventListener('click',()=>this.reloadActiveTab());this.bookmarkBtn.addEventListener('click',()=>this.toggleBookmark());this.historyBtn.addEventListener('click',e=>{e.stopPropagation();this.toggleHistoryPanel()});document.addEventListener('click',e=>{if(!this.historyBtn.contains(e.target)&&!this.historyPanel.contains(e.target)){this.historyPanel.style.display='none'}});document.addEventListener('keydown',e=>{if(e.ctrlKey||e.metaKey){switch(e.key){case't':e.preventDefault();this.createNewTab();break;case'w':e.preventDefault();if(this.tabs.length>1)this.closeTab(this.activeTabId);break;case'r':e.preventDefault();this.reloadActiveTab();break;case'l':e.preventDefault();this.addressInput.focus();break}}})}createNewTab(url=null){const tabId=this.nextTabId++;const tab={id:tabId,title:url?this.getDomainFromUrl(url):'New Tab',url:url||'',favicon:'fa-solid fa-globe',element:null,contentElement:null,iframe:null,history:[],historyIndex:-1,isBookmarked:false};this.tabs.push(tab);this.createTabElement(tab);this.createTabContent(tab);this.switchToTab(tabId);if(url)this.navigateTab(tabId,url);return tabId}createTabElement(tab){const tabElement=document.createElement('div');tabElement.className='tab';tabElement.dataset.tabId=tab.id;tabElement.innerHTML=`<i class="tab-favicon ${tab.favicon}"></i><span class="tab-title">${tab.title}</span><button class="tab-close"><i class="fa-solid fa-times"></i></button>`;tabElement.addEventListener('click',e=>{if(!e.target.closest('.tab-close'))this.switchToTab(tab.id)});tabElement.querySelector('.tab-close').addEventListener('click',e=>{e.stopPropagation();this.closeTab(tab.id)});this.tabBar.insertBefore(tabElement,this.newTabBtn);tab.element=tabElement}createTabContent(tab){const contentElement=document.createElement('div');contentElement.className='tab-content';contentElement.dataset.tabId=tab.id;if(!tab.url){contentElement.innerHTML=`<div class="homepage-content"><h1>luminalOS</h1><p>Browse the web with style</p><div class="quick-links"><a href="#" class="quick-link" onclick="window.tabManager.navigateActiveTab('poki.com'); return false;"><span class="quick-link-icon">??</span><div>Poki</div></a><a href="#" class="quick-link" onclick="window.tabManager.navigateActiveTab('github.com'); return false;"><span class="quick-link-icon">??</span><div>GitHub</div></a><a href="#" class="quick-link" onclick="window.tabManager.navigateActiveTab('duckduckgo.com'); return false;"><span class="quick-link-icon">??</span><div>DuckDuckGo</div></a><a href="#" class="quick-link" onclick="window.tabManager.navigateActiveTab('youtube.com'); return false;"><span class="quick-link-icon">??</span><div>YouTube</div></a></div></div>`}this.contentArea.appendChild(contentElement);tab.contentElement=contentElement}navigateActiveTab(input){if(this.activeTabId)this.navigateTab(this.activeTabId,input)}navigateTab(tabId,input){const tab=this.getTab(tabId);if(!tab||!input.trim())return;let url;const urlPattern=/^(https?:\/\/)?(www\.)?[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)+(\/[a-zA-Z0-9-._~:/?#[\]@!$&'()*+,;=]*)?$/;if(urlPattern.test(input)){url=(!input.startsWith('http://')&&!input.startsWith('https://'))?`https://${input}`:input}else{url=`https://www.bing.com/search?q=${encodeURIComponent(input)}`}this.loadUrlInTab(tabId,url)}async loadUrlInTab(tabId,url,isNavigatingHistory=false){const tab=this.getTab(tabId);if(!tab)return;if(!this.sjReady){await new Promise(resolve=>{const check=setInterval(()=>{if(this.sjReady){clearInterval(check);resolve()}},100)});} tab.url=url;tab.title=this.getDomainFromUrl(url);this.updateTabAppearance(tab);if(this.activeTabId===tabId){this.addressInput.value=url;this.updateSecurityIndicator(url);this.updateBookmarkButton(tab);this.showLoadingBar()}if(!isNavigatingHistory){tab.history=tab.history.slice(0,tab.historyIndex+1);tab.history.push(url);tab.historyIndex++}this.updateNavigationButtons();const frame=this.sj.createFrame();frame.frame.style.width='100%';frame.frame.style.height='100%';frame.frame.style.border='none';tab.contentElement.innerHTML='';tab.contentElement.appendChild(frame.frame);frame.frame.addEventListener('load',()=>{try{const w=frame.frame.contentWindow;w.open=()=>null;w.document.addEventListener('click',e=>{const a=e.target.closest('a');if(a&&a.target==="_blank"){e.preventDefault();e.stopPropagation();frame.go(a.href)}},true)}catch(e){}});tab.iframe=frame.frame;frame.go(url)}showLoadingBar(){this.loadingBar.style.width='10%';this.loadingBar.style.opacity='1';setTimeout(()=>{if(this.loadingBar.style.opacity==='1'){this.loadingBar.style.width='60%'}},100)}hideLoadingBar(){this.loadingBar.style.width='100%';setTimeout(()=>{this.loadingBar.style.opacity='0';setTimeout(()=>{this.loadingBar.style.width='0%'},300)},100)}switchToTab(tabId){if(this.activeTabId){const currentTab=this.getTab(this.activeTabId);if(currentTab){currentTab.element.classList.remove('active');currentTab.contentElement.classList.remove('active');if(this.historyMonitor){clearInterval(this.historyMonitor);this.historyMonitor=null}}}const tab=this.getTab(tabId);if(tab){this.activeTabId=tabId;tab.element.classList.add('active');tab.contentElement.classList.add('active');this.addressInput.value=tab.url||'';this.updateSecurityIndicator(tab.url);this.updateBookmarkButton(tab);this.updateNavigationButtons();this.historyPanel.style.display='none';if(tab.iframe){this.startHistoryMonitor(tab)}}}closeTab(tabId){const tabIndex=this.tabs.findIndex(t=>t.id===tabId);if(tabIndex===-1)return;const tab=this.tabs[tabIndex];if(this.activeTabId===tabId&&this.historyMonitor){clearInterval(this.historyMonitor);this.historyMonitor=null}tab.element.remove();tab.contentElement.remove();this.tabs.splice(tabIndex,1);if(this.activeTabId===tabId){if(this.tabs.length>0){const newActiveIndex=Math.max(0,tabIndex-1);this.switchToTab(this.tabs[newActiveIndex].id)}else{this.createNewTab()}}}startHistoryMonitor(tab){if(this.historyMonitor)clearInterval(this.historyMonitor);this.historyMonitor=setInterval(()=>{try{if(!tab.iframe||!tab.iframe.contentWindow)return;const iframeHref=tab.iframe.contentWindow.location.href;const websitePath=iframeHref.replace(window.location.origin,'').replace('/scram/','');if(websitePath&&websitePath!==''&&websitePath!=='about:blank'){let detectedUrl;try{detectedUrl=ScramjetController.codec.decode(websitePath)}catch(e){return}if(detectedUrl&&detectedUrl!=='about:blank'&&detectedUrl!==tab.url){tab.url=detectedUrl;tab.title=this.getDomainFromUrl(detectedUrl);this.updateTabAppearance(tab);if(this.activeTabId===tab.id){this.addressInput.value=detectedUrl;this.updateSecurityIndicator(detectedUrl)}if(tab.history[tab.historyIndex]!==detectedUrl){tab.history=tab.history.slice(0,tab.historyIndex+1);tab.history.push(detectedUrl);tab.historyIndex++;this.updateNavigationButtons()}}}}catch(e){}},500)}goBack(){const tab=this.getActiveTab();if(tab&&tab.iframe){try{tab.iframe.contentWindow.history.back()}catch(e){}}}goForward(){const tab=this.getActiveTab();if(tab&&tab.iframe){try{tab.iframe.contentWindow.history.forward()}catch(e){}}}reloadActiveTab(){const tab=this.getActiveTab();if(tab&&tab.iframe){const currentSrc=tab.iframe.src;tab.iframe.src=currentSrc}}toggleBookmark(){const tab=this.getActiveTab();if(tab&&tab.url){tab.isBookmarked=!tab.isBookmarked;this.updateBookmarkButton(tab)}}toggleHistoryPanel(){if(this.historyPanel.style.display==='block'){this.historyPanel.style.display='none';return}const tab=this.getActiveTab();if(tab&&tab.history.length>0){this.historyPanel.innerHTML='';tab.history.forEach((url,index)=>{const item=document.createElement('div');item.className='history-item';if(index===tab.historyIndex){item.classList.add('active')}item.textContent=url;item.title=url;item.addEventListener('click',()=>{tab.historyIndex=index;const targetUrl=tab.history[index];this.loadUrlInTab(tab.id,targetUrl,true);this.historyPanel.style.display='none'});this.historyPanel.appendChild(item)});this.historyPanel.style.display='block'}else{this.historyPanel.style.display='none'}}updateNavigationButtons(){const tab=this.getActiveTab();if(tab){this.backBtn.disabled=tab.historyIndex<=0;this.forwardBtn.disabled=tab.historyIndex>=(tab.history.length-1);this.reloadBtn.disabled=!tab.url;this.historyBtn.disabled=tab.history.length===0}else{this.backBtn.disabled=true;this.forwardBtn.disabled=true;this.reloadBtn.disabled=true;this.historyBtn.disabled=true}}updateSecurityIndicator(url){if(!url){this.securityIndicator.innerHTML='';this.securityIndicator.className='security-indicator';return}if(url.startsWith('https://')){this.securityIndicator.innerHTML='<i class="fa-solid fa-lock"></i>';this.securityIndicator.className='security-indicator secure';this.securityIndicator.title='Secure connection'}else if(url.startsWith('http://')){this.securityIndicator.innerHTML='<i class="fa-solid fa-unlock"></i>';this.securityIndicator.className='security-indicator insecure';this.securityIndicator.title='Not secure'}else{this.securityIndicator.innerHTML='<i class="fa-solid fa-globe"></i>';this.securityIndicator.className='security-indicator';this.securityIndicator.title='Local or special URL'}}updateBookmarkButton(tab){const icon=this.bookmarkBtn.querySelector('i');if(tab.isBookmarked){icon.className='fa-solid fa-star';this.bookmarkBtn.style.color='#ffd700'}else{icon.className='fa-regular fa-star';this.bookmarkBtn.style.color='#888'}}updateTabAppearance(tab){const titleElement=tab.element.querySelector('.tab-title');const faviconElement=tab.element.querySelector('.tab-favicon');titleElement.textContent=tab.title||'Untitled';faviconElement.className='tab-favicon fa-solid fa-globe'}getTab(tabId){return this.tabs.find(t=>t.id===tabId)}getActiveTab(){return this.getTab(this.activeTabId)}getDomainFromUrl(url){try{const urlObj=new URL(url.startsWith('http')?url:`https://${url}`);return urlObj.hostname.replace('www.','')}catch(e){return url.length>30?url.substring(0,30)+'...':url}}}document.addEventListener('DOMContentLoaded',()=>{window.tabManager=new TabManager();initJumpscare()});function initJumpscare(){const blockedKeywords=['porn','xxx','xnxx','pornhub','xvideos','nude','nudes','naked','nsfw','sex'
