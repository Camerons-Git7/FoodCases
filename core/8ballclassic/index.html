<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>8ballclassic</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 999;
    }
    #error {
      padding: 20px;
      text-align: center;
      max-width: 90%;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Game...</div>
  <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
</div>

<iframe id="gameframe" style="display:none;"></iframe>

<div id="error" style="display:none;"></div>

<script>
const GAME_URL = "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/8ballclassic.html";

async function start() {
  const loading = document.getElementById('loading');
  const frame = document.getElementById('gameframe');
  const errDiv = document.getElementById('error');

  try {
    const resp = await fetch(GAME_URL);
    if (!resp.ok) {
      throw new Error(`GitHub responded ${resp.status} — maybe rate limit or file moved`);
    }

    const text = await resp.text();

    // This is the key part — same technique your runner uses
    const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    frame.src = blobUrl;
    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
      // Optional: clean up after a delay
      setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);
    };

  } catch (err) {
    loading.style.display = 'none';
    errDiv.style.display = 'flex';
    errDiv.innerHTML = `
      <strong>Failed to load game</strong><br><br>
      ${err.message}<br><br>
      • Check your internet<br>
      • GitHub may be throttling<br>
      • File might have been removed/renamed<br><br>
      Size hint: original file is ~36 MB — large downloads can fail on slow/unstable connections.
    `;
    console.error(err);
  }
}

// Go immediately
start();
</script>

</body>
</html>
