<head>

  <link rel="apple-touch-icon" href="https://i.ibb.co/M5QfsnBW/Playground-Image1.jpg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Seamless Games" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0f0;
      --bg: #000;
      --surface: #050505;
      --button-size: 100px;
      --emoji-size: calc(var(--button-size) * 0.48);
      --text-size: calc(var(--button-size) * 0.18);
      --padding-top: calc(var(--button-size) * 0.114);
      --padding-sides: calc(var(--button-size) * 0.057);
      --padding-bottom: calc(var(--button-size) * 0.04);
      --name-margin: calc(var(--button-size) * 0.015);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
      overflow-x: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.fade-in { opacity: 1; }
    body.fade-out { opacity: 0; }
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }
    #youtube-audio {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -9999;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    }
    .title {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      margin-top: 3rem;
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
    }
    @keyframes textPulse {
      from { text-shadow: 0 0 10px var(--accent); }
      to { text-shadow: 0 0 20px var(--accent), 0 0 30px #0f0; }
    }
    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-input {
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      padding: 0.5rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      width: 250px;
      outline: none;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
      transition: all 0.3s ease;
    }
    .search-input:focus {
      box-shadow: 0 0 25px var(--accent));
      background: rgba(0, 50, 0, 0.9);
    }
    .search-input::placeholder {
      color: rgba(0, 255, 0, 0.5);
    }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 250px;
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
      display: none;
      overflow: hidden;
      z-index: 101;
    }
    .search-dropdown.active {
      display: block;
    }
    .search-result {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(0, 255, 0, 0.2);
    }
    .search-result:last-child {
      border-bottom: none;
    }
    .search-result:hover {
      background: rgba(0, 50, 0, 0.8);
      padding-left: 1.25rem;
    }
    .search-result-emoji {
      font-size: 1.5rem;
      margin-right: 0.75rem;
      filter: drop-shadow(0 0 2px var(--accent));
    }
    .search-result-name {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .no-results {
      padding: 1rem;
      color: rgba(0, 255, 0, 0.6);
      text-align: center;
      font-size: 0.9rem;
    }
    .button-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      width: 95vw;
      margin: 0 auto 4rem;
      flex-wrap: wrap;
    }
    .game-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: var(--button-size);
      height: var(--button-size);
      padding: var(--padding-top) var(--padding-sides) var(--padding-bottom);
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      color: var(--accent);
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: var(--text-size);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
      transition: all 0.3s ease;
      user-select: none;
      text-shadow: none;
    }
    .game-button:hover {
      transform: translateX(10px);
      box-shadow: 0 0 40px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .game-button:active { transform: translateX(5px); }
    .emoji {
      font-size: var(--emoji-size);
      color: var(--accent);
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      line-height: 1;
      filter: drop-shadow(0 0 2px var(--accent));
    }
    .game-name {
      font-size: var(--text-size);
      text-align: center;
      white-space: nowrap;
      width: 100%;
      user-select: none;
      margin-top: var(--name-margin);
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bottom-note {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }
    .mute-button {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 1.5rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 0.8rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      min-height: 50px;
    }
    .mute-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .mute-button:active { transform: scale(0.95); }
    .mute-button.fading { pointer-events: none; opacity: 0.7; }
    .mute-button.holding {
      animation: holdPulse 0.5s infinite alternate;
    }
    @keyframes holdPulse {
      from { box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
      to { box-shadow: 0 0 35px var(--accent), 0 0 50px var(--accent); }
    }
    .request-button {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 1rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      min-height: 50px;
      text-decoration: none;
    }
    .request-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .request-button:active { transform: scale(0.95); }
    @media (max-width: 600px) {
      .header {
        padding: 0.75rem 1rem;
      }
      .search-input {
        width: 180px;
        font-size: 0.9rem;
      }
      .search-dropdown {
        width: 180px;
      }
      .title {
        font-size: 2.5rem;
        margin-top: 4rem;
      }
    }
  </style>
</head>

  <div class="bottom-note">ⓘ Don't Forget to Refresh Before Gameplay To Ensure You're Playing Latest Updates ⓘ</div>
  <button class="mute-button" id="muteBtn" aria-label="Toggle mute">🔈</button>
  <a class="request-button" href="https://forms.gle/tcMZUPfym8Y7zPsm8" target="_blank" rel="noopener noreferrer" aria-label="Request a game">↗ Report Bugs ↗</a>
  <div id="youtube-audio"><div id="yt-player"></div></div>
  <script>
    let ytPlayer, playerReady = false, isMuted = true, volumeFadeInterval = null, hasStartedPlaying = false;
    let isSecretTrack = false;
    let holdTimer = null;
    let isHolding = false;
    const HOLD_DURATION = 5000;
    
    const DEFAULT_VIDEO_ID = 'F0A_R2XV_os';
    const SECRET_VIDEO_ID = 'y-Q15Ul-9ww';
    
    function updateMuteButton() { 
      const btn = document.getElementById('muteBtn'); 
      if (btn) btn.textContent = isMuted ? '🔈' : '🔊'; 
    }
    
    function fadeVolume(targetVolume, duration, callback) {
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) { 
        if (callback) callback(); 
        return; 
      }
      if (volumeFadeInterval) clearInterval(volumeFadeInterval);
      const startVolume = ytPlayer.getVolume() || 0, steps = 30, stepDuration = duration / steps, volumeDiff = targetVolume - startVolume;
      let currentStep = 0;
      const btn = document.getElementById('muteBtn'); 
      if (btn) btn.classList.add('fading');
      volumeFadeInterval = setInterval(() => {
        currentStep++;
        const easeProgress = 1 - Math.pow(1 - (currentStep / steps), 2);
        let newVolume = Math.round(startVolume + (volumeDiff * easeProgress));
        newVolume = Math.max(0, Math.min(100, newVolume));
        ytPlayer.setVolume(newVolume);
        if (currentStep >= steps) { 
          clearInterval(volumeFadeInterval); 
          volumeFadeInterval = null; 
          ytPlayer.setVolume(targetVolume); 
          if (btn) btn.classList.remove('fading'); 
          if (callback) callback(); 
        }
      }, stepDuration);
    }
    
    function switchToSecretTrack() {
      if (!playerReady || !ytPlayer) return;
      isSecretTrack = true;
      fadeVolume(0, 300, () => {
        ytPlayer.loadVideoById({ videoId: SECRET_VIDEO_ID, startSeconds: 0, suggestedQuality: 'small' });
        ytPlayer.unMute();
        ytPlayer.setVolume(100);
        isMuted = false;
        hasStartedPlaying = true;
        updateMuteButton();
      });
    }
    
    function resetToDefaultTrack() {
      if (!playerReady || !ytPlayer) return;
      isSecretTrack = false;
      fadeVolume(0, 300, () => {
        ytPlayer.loadVideoById({ videoId: DEFAULT_VIDEO_ID, startSeconds: 0, suggestedQuality: 'small' });
        ytPlayer.mute();
        ytPlayer.setVolume(0);
        isMuted = true;
        hasStartedPlaying = false;
        updateMuteButton();
      });
    }
    
    function toggleMute() {
      if (!playerReady) return;
      if (isHolding) return;
      isMuted = !isMuted; 
      updateMuteButton();
      if (isMuted) { 
        ytPlayer.mute(); 
        fadeVolume(0, 500); 
      } else { 
        ytPlayer.unMute(); 
        if (!hasStartedPlaying) { 
          ytPlayer.playVideo(); 
          hasStartedPlaying = true; 
        } 
        fadeVolume(100, 500); 
      }
    }
    
    function startHoldTimer() {
      isHolding = true;
      const btn = document.getElementById('muteBtn');
      if (btn) btn.classList.add('holding');
      holdTimer = setTimeout(() => {
        if (isSecretTrack) { resetToDefaultTrack(); } else { switchToSecretTrack(); }
        isHolding = false;
        if (btn) btn.classList.remove('holding');
      }, HOLD_DURATION);
    }
    
    function cancelHoldTimer() {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      isHolding = false;
      const btn = document.getElementById('muteBtn');
      if (btn) btn.classList.remove('holding');
    }
    
    function loadYouTubeAPI() { 
      const tag = document.createElement('script'); 
      tag.src = "https://www.youtube.com/iframe_api"; 
      tag.async = true; 
      const firstScriptTag = document.getElementsByTagName('script')[0]; 
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag); 
    }
    
    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', { 
        width: 1, height: 1, videoId: DEFAULT_VIDEO_ID, 
        playerVars: { autoplay: 0, loop: 1, playlist: DEFAULT_VIDEO_ID, controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0, showinfo: 0 }, 
        events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange } 
      });
    }
    
    function onPlayerReady(event) { 
      playerReady = true; 
      ytPlayer.mute(); 
      ytPlayer.setVolume(0); 
    }
    
    function onPlayerStateChange(event) { 
      if (event.data === YT.PlayerState.ENDED) {
        if (isSecretTrack) { ytPlayer.seekTo(0); ytPlayer.playVideo(); } 
        else { ytPlayer.playVideo(); }
      }
    }
    
    function fadeOutAudio(duration, callback) {
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) { 
        if (callback) callback(); 
        return; 
      }
      if (volumeFadeInterval) clearInterval(volumeFadeInterval);
      let startVolume = ytPlayer.getVolume() || 100, steps = 20, stepDuration = duration / steps, volumeStep = startVolume / steps, currentStep = 0;
      const fadeInterval = setInterval(() => {
        currentStep++;
        const newVolume = Math.max(0, startVolume - volumeStep * currentStep);
        ytPlayer.setVolume(Math.round(newVolume));
        if (currentStep >= steps || newVolume <= 0) { 
          clearInterval(fadeInterval); 
          ytPlayer.setVolume(0); 
          if (callback) callback(); 
        }
      }, stepDuration);
    }
    
    const canvas = document.getElementById('matrixCanvas'), ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);
    const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ', latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', nums = '0123456789', alphabet = katakana + latin + nums, fontSize = 16, columns = Math.floor(canvas.width / fontSize), rainDrops = new Array(columns).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < rainDrops.length; i++) {
        ctx.fillText(alphabet.charAt(Math.floor(Math.random() * alphabet.length)), i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }
    setInterval(draw, 30);
    
    function fitTextToButton() {
      const buttons = document.querySelectorAll('.game-button');
      const baseSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--button-size'));
      const maxFontSize = baseSize * 0.18;
      const minFontSize = baseSize * 0.09;
      buttons.forEach(button => {
        const textEl = button.querySelector('.game-name');
        const buttonWidth = button.clientWidth - (baseSize * 0.114);
        let fontSize = maxFontSize;
        textEl.style.fontSize = fontSize + 'px';
        while (textEl.scrollWidth > buttonWidth && fontSize > minFontSize) {
          fontSize -= 0.5;
          textEl.style.fontSize = fontSize + 'px';
        }
      });
    }
    
    const muteBtn = document.getElementById('muteBtn');
    
    muteBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startHoldTimer(); });
    muteBtn.addEventListener('mouseup', (e) => {
      e.preventDefault();
      if (isHolding && !holdTimer) { /* timer fired */ } 
      else if (isHolding) { cancelHoldTimer(); toggleMute(); }
    });
    muteBtn.addEventListener('mouseleave', () => { cancelHoldTimer(); });
    muteBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startHoldTimer(); });
    muteBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (isHolding && !holdTimer) { /* timer fired */ } 
      else if (isHolding) { cancelHoldTimer(); toggleMute(); }
    });
    muteBtn.addEventListener('touchcancel', () => { cancelHoldTimer(); });
    
    document.querySelectorAll('.game-button').forEach(button => {
      button.addEventListener('click', event => {
        const url = button.getAttribute('data-url');
        document.body.classList.remove('fade-in');
        document.body.classList.add('fade-out');
        fadeOutAudio(1000, () => { window.location.href = url; });
      });
    });
    
    window.onload = () => {
      updateMuteButton();
      document.body.classList.add('fade-in');
      loadYouTubeAPI();
      fitTextToButton();
    };
    
    window.addEventListener('resize', fitTextToButton);
    
    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out', 'fade-in');
      void document.body.offsetWidth;
      document.body.classList.add('fade-in');
      if (playerReady && ytPlayer && ytPlayer.setVolume) {
        if (isMuted) { 
          ytPlayer.setVolume(0); ytPlayer.mute(); hasStartedPlaying = false; 
        } else { 
          ytPlayer.setVolume(100); ytPlayer.unMute(); 
          if (!hasStartedPlaying) { ytPlayer.playVideo(); hasStartedPlaying = true; } 
        }
      }
    });
    
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    
    // Collect all games data
    const gamesData = [];
    document.querySelectorAll('.game-button').forEach(button => {
      const name = button.getAttribute('aria-label');
      const url = button.getAttribute('data-url');
      const emoji = button.querySelector('.emoji').textContent.trim();
      if (name && name !== 'Back') {
        gamesData.push({ name, url, emoji });
      }
    });

    function isEmojiQuery(query) {
      // Match if the string contains only emoji characters (and optional whitespace)
      return /^\s*[\p{Emoji}\u200d\uFE0F\u20E3\u{1F1E0}-\u{1F1FF}]+\s*$/u.test(query);
    }
    
    function calculateSimilarity(str1, str2) {
      str1 = str1.toLowerCase();
      str2 = str2.toLowerCase();
      if (str1 === str2) return 1;
      if (str1.includes(str2)) return 0.9;
      if (str2.includes(str1)) return 0.8;
      let matches = 0;
      const minLength = Math.min(str1.length, str2.length);
      for (let i = 0; i < minLength; i++) {
        if (str1[i] === str2[i]) matches++;
      }
      return matches / Math.max(str1.length, str2.length);
    }
    
    function updateSearchResults(query) {
      if (!query.trim()) {
        searchDropdown.classList.remove('active');
        return;
      }

      let results;

      if (isEmojiQuery(query)) {
        // Emoji mode: return all games whose button emoji matches the query exactly
        const trimmed = query.trim();
        results = gamesData.filter(game => game.emoji === trimmed);
      } else {
        // Text mode: fuzzy match on game name, same as before
        const scoredGames = gamesData.map(game => ({
          ...game,
          score: calculateSimilarity(game.name, query)
        }));
        scoredGames.sort((a, b) => b.score - a.score);
        results = scoredGames.slice(0, 5).filter(game => game.score > 0);
      }
      
      if (results.length === 0) {
        searchDropdown.innerHTML = '<div class="no-results">No games found</div>';
      } else {
        searchDropdown.innerHTML = results.map(game => `
          <div class="search-result" data-url="${game.url}">
            <span class="search-result-emoji">${game.emoji}</span>
            <span class="search-result-name">${game.name}</span>
          </div>
        `).join('');
        
        searchDropdown.querySelectorAll('.search-result').forEach(result => {
          result.addEventListener('click', () => {
            const url = result.getAttribute('data-url');
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            fadeOutAudio(1000, () => { window.location.href = url; });
          });
        });
      }
      
      searchDropdown.classList.add('active');
    }
    
    searchInput.addEventListener('input', (e) => {
      updateSearchResults(e.target.value);
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        searchDropdown.classList.remove('active');
      }
    });
    
    searchDropdown.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  </script>
</body>
</html>
