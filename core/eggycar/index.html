<html>
  <head>
    <title>eggycar</title>
    <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico "/>
    <link rel="icon" href="Google.png" type="image/x-icon">
    <style>
      * { margin:0; padding:0; border:0; }
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111;
        z-index: 999;
      }
      #error {
        padding: 20px;
        text-align: center;
        max-width: 90%;
        display: none;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>

  <div id="loading">
    <div>Loading Game...</div>
    <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
  </div>

  <iframe id="gameframe" style="display:none;"></iframe>

  <div id="error"></div>

  <script>
  const GAME_URL = "https://script.google.com/macros/s/AKfycbxGFiHgVNVoous7yjguN7bcuwa6lejCHgh6V1weh1vNalyCzpMmaMH9NhTisNSqkUo3/exec ";

  function start() {
    const loading = document.getElementById('loading');
    const frame = document.getElementById('gameframe');
    const errDiv = document.getElementById('error');

    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.display = 'block';
    };

    frame.onerror = () => {
      loading.style.display = 'none';
      errDiv.style.display = 'flex';
      errDiv.innerHTML = `
        <strong>Failed to load game</strong><br><br>
        The game could not be loaded.<br><br>
        • Check your internet<br>
        • The server may be unavailable<br>
        • Try refreshing the page<br>
      `;
    };

    // Load directly via src (avoids CORS issues with fetch)
    frame.src = GAME_URL;
  }

  start();
  </script>

  </body>
</html>
