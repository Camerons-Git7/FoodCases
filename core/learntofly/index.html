<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>learntofly</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <style>
    * { margin:0; padding:0; border:0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      z-index: 999;
    }
    #progress {
      width: 300px;
      height: 4px;
      background: #333;
      margin-top: 20px;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      width: 0%;
      height: 100%;
      background: #4CAF50;
      transition: width 0.3s;
    }
    #status {
      margin-top: 15px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    #error {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      padding: 20px;
      text-align: center;
      z-index: 1000;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: none;
    }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Game...</div>
  <div id="progress"><div id="progress-bar"></div></div>
  <div id="status">Initializing...</div>
</div>

<div id="error">
  <strong>Failed to load game</strong>
  <div style="margin-top:15px; opacity:0.8;" id="error-msg"></div>
</div>

<div id="game-container"></div>

<script>
const GAME_URL = "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/learntofly.html";
const loading = document.getElementById('loading');
const progressBar = document.getElementById('progress-bar');
const status = document.getElementById('status');
const errorDiv = document.getElementById('error');
const errorMsg = document.getElementById('error-msg');
const container = document.getElementById('game-container');

function showError(msg) {
  loading.style.display = 'none';
  errorDiv.style.display = 'flex';
  errorMsg.textContent = msg;
}

async function loadGame() {
  try {
    status.textContent = 'Fetching game file...';
    
    // Fetch with progress tracking
    const response = await fetch(GAME_URL);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const contentLength = +response.headers.get('Content-Length');
    const reader = response.body.getReader();
    let received = 0;
    let chunks = [];
    
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      
      chunks.push(value);
      received += value.length;
      
      if (contentLength) {
        const percent = (received / contentLength) * 100;
        progressBar.style.width = percent + '%';
      }
      
      status.textContent = `Downloading... ${(received / 1024 / 1024).toFixed(1)} MB`;
    }
    
    // Combine chunks
    const allChunks = new Uint8Array(received);
    let position = 0;
    for (const chunk of chunks) {
      allChunks.set(chunk, position);
      position += chunk.length;
    }
    
    const htmlText = new TextDecoder().decode(allChunks);
    
    status.textContent = 'Starting game...';
    
    // Create sandboxed iframe with injected Ruffle
    const ruffleScript = `
      <script src="https://unpkg.com/@ruffle-rs/ruffle"><\/script>
      <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
          autoplay: "on",
          unmuteOverlay: "hidden",
          warnOnUnsupportedContent: false
        };
      <\/script>
    `;
    
    // Inject Ruffle before </head> or at start
    let modifiedHtml = htmlText;
    if (modifiedHtml.includes('</head>')) {
      modifiedHtml = modifiedHtml.replace('</head>', ruffleScript + '</head>');
    } else {
      modifiedHtml = ruffleScript + modifiedHtml;
    }
    
    // Create and inject iframe
    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
    iframe.allow = 'fullscreen';
    
    container.appendChild(iframe);
    
    // Write content directly to iframe (avoids blob URL issues)
    iframe.contentDocument.open();
    iframe.contentDocument.write(modifiedHtml);
    iframe.contentDocument.close();
    
    loading.style.display = 'none';
    container.style.display = 'block';
    
  } catch (err) {
    showError(err.message + ' — GitHub may be rate limiting or blocking large file requests.');
    console.error(err);
  }
}

loadGame();
</script>

</body>
</html>
