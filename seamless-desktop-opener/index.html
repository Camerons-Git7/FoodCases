<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Desktop Opener</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Deep black background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
        }

        .pulse-btn {
            background-color: transparent;
            color: #39ff14; /* Neon green text */
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 20px 50px;
            border: 2px solid #39ff14; /* Neon green border */
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            animation: smoothPulse 2s infinite ease-in-out;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            display: inline-block;
        }

        /* Hover effect to intensify the glow */
        .pulse-btn:hover {
            background-color: #39ff14;
            color: #000;
            box-shadow: 0 0 30px #39ff14, 0 0 50px #39ff14, inset 0 0 20px #39ff14;
        }

        /* Smooth pulsing animation */
        @keyframes smoothPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            }
            50% {
                transform: scale(1.05); /* Slightly enlarges the button */
                box-shadow: 0 0 30px #39ff14, inset 0 0 25px #39ff14;
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            }
        }
    </style>
</head>
<body>

    <a href="https://menist.free.nf/seamless-desktop/index.html" class="pulse-btn">↗️ Seamless Desktop ↗️</a>

</body>
</html>
