<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Desktop Opener</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            flex-direction: column;
            gap: 30px; /* Space between buttons */
        }

        .pulse-btn {
            background-color: transparent;
            color: #39ff14;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 20px 50px;
            border: 2px solid #39ff14;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            animation: smoothPulse 2s infinite ease-in-out;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            display: inline-block;
        }

        .pulse-btn:hover {
            background-color: #39ff14;
            color: #000;
            box-shadow: 0 0 30px #39ff14, 0 0 50px #39ff14, inset 0 0 20px #39ff14;
        }

        @keyframes smoothPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px #39ff14, inset 0 0 25px #39ff14;
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 15px #39ff14, inset 0 0 15px #39ff14;
            }
        }

        #copy-msg {
            position: absolute;
            bottom: 15%;
            color: #39ff14;
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            text-shadow: 0 0 10px #39ff14;
        }

        #copy-msg.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <button class="pulse-btn" onclick="copyLink()">🔗 Copy Seamless Desktop Link 🔗</button>
    <a class="pulse-btn" href="https://menist.free.nf/seamless-desktop/index.html" target="_blank">🔗 Open Seamless Desktop Link 🔗</a>
    <div id="copy-msg">Copied to Clipboard!</div>

    <script>
        function copyLink() {
            const url = "https://menist.free.nf/seamless-desktop/index.html";
            navigator.clipboard.writeText(url).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.classList.add('show');
                setTimeout(() => {
                    msg.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>

</body>
</html>
