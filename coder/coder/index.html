<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Code Runner</title>
<link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  body {
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    overflow: hidden;
    margin: 0;
    height: 100vh;
  }
  
  .glow-btn {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
    background-size: 200% 200%;
    animation: gradientShift 3s ease infinite;
    box-shadow: 0 0 60px rgba(99, 102, 241, 0.5), inset 0 0 20px rgba(255,255,255,0.1);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .glow-btn:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 0 80px rgba(139, 92, 246, 0.6), inset 0 0 30px rgba(255,255,255,0.2);
  }
  
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  .drop-zone {
    border: 3px dashed rgba(99, 102, 241, 0.3);
    transition: all 0.3s ease;
  }
  
  .drop-zone.dragover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
    transform: scale(1.02);
  }
  
  #preview-iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
  }
  
  .fade-out {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  
  .file-icon {
    animation: float 3s ease-in-out infinite;
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body class="flex items-center justify-center relative">

<div id="main-container" class="w-full max-w-2xl p-8 flex flex-col items-center gap-8 z-10 transition-all duration-500">
  
  <div class="text-center space-y-4">
    <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
      Universal Runner
    </h1>
    <p class="text-slate-400 text-lg">
      Drop or click to run HTML, ZIP, GitHub repos & more
    </p>
  </div>

  <div id="drop-zone" class="drop-zone w-full aspect-square max-w-md rounded-3xl flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
    <input type="file" id="file-input" class="absolute inset-0 opacity-0 cursor-pointer z-20" accept=".html,.htm,.zip,.txt,.js,.css,.json,.md">
    
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    
    <div class="file-icon text-6xl mb-4">📦</div>
    
    <div class="text-center space-y-2 z-10">
      <div class="glow-btn text-white font-bold py-4 px-12 rounded-2xl text-xl shadow-2xl inline-block">
        Import & Run
      </div>
      <p class="text-slate-500 text-sm mt-4">Supports: HTML, ZIP, GitHub Repos, TXT, JS, CSS, JSON</p>
    </div>
    
    <div id="loading-indicator" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-30">
      <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p id="loading-text" class="text-indigo-400 font-bold">Processing...</p>
    </div>
  </div>

  <div class="text-center text-xs text-slate-600 max-w-md">
    <p>GitHub repos: Download as ZIP → Import here. Auto-detects index.html, handles templates & assets.</p>
  </div>
</div>

<div id="preview-container" class="absolute inset-0 bg-white hidden z-0"></div>

<div id="error-toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-red-500/90 text-white px-6 py-3 rounded-xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 z-50 backdrop-blur-sm">
  <span id="error-text">Error message</span>
</div>

<script>
  const mainContainer = document.getElementById('main-container');
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const previewContainer = document.getElementById('preview-container');
  const loadingIndicator = document.getElementById('loading-indicator');
  const loadingText = document.getElementById('loading-text');
  const errorToast = document.getElementById('error-toast');
  const errorText = document.getElementById('error-text');

  let currentFiles = new Map();
  let basePath = '';

  function showLoading(text = 'Processing...') {
    loadingText.textContent = text;
    loadingIndicator.classList.remove('opacity-0', 'pointer-events-none');
  }

  function hideLoading() {
    loadingIndicator.classList.add('opacity-0', 'pointer-events-none');
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorToast.classList.remove('opacity-0', 'pointer-events-none');
    setTimeout(() => {
      errorToast.classList.add('opacity-0', 'pointer-events-none');
    }, 4000);
  }

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      handleFile(files[0]);
    }
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFile(e.target.files[0]);
    }
  });

  async function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    
    showLoading(`Loading ${file.name}...`);

    try {
      if (ext === 'zip') {
        await processZip(file);
      } else if (['html', 'htm'].includes(ext)) {
        await processHtml(file);
      } else if (['txt', 'js', 'css', 'json', 'md'].includes(ext)) {
        await processTextFile(file);
      } else {
        const text = await readFileAsText(file);
        if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
          await runHtml(text, file.name);
        } else {
          showError(`Unsupported file type: .${ext}`);
          hideLoading();
        }
      }
    } catch (err) {
      showError(`Error: ${err.message}`);
      hideLoading();
    }
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = (e) => reject(new Error('Failed to read file'));
      reader.readAsText(file);
    });
  }

  function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = (e) => reject(new Error('Failed to read file'));
      reader.readAsArrayBuffer(file);
    });
  }

  async function processHtml(file) {
    const content = await readFileAsText(file);
    await runHtml(content, file.name);
  }

  async function processTextFile(file) {
    const content = await readFileAsText(file);
    const wrapped = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${file.name}</title>
  <style>
    body { 
      font-family: 'JetBrains Mono', monospace; 
      background: #0f172a; 
      color: #e2e8f0; 
      padding: 2rem;
      line-height: 1.6;
    }
    pre { 
      background: #1e293b; 
      padding: 1rem; 
      border-radius: 8px; 
      overflow-x: auto;
      border: 1px solid #334155;
    }
    h1 { color: #6366f1; border-bottom: 2px solid #334155; padding-bottom: 0.5rem; }
    .meta { color: #64748b; font-size: 0.9rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>📄 ${file.name}</h1>
  <div class="meta">Size: ${(file.size / 1024).toFixed(2)} KB | Type: ${file.type || 'text/plain'}</div>
  <pre><code>${escapeHtml(content)}</code></pre>
</body>
</html>`;
    await runHtml(wrapped);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function processZip(file) {
    showLoading('Extracting ZIP...');
    
    const arrayBuffer = await readFileAsArrayBuffer(file);
    const zip = await JSZip.loadAsync(arrayBuffer);
    
    currentFiles.clear();
    const files = [];
    let rootFolder = '';
    
    // Detect GitHub ZIP structure (root folder like "Repo-Name-master/")
    const filePaths = Object.keys(zip.files);
    const firstFile = filePaths.find(p => !zip.files[p].dir);
    
    if (firstFile && firstFile.includes('/')) {
      const potentialRoot = firstFile.split('/')[0];
      const allInRoot = filePaths.every(p => p.startsWith(potentialRoot + '/'));
      if (allInRoot) {
        rootFolder = potentialRoot + '/';
        console.log('Detected GitHub ZIP root folder:', rootFolder);
      }
    }
    
    // Collect all files, stripping root folder if present
    zip.forEach((relativePath, zipEntry) => {
      if (!zipEntry.dir) {
        const cleanPath = rootFolder ? relativePath.replace(rootFolder, '') : relativePath;
        if (cleanPath) {
          files.push({
            path: cleanPath,
            fullPath: relativePath,
            entry: zipEntry,
            name: cleanPath.split('/').pop(),
            dir: cleanPath.split('/').slice(0, -1).join('/')
          });
        }
      }
    });

    showLoading('Processing files...');

    // Find entry point
    let entryPoint = null;
    const priorities = [
      'index.html', 'Index.html', 'INDEX.HTML',
      'main.html', 'Main.html', 'main.htm',
      'home.html', 'Home.html',
      'default.html', 'Default.html'
    ];
    
    for (const priority of priorities) {
      const found = files.find(f => f.path.toLowerCase() === priority.toLowerCase());
      if (found) {
        entryPoint = found;
        break;
      }
    }
    
    if (!entryPoint) {
      const htmlFiles = files.filter(f => f.name.match(/\.(html|htm)$/i));
      if (htmlFiles.length > 0) {
        entryPoint = htmlFiles.sort((a, b) => {
          const depthA = a.path.split('/').length;
          const depthB = b.path.split('/').length;
          return depthA - depthB;
        })[0];
      }
    }

    if (!entryPoint) {
      await showFileBrowser(files, zip, rootFolder);
      return;
    }

    showLoading(`Loading ${entryPoint.name}...`);
    
    // Extract all files to memory
    for (const file of files) {
      const content = await file.entry.async('uint8array');
      const blob = new Blob([content]);
      currentFiles.set(file.path, {
        blob: blob,
        url: URL.createObjectURL(blob),
        type: getMimeType(file.name)
      });
    }

    basePath = entryPoint.dir;
    const entryContent = await entryPoint.entry.async('text');
    await runHtml(entryContent, entryPoint.path);
  }

  async function showFileBrowser(files, zip, rootFolder) {
    const fileList = files.map(f => 
      `<li style="margin: 0.5rem 0; cursor: pointer; color: #6366f1;" onclick="window.viewFile('${f.fullPath}', '${rootFolder}')">📄 ${f.path}</li>`
    ).join('');
    
    const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZIP Contents</title>
  <style>
    body { 
      font-family: 'JetBrains Mono', monospace; 
      background: #0f172a; 
      color: #e2e8f0; 
      padding: 2rem;
    }
    h1 { color: #6366f1; }
    ul { list-style: none; padding: 0; }
    li:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📦 ZIP Archive Contents</h1>
  <p>No HTML entry point found. Click a file to view:</p>
  <ul>${fileList}</ul>
</body>
</html>`;
    
    window.currentZip = zip;
    window.viewFile = async (fullPath, root) => {
      const content = await zip.file(fullPath).async('text');
      const fileName = fullPath.replace(root, '');
      const wrapped = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>${fileName}</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    pre { background: #1e293b; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>${fileName}</h1>
  <pre>${escapeHtml(content)}</pre>
</body>
</html>`;
      await runHtml(wrapped);
    };
    
    await runHtml(html);
  }

  function getMimeType(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const types = {
      'html': 'text/html', 'htm': 'text/html',
      'js': 'application/javascript', 'mjs': 'application/javascript',
      'css': 'text/css',
      'json': 'application/json',
      'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
      'gif': 'image/gif', 'svg': 'image/svg+xml', 'webp': 'image/webp',
      'woff': 'font/woff', 'woff2': 'font/woff2', 'ttf': 'font/ttf', 'otf': 'font/otf',
      'mp3': 'audio/mpeg', 'mp4': 'video/mp4', 'webm': 'video/webm'
    };
    return types[ext] || 'application/octet-stream';
  }

  async function runHtml(htmlContent, filePath = '') {
    showLoading('Rendering...');
    
    // Check if this is a server-side template
    const hasTemplates = htmlContent.includes('{{') && htmlContent.includes('}}');
    
    if (hasTemplates) {
      console.log('Detected server-side templates, processing...');
      htmlContent = stripTemplates(htmlContent);
    }
    
    const baseDir = filePath ? filePath.split('/').slice(0, -1).join('/') : '';
    
    // Process HTML to handle relative paths
    let processedHtml = htmlContent;
    
    const replacements = [
      { regex: /href=["']([^"']+)["']/g, type: 'href' },
      { regex: /src=["']([^"']+)["']/g, type: 'src' },
      { regex: /url\(["']?([^"')]+)["']?\)/g, type: 'url' }
    ];
    
    for (const pattern of replacements) {
      processedHtml = processedHtml.replace(pattern.regex, (match, url) => {
        if (url.match(/^(https?:|data:|javascript:|#|\/\/|mailto:|tel:)/i)) return match;
        
        let resolvedPath;
        if (url.startsWith('/')) {
          resolvedPath = url.slice(1);
        } else if (baseDir) {
          resolvedPath = baseDir + '/' + url;
        } else {
          resolvedPath = url;
        }
        
        resolvedPath = normalizePath(resolvedPath);
        
        const file = findFileCaseInsensitive(resolvedPath);
        
        if (file) {
          if (pattern.type === 'url') {
            return `url("${file.url}")`;
          } else {
            return `${pattern.type}="${file.url}"`;
          }
        }
        
        // Try common variations
        const variations = [
          resolvedPath,
          'views/' + resolvedPath,
          'public/' + resolvedPath,
          'assets/' + resolvedPath,
          resolvedPath.replace(/^\.\.\//, ''),
          resolvedPath.replace(/^\.\//, '')
        ];
        
        for (const variant of variations) {
          const varFile = findFileCaseInsensitive(variant);
          if (varFile) {
            if (pattern.type === 'url') {
              return `url("${varFile.url}")`;
            } else {
              return `${pattern.type}="${varFile.url}"`;
            }
          }
        }
        
        return match;
      });
    }

    // Hide main UI
    mainContainer.classList.add('fade-out');
    setTimeout(() => {
      mainContainer.style.display = 'none';
      previewContainer.style.display = 'block';
    }, 500);

    // Create blob and run
    const blob = new Blob([processedHtml], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    
    previewContainer.innerHTML = `<iframe id="preview-iframe" src="${url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-modals"></iframe>`;
    
    hideLoading();
    
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  function stripTemplates(html) {
    let stripped = html;
    
    // Handle {{mask}}content{{/mask}} - keep content, remove tags
    // Use [\s\S] to match any character including newlines
    stripped = stripped.replace(/\{\{\s*mask\s*\}\}([\s\S]*?)\{\{\s*\/mask\s*\}\}/gi, '$1');
    
    // Handle standalone {{mask}} tags (opening/closing separately)
    stripped = stripped.replace(/\{\{\s*mask\s*\}\}/gi, '');
    stripped = stripped.replace(/\{\{\s*\/mask\s*\}\}/gi, '');
    
    // Handle {{ifSEO}}...{{/ifSEO}} - keep content
    stripped = stripped.replace(/\{\{\s*ifSEO\s*\}\}([\s\S]*?)\{\{\s*\/ifSEO\s*\}\}/gi, '$1');
    stripped = stripped.replace(/\{\{\s*ifSEO\s*\}\}/gi, '');
    
    // Handle specific Holy Unblocker templates
    stripped = stripped.replace(/\{\{\s*getSplash\s*\}\}/gi, '<div style="padding:2rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;text-align:center;border-radius:8px;margin:1rem 0;"><h1>Holy Unblocker</h1><p>Web Proxy Service</p></div>');
    
    stripped = stripped.replace(/\{\{\s*inline\s*\}\}/gi, '');
    stripped = stripped.replace(/\{\{\s*version\s*\}\}/gi, '6.0.0');
    
    // Handle any other {{variable}} patterns - remove them but preserve structure
    // This catches things like {{title}}, {{description}}, etc.
    stripped = stripped.replace(/\{\{\s*[a-zA-Z0-9_]+\s*\}\}/gi, '');
    
    // Clean up multiple consecutive empty lines
    stripped = stripped.replace(/\n\s*\n\s*\n/g, '\n\n');
    
    // Clean up empty template artifacts
    stripped = stripped.replace(/\{\{\s*\}\}/g, '');
    
    return stripped;
  }

  function normalizePath(path) {
    const parts = path.split('/');
    const result = [];
    for (const part of parts) {
      if (part === '..') {
        result.pop();
      } else if (part !== '.' && part !== '') {
        result.push(part);
      }
    }
    return result.join('/');
  }

  function findFileCaseInsensitive(path) {
    const lowerPath = path.toLowerCase();
    for (const [key, value] of currentFiles) {
      if (key.toLowerCase() === lowerPath) {
        return value;
      }
    }
    return null;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && previewContainer.style.display === 'block') {
      previewContainer.style.display = 'none';
      previewContainer.innerHTML = '';
      mainContainer.style.display = 'flex';
      mainContainer.classList.remove('fade-out');
      currentFiles.clear();
      basePath = '';
    }
  });
</script>
</body>
</html>
