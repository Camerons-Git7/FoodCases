<!DOCTYPE html>
<html lang="en-us">

<head>
<base href="https://cdn.jsdelivr.net/gh/greeniYT/stickywicky@main/" target="_blank">
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>Supreme Duelist</title>
  <link rel="stylesheet" href="TemplateData/style.css">

  <script>
    // === SPOOF 1: Make page think it's top-level (not inside an iframe) ===
    try {
      Object.defineProperty(window, 'parent', { get: () => window, configurable: true });
      Object.defineProperty(window, 'top', { get: () => window, configurable: true });
    } catch(e) {}

    // === SPOOF 2: Fake document.referrer as youtube.com ===
    try {
      Object.defineProperty(document, 'referrer', {
        get: () => 'https://www.youtube.com/',
        configurable: true
      });
    } catch(e) {}

    // === SPOOF 3: Fake ancestorOrigins ===
    try {
      Object.defineProperty(window.location, 'ancestorOrigins', {
        get: () => ({ length: 1, 0: 'https://www.youtube.com', contains: (o) => o === 'https://www.youtube.com' }),
        configurable: true
      });
    } catch(e) {}

    window.ytgame = window.ytgame || {};
  </script>

  <script>
    (function() {
      const requiredHash = '#flags=%7B"enableServiceWorker"%3Afalse%7D&origin=https%3A%2F%2Fwww.youtube.com';
      try {
        if (window.location.hash !== requiredHash) window.location.hash = requiredHash;
      } catch(e) {}
    })();
  </script>

  <script>
    const _OrigAC = window.AudioContext || window.webkitAudioContext;
    window.AudioContext = window.webkitAudioContext = function(...args) {
      const ctx = new _OrigAC(...args);
      window._unityAudioContext = ctx;
      ctx.suspend = () => { console.log('[AudioFix] Blocked suspend'); return Promise.resolve(); };
      const _origCreateGain = ctx.createGain.bind(ctx);
      ctx.createGain = function() {
        const gain = _origCreateGain();
        const _origGainDesc = Object.getOwnPropertyDescriptor(GainNode.prototype, 'gain');
        Object.defineProperty(gain, 'gain', {
          get: () => _origGainDesc.get.call(gain),
          set: (v) => {
            if (v < 0.1) { console.log('[AudioFix] Blocked gain set to', v); return; }
            _origGainDesc.set.call(gain, v);
          }
        });
        return gain;
      };
      return ctx;
    };
    window.AudioContext.prototype = _OrigAC.prototype;
    setInterval(() => {
      if (window._unityAudioContext && window._unityAudioContext.state !== 'running') {
        window._unityAudioContext.resume();
      }
    }, 500);
  </script>

  <!-- Real YouTube Game API SDK -->
  <script src="https://www.youtube.com/game_api/v1"></script>

  <script>
    // Patch ytgame immediately after SDK loads
    (function patchYTGame() {
      if (typeof ytgame === 'undefined' || !ytgame.system) {
        setTimeout(patchYTGame, 10);
        return;
      }
      console.log('[Patch] ytgame found, patching...');

      ytgame.system.isAudioEnabled = () => true;

      const _origAEC = ytgame.system.onAudioEnabledChange.bind(ytgame.system);
      ytgame.system.onAudioEnabledChange = (cb) => {
        return _origAEC((enabled) => { cb(true); });
      };

      if (ytgame.system.onPause) {
        ytgame.system.onPause = (cb) => { return () => {}; };
      }

      if (ytgame.system.onResume) {
        const _origResume = ytgame.system.onResume.bind(ytgame.system);
        ytgame.system.onResume = (cb) => {
          setTimeout(() => cb(), 100);
          return _origResume(cb);
        };
      }

      if (ytgame.game && ytgame.game.onStart) {
        const _origStart = ytgame.game.onStart.bind(ytgame.game);
        ytgame.game.onStart = (cb) => {
          setTimeout(() => cb(), 200);
          return _origStart(cb);
        };
      }

      if (ytgame.game && ytgame.game.onVisibilityChange) {
        const _origVis = ytgame.game.onVisibilityChange.bind(ytgame.game);
        ytgame.game.onVisibilityChange = (cb) => {
          setTimeout(() => cb(true), 100);
          return _origVis((v) => cb(true));
        };
      }

      if (ytgame.ads) {
        ytgame.ads.isAdBreakAvailable = () => false;
        ytgame.ads.requestAdBreak = (cb) => { if (cb) cb({ breakStatus: 'dismissed' }); };
      }

      console.log('[Patch] ytgame fully patched');
    })();

    window.addEventListener('message', function(e) {
      try {
        const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (data && (data.muted === true || data.type === 'mute')) {
          e.stopImmediatePropagation();
          return;
        }
      } catch(_) {}
    }, true);
  </script>
<base target="_blank">
</head>

<body>
<script>
  // Block all alert dialogs
  window.alert = function() { console.log('[Alert blocked]', arguments); };
  window.confirm = function() { console.log('[Confirm blocked]', arguments); return true; };
  window.prompt = function() { return null; };
</script>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=100% height=100% tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
  </div>

  <script src="unarchiver.min.js"></script>
  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) { return; }

    var buildUrl = "https://cdn.jsdelivr.net/gh/greeniYT/stickywicky@main/Build";
    var loaderUrl = buildUrl + "/YTPlayables.loader.js";
    var config = {
      dataUrl: buildUrl + "/YTPlayables.data.gz",
      frameworkUrl: buildUrl + "/YTPlayables.framework.js.gz",
      codeUrl: buildUrl + "/YTPlayables.wasm.gz",
      streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/greeniYT/stickywicky@9f5aa0e5dc4708a05d72ef330699421a58f841eb/StreamingAssets/",
      autoSyncPersistentDataPath: true,
      companyName: "Neron's Brother",
      productName: "Supreme Duelist",
      productVersion: "1.0.16.0002",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }

    loadingBar.style.display = "block";

    // === CHROMEBOOK FIX 1: Async URL check instead of sync XHR ===
    async function UrlExistsAsync(urlToCheck) {
      try {
        const response = await fetch(urlToCheck, { method: 'HEAD', mode: 'no-cors' });
        return true;
      } catch(e) {
        return false;
      }
    }

    // Keep old function for compatibility but make it non-blocking
    function UrlExists(urlToCheck) {
      return true; // Assume exists; async check won't block
    }

    loadResources = async (callback) => {
      const subZipStr = '.zip';
      const subWASMStr = '.wasm';
      const subJSStr = '.js';
      var codeUrl = config.codeUrl;
      var shouldDecompress = true;
      
      if (!codeUrl.includes(subZipStr)) {
        const zipExists = await UrlExistsAsync(codeUrl + subZipStr);
        if (zipExists) {
          codeUrl = codeUrl + subZipStr;
        } else {
          shouldDecompress = false;
        }
      }
      
      if (shouldDecompress) {
        var blobType = 'application/octet-stream';
        if (codeUrl.includes(subWASMStr)) blobType = 'application/wasm';
        else if (codeUrl.includes(subJSStr)) blobType = 'text/javascript';
        DecompressFile(codeUrl, blobType, (file) => { config.codeUrl = file; callback(); });
      } else {
        callback();
      }
    }

    loadZipData = (url, callback) => {
      fetch(url).then(r => r.blob()).then(blob => callback(blob));
    }

    function DecompressFile(file, blobMimeType, callback) {
      let decompressedFile;
      loadZipData(file, (f) => {
        Unarchiver.open(f).then(async function(archive) {
          for (let entry of archive.entries) {
            if (entry.is_file) {
              let entryRead = await entry.read();
              let entryData = await entryRead.arrayBuffer();
              let dataBlob = new Blob([new Uint8Array(entryData)], { type: blobMimeType });
              decompressedFile = window.URL.createObjectURL(dataBlob);
            }
          }
          callback(decompressedFile);
        }).catch(err => {
          console.error('[DecompressFile] Error:', err);
          callback(file); // Fallback to original file
        });
      });
    }

    var unityGameInstance = null;

    function InitUnitySection() {
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          unityGameInstance = unityInstance;
          loadingBar.style.display = "none";
          setTimeout(() => {
            if (window._unityAudioContext) window._unityAudioContext.resume();
            try { if (window.ytgame && window.ytgame.system) window.ytgame.system.notifyLoadComplete(); } catch(e) {}
          }, 1000);
        }).catch((message) => { 
          console.error(message); 
          warningBanner.innerHTML = "Failed to load game. Try refreshing or using a different browser.";
        });
      };
      script.onerror = () => {
        warningBanner.innerHTML = "Failed to load game engine. Check your connection.";
      };
      document.body.appendChild(script);
    }

    function GetGzipUrl(url) { return url + "ip"; }

    // === CHROMEBOOK FIX 2: Chunked decompression with memory checks ===
    async function decompressWithFallback(url, type, label) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        
        // Check if DecompressionStream exists
        if (typeof DecompressionStream === 'undefined') {
          console.warn(`[${label}] DecompressionStream not available, using raw`);
          return window.URL.createObjectURL(blob);
        }
        
        const ds = new DecompressionStream("gzip");
        const decompressed = await new Response(blob.stream().pipeThrough(ds)).blob();
        decompressed.type = type;
        return window.URL.createObjectURL(decompressed);
      } catch (err) {
        console.error(`[${label}] Decompression failed:`, err);
        // Fallback: try without .gz
        try {
          const fallbackUrl = url.replace('.gz', '');
          const response = await fetch(fallbackUrl);
          const blob = await response.blob();
          blob.type = type;
          return window.URL.createObjectURL(blob);
        } catch(e2) {
          throw err; // Re-throw if both fail
        }
      }
    }

    async function DecompressGzipFiles(callback) {
      try {
        config.codeUrl = await decompressWithFallback(GetGzipUrl(config.codeUrl), "application/wasm", "WASM");
        config.dataUrl = await decompressWithFallback(GetGzipUrl(config.dataUrl), "application/octet-stream", "Data");
        config.frameworkUrl = await decompressWithFallback(GetGzipUrl(config.frameworkUrl), "text/javascript", "Framework");
        callback();
      } catch (err) {
        console.error("Fatal decompression error:", err);
        warningBanner.innerHTML = "Failed to load game files. Your device may not have enough memory.";
      }
    }

    // === CHROMEBOOK FIX 3: Gentler cleanup that preserves essential DBs ===
    async function cleanupAndStartUnity() {
      const pagePath = window.location.pathname;
      
      // Clear localStorage for this page only
      try {
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (key && key.includes(pagePath)) {
            localStorage.removeItem(key);
          }
        }
      } catch(e) {}

      // === CHROMEBOOK FIX 4: Only delete Unity-related DBs, not ALL ===
      if (window.indexedDB && window.indexedDB.databases) {
        try {
          const dbs = await window.indexedDB.databases();
          for (const db of dbs) {
            // Only delete Unity/Emscripten DBs, preserve browser/system ones
            const dbName = db.name || '';
            const isUnityDb = dbName.includes('unity') || 
                              dbName.includes('emscripten') || 
                              dbName.includes('fs') ||
                              dbName.includes('idbfs') ||
                              dbName.includes('supreme') ||
                              dbName.includes('duelist') ||
                              dbName.includes('sticky') ||
                              dbName.includes('YTPlayables') ||
                              dbName.includes('__') ||
                              dbName === '/idbfs' ||
                              dbName === '/tmp';
            
            if (isUnityDb) {
              console.log('[FS Cleanup] Deleting Unity DB:', dbName);
              await new Promise((resolve) => {
                const req = window.indexedDB.deleteDatabase(db.name);
                req.onsuccess = resolve;
                req.onerror = resolve;
                req.onblocked = resolve;
                setTimeout(resolve, 500);
              });
            } else {
              console.log('[FS Cleanup] Preserving non-Unity DB:', dbName);
            }
          }
        } catch(e) { 
          console.log('[FS Cleanup] DB error:', e); 
        }
      }

      // Patch Emscripten FS to prevent hashName crash on corrupted nodes
      const patchFS = () => {
        if (typeof FS !== 'undefined' && FS.lookupNode) {
          const _origLookupNode = FS.lookupNode;
          FS.lookupNode = function(parent, name) {
            if (parent && parent.contents === undefined) {
              console.log('[FS Patch] Fixing corrupted parent.contents for:', name);
              parent.contents = {};
            }
            return _origLookupNode(parent, name);
          };
          
          const _origRmdir = FS.rmdir;
          FS.rmdir = function(path) {
            try {
              return _origRmdir(path);
            } catch(e) {
              console.log('[FS Patch] Blocked rmdir error on:', path);
              return 0;
            }
          };
          
          console.log('[FS Patch] Emscripten FS patched');
        } else {
          setTimeout(patchFS, 50);
        }
      };
      patchFS();

      // === CHROMEBOOK FIX 5: Delay start slightly to let browser settle after cleanup ===
      setTimeout(() => {
        if (config.dataUrl.includes(".gz")) {
          DecompressGzipFiles(InitUnitySection);
        } else {
          InitUnitySection();
        }
      }, 100);
    }

    cleanupAndStartUnity();
  </script>
</body>
</html>
