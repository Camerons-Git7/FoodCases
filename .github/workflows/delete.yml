name: Delete Files Named "delete"

on:
  workflow_dispatch:

jobs:
  delete-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and delete all files named "delete"
        run: |
          echo "Searching for files named 'delete'..."
          find . -type f -name "delete" | while read -r file; do
            echo "Deleting: $file"
            rm "$file"
          done
          echo "Done."

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || git commit -m "Delete all files named 'delete'"
          git push
