name: Replace Favicon URL

on:
  workflow_dispatch:  # Run manually from the Actions tab
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace https://math.hws.edu/favicon.ico with /favicon.ico
        run: |
          echo "🔍 Searching and replacing favicon URL..."
          
          # Replace in all files (excluding .git and binary files)
          find . -type f \
            ! -path '*/.git/*' \
            ! -path '*/node_modules/*' \
            ! -path '*/.venv/*' \
            -exec grep -l "https://math.hws.edu/favicon.ico" {} + \
            | xargs sed -i 's|https://math.hws.edu/favicon.ico|/favicon.ico|g'

          echo "✅ Replacement completed."

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: replace math.hws.edu favicon URL with local /favicon.ico"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show diff (for PRs)
        if: steps.git-check.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: git diff --name-only HEAD^ HEAD
