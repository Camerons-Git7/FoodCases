name: Replace Favicon URL

on:
  workflow_dispatch:           # Recommended: run manually
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

# Grant necessary permissions
permissions:
  contents: write
  pull-requests: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace https://math.hws.edu/favicon.ico with /favicon.ico
        run: |
          echo "🔍 Searching and replacing favicon URL..."
          
          find . -type f \
            ! -path '*/.git/*' \
            ! -path '*/node_modules/*' \
            ! -path '*/.venv/*' \
            ! -path '*/.github/workflows/*' \   # Protect workflow files
            -exec grep -l "https://math.hws.edu/favicon.ico" {} + \
            | xargs sed -i 's|https://math.hws.edu/favicon.ico|/favicon.ico|g'

          echo "✅ Replacement completed."

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected."
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "chore: replace math.hws.edu favicon URL with local /favicon.ico"
          git push
