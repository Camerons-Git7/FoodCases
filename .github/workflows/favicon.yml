name: Replace Favicon URL

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace https://math.hws.edu/favicon.ico with /favicon.ico
        run: |
          echo "🔍 Searching and replacing favicon URL..."

          # Safer find + sed command
          grep -rl "https://math.hws.edu/favicon.ico" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=.github/workflows \
            --exclude="*.{png,jpg,jpeg,gif,ico,svg,woff,ttf,eot}" | \
          xargs sed -i 's|https://math.hws.edu/favicon.ico|/favicon.ico|g'

          echo "✅ Replacement completed."

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes were made."
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "chore: replace math.hws.edu favicon URL with local /favicon.ico"
          git push
