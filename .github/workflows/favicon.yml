name: Replace Favicon URL

on:
  workflow_dispatch:     # Run manually from Actions tab

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace favicon URL
        run: |
          echo "🔍 Replacing https://math.hws.edu/favicon.ico with /favicon.ico"

          grep -rl "https://math.hws.edu/favicon.ico" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=.github \
            --exclude="*.{png,jpg,jpeg,gif,ico,svg}" | \
          xargs sed -i 's|https://math.hws.edu/favicon.ico|/favicon.ico|g'

          echo "✅ Replacement done."

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "chore: replace math.hws.edu favicon URL with local /favicon.ico"
            git push
          fi
