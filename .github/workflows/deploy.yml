name: 🚀 Deploy to InfinityFree

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force complete re-upload (delete sync state first)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  web-deploy:
    name: Deploy to InfinityFree
    runs-on: ubuntu-latest
    
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clear sync state (Force Full Sync)
        if: github.event.inputs.force_full_sync == 'true'
        run: |
          echo "Force full sync requested - will delete local sync state if it exists"
          rm -f .ftp-sync-state.json .ftp-sync-state-2.json
          echo "Sync state cleared. All files will be re-uploaded."

      # ─── FIRST WEBSITE ─────────────────────────────
      - name: Deploy to InfinityFree Site 1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          local-dir: ./
          state-name: .ftp-sync-state-1.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
            .ftp-sync-state-1.json
            .ftp-sync-state-2.json
          log-level: standard

      # ─── SECOND WEBSITE ────────────────────────────
      - name: Replace "menist" with "seamless" for Site 2 deploy
        run: |
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '.ftp-sync-state-1.json' \
            ! -name '.ftp-sync-state-2.json' \
            -exec sed -i 's/menist/seamless/g' {} +

      - name: Deploy to InfinityFree Site 2
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_2 }}
          username: ${{ secrets.FTP_USERNAME_2 }}
          password: ${{ secrets.FTP_PASSWORD_2 }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          local-dir: ./
          state-name: .ftp-sync-state-2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
            .ftp-sync-state-1.json
            .ftp-sync-state-2.json
          log-level: standard
