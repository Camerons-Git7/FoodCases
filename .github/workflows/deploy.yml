name: 🚀 Deploy to InfinityFree

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force complete re-upload (delete sync state first)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  web-deploy:
    name: Deploy to InfinityFree
    runs-on: ubuntu-latest
    
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clear sync state (Force Full Sync)
        if: github.event.inputs.force_full_sync == 'true'
        run: |
          echo "Force full sync requested - will delete local sync state if it exists"
          rm -f .ftp-sync-state-1.json .ftp-sync-state-3.json
          echo "Sync state cleared. All files will be re-uploaded."

      # ─── OBFUSCATION SETUP ─────────────────────────────
      - name: Setup obfuscation tools
        run: |
          npm install -g terser html-minifier-terser clean-css-cli
          sudo apt-get update && sudo apt-get install -y php-cli

      # ─── FIRST WEBSITE ─────────────────────────────
      - name: Obfuscate code for Site 1
        run: |
          # Create obfuscation script
          cat > obfuscate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { minify } = require('terser');
          const HTMLMinifier = require('html-minifier-terser');
          const CleanCSS = require('clean-css');

          const obfuscateString = (str) => {
            return str.split('').map(c => '\\x' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
          };

          const stringEncoder = (content) => {
            // Encode obvious strings in JS that might be scraped
            return content.replace(/(["'])(?:(?=(\\?))\2.)*?\1/g, (match) => {
              if (match.length < 5) return match; // Skip short strings
              const inner = match.slice(1, -1);
              if (inner.includes('\\x')) return match; // Already encoded
              if (inner.includes('<') || inner.includes('>')) return match; // Skip HTML in strings
              return "eval(String.fromCharCode(" + inner.split('').map(c => c.charCodeAt(0)).join(',') + "))";
            });
          };

          const processFile = async (filePath) => {
            const ext = path.extname(filePath);
            const content = fs.readFileSync(filePath, 'utf8');
            let result = content;

            try {
              if (ext === '.js') {
                const minified = await minify(content, {
                  compress: {
                    drop_console: false,
                    drop_debugger: true,
                    passes: 2,
                    dead_code: true,
                    booleans_as_integers: true
                  },
                  mangle: {
                    properties: {
                      regex: /^_/  // Mangle private properties
                    }
                  },
                  format: {
                    comments: false,
                    quote_style: 1
                  }
                });
                result = minified.code;
                // Add light string encoding layer
                result = stringEncoder(result);
              }
              else if (ext === '.css') {
                const clean = new CleanCSS({
                  level: 2,
                  rebase: false
                }).minify(content);
                result = clean.styles;
              }
              else if (ext === '.html' || ext === '.htm' || ext === '.php') {
                // Minify inline JS and CSS first
                let html = content;
                
                // Minify inline CSS in style tags
                html = html.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, (match, css) => {
                  const clean = new CleanCSS({ level: 2 }).minify(css);
                  return `<style>${clean.styles}</style>`;
                });

                // Minify inline JS in script tags
                const scriptPromises = [];
                html = html.replace(/<script([^>]*)>([\s\S]*?)<\/script>/gi, (match, attrs, js) => {
                  if (!js.trim() || attrs.includes('src=')) return match;
                  scriptPromises.push((async () => {
                    const minified = await minify(js, {
                      compress: { drop_debugger: true, passes: 1 },
                      mangle: true,
                      format: { comments: false }
                    });
                    return `<script${attrs}>${minified.code}</script>`;
                  })());
                  return match; // Placeholder, will be replaced below
                });

                // Wait for all script minifications
                if (scriptPromises.length > 0) {
                  const results = await Promise.all(scriptPromises);
                  let idx = 0;
                  html = html.replace(/<script([^>]*)>([\s\S]*?)<\/script>/gi, (match, attrs, js) => {
                    if (!js.trim() || attrs.includes('src=')) return match;
                    return results[idx++];
                  });
                }

                result = await HTMLMinifier.minify(html, {
                  collapseWhitespace: true,
                  removeComments: true,
                  removeRedundantAttributes: true,
                  removeScriptTypeAttributes: true,
                  removeStyleLinkTypeAttributes: true,
                  minifyCSS: false, // Already done above
                  minifyJS: false,  // Already done above
                  useShortDoctype: true,
                  removeEmptyAttributes: true
                });
              }
              fs.writeFileSync(filePath, result);
              console.log(`Obfuscated: ${filePath}`);
            } catch (e) {
              console.log(`Skipped (error): ${filePath} - ${e.message}`);
            }
          };

          const walkDir = async (dir) => {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory() && !fullPath.includes('.git') && !fullPath.includes('.github')) {
                await walkDir(fullPath);
              } else if (stat.isFile()) {
                const ext = path.extname(fullPath);
                if (['.js', '.css', '.html', '.htm', '.php'].includes(ext)) {
                  await processFile(fullPath);
                }
              }
            }
          };

          walkDir('.').catch(console.error);
          EOF
          node obfuscate.js

      - name: Deploy to InfinityFree Site 1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          local-dir: ./
          state-name: .ftp-sync-state-1.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
            .ftp-sync-state-1.json
            .ftp-sync-state-3.json
            obfuscate.js
            node_modules/**
          log-level: standard

      # ─── THIRD WEBSITE ─────────────────────────────
      - name: Restore original code for Site 3
        run: git checkout .

      - name: Replace "menist" with "seamless-os" for Site 3 deploy
        run: |
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name '.ftp-sync-state-1.json' \
            ! -name '.ftp-sync-state-3.json' \
            -exec sed -i 's/menist/seamless-os/g' {} +

      - name: Obfuscate code for Site 3
        run: node obfuscate.js

      - name: Deploy to InfinityFree Site 3
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_3 }}
          password: ${{ secrets.FTP_PASSWORD_3 }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          local-dir: ./
          state-name: .ftp-sync-state-3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
            .ftp-sync-state-1.json
            .ftp-sync-state-3.json
            obfuscate.js
            node_modules/**
          log-level: standard
