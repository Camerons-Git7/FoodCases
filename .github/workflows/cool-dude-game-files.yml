name: Generate Game Folders

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch file list and generate folders
      run: |
        # Create core directory
        mkdir -p core
        
        # Fetch the file list from GitHub API
        curl -s "https://api.github.com/repos/CoolDude2349/Offline-HTML-Games-Pack/contents/offline" | \
        jq -r '.[] | select(.type=="file" and (.name | endswith(".html") or endswith(".htm"))) | .name' | \
        while read filename; do
          # Remove .html or .htm extension for folder name
          foldername="${filename%.html}"
          foldername="${foldername%.htm}"
          
          # Create folder inside core
          mkdir -p "core/$foldername"
          
          # Create index.html with proper substitutions
          cat > "core/$foldername/index.html" << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
          <title>FOLDER_NAME_PLACEHOLDER</title>
          <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
          <style>
            * { margin:0; padding:0; border:0; }
            html, body {
              height: 100%;
              width: 100%;
              overflow: hidden;
              background: #000;
              color: #eee;
              font-family: system-ui, sans-serif;
            }
            #loading {
              position: fixed;
              inset: 0;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              background: #111;
              z-index: 999;
            }
            #error {
              padding: 20px;
              text-align: center;
              max-width: 90%;
            }
            iframe {
              display: block;
              width: 100%;
              height: 100%;
              border: none;
            }
          </style>
        </head>
        <body>

        <div id="loading">
          <div>Loading Game...</div>
          <div style="margin-top:12px; opacity:0.7; font-size:0.9rem;">Please Wait — Loading May Take Up To 1 Minute</div>
        </div>

        <iframe id="gameframe" style="display:none;"></iframe>

        <div id="error" style="display:none;"></div>

        <script>
        const GAME_URL = "https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/FILENAME_PLACEHOLDER";

        async function start() {
          const loading = document.getElementById('loading');
          const frame = document.getElementById('gameframe');
          const errDiv = document.getElementById('error');

          try {
            const resp = await fetch(GAME_URL);
            if (!resp.ok) {
              throw new Error(`GitHub responded ${resp.status} — maybe rate limit or file moved`);
            }

            const text = await resp.text();

            // This is the key part — same technique your runner uses
            const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
            const blobUrl = URL.createObjectURL(blob);

            frame.src = blobUrl;
            frame.onload = () => {
              loading.style.display = 'none';
              frame.style.display = 'block';
              // Optional: clean up after a delay
              setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);
            };

          } catch (err) {
            loading.style.display = 'none';
            errDiv.style.display = 'flex';
            errDiv.innerHTML = `
              <strong>Failed to load game</strong><br><br>
              ${err.message}<br><br>
              • Check your internet<br>
              • GitHub may be throttling<br>
              • File might have been removed/renamed<br><br>
              Size hint: original file is ~36 MB — large downloads can fail on slow/unstable connections.
            `;
            console.error(err);
          }
        }

        // Go immediately
        start();
        </script>

        </body>
        </html>
        HTMLEOF
          
          # Replace placeholders with actual values
          sed -i "s|FOLDER_NAME_PLACEHOLDER|$foldername|g" "core/$foldername/index.html"
          sed -i "s|FILENAME_PLACEHOLDER|$filename|g" "core/$foldername/index.html"
          
          echo "Created: core/$foldername/index.html -> $filename"
        done
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add core/
        git diff --staged --quiet || git commit -m "Auto-generate game folders from upstream repo"
        git push
