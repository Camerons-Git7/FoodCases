
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Figure Cloud v2</title>
<style>
body {
  background-color: #030303;
  color: #ededed;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.session-card {
  background: #080808;
  border: 1px solid #121212;
  border-radius: 12px;
  padding: 48px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9);
  opacity: 0;
  transform: translateY(30px) scale(0.96);
  animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes cardEntrance {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
.glow-indicator {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #0d0d0d;
  border: 1px solid #222222;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px auto;
  position: relative;
  box-shadow: 0 0 20px rgba(255,255,255,0.02);
}
.glow-indicator::after {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  border-radius: 50%;
  border: 1px solid #333333;
  opacity: 0;
  animation: pulseGlow 2.5s infinite;
}
@keyframes pulseGlow {
  0% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.12); opacity: 0; }
  100% { transform: scale(1); opacity: 0; }
}
h2 {
  font-size: 22px;
  font-weight: 500;
  margin-top: 0;
  margin-bottom: 14px;
  letter-spacing: -0.4px;
}
p {
  font-size: 13px;
  color: #666666;
  line-height: 1.6;
  margin-bottom: 36px;
}
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s ease, border-color 0.4s ease;
  box-sizing: border-box;
  text-align: center;
  text-decoration: none;
  margin-bottom: 14px;
}
.btn-primary {
  background: #ffffff;
  color: #000000;
  border: none;
}
.btn-primary:hover {
  background: #cccccc;
  transform: translateY(-2px);
}
.btn-secondary {
  background: #09090b;
  color: #a1a1aa;
  border: 1px solid #18181b;
}
.btn-secondary:hover {
  background: #18181b;
  color: #ffffff;
  border-color: #27272a;
  transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="session-card" id="selector-card" style="display: none;">
  <div class="glow-indicator">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666666" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <h2>Choose Session</h2>
  <p>We found a saved progress session from your previous visit to this game. Would you like to resume where you left off or start fresh?</p>
  <button class="btn btn-primary" id="btn-resume">Use Previous Session</button>
  <button class="btn btn-secondary" id="btn-new">Use New Session (Great For More Time)</button>
</div>

<script>
(function() {
  var fullLocation = window.location.href;
  var match = fullLocation.match(/[?&]URL=([^&]*)/i);
  var targetGameUrl = match ? decodeURIComponent(match[1]) : '';

  if (!targetGameUrl) {
    document.body.innerHTML = '<div>Error: Missing game URL.</div>';
    return;
  }

  var storageKey = 'session_save_' + btoa(targetGameUrl);
  var savedCookie = localStorage.getItem(storageKey);

  if (savedCookie) {
    document.getElementById('selector-card').style.display = 'block';

    document.getElementById('btn-resume').addEventListener('click', function() {
      savedCookie.split(';').forEach(function(c) {
        if (c.trim()) {
          document.cookie = c.trim() + '; Path=/; Secure; SameSite=Lax';
        }
      });
      window.location.href = window.location.origin + '/autoplay?game_b64=' + btoa(targetGameUrl);
    });

    document.getElementById('btn-new').addEventListener('click', function() {
      var customName = 'Player ' + (Math.floor(Math.random() * 899) + 100);
      var setupUrl = 'https://www.raccoongame.com/login?redirect_uri=' + encodeURIComponent(window.location.origin + '/autoplay?game_b64=' + btoa(targetGameUrl));
      window.location.href = window.location.origin + '/?url=' + encodeURIComponent(setupUrl) + '&autocreate_name=' + encodeURIComponent(customName);
    });
  } else {
    var customName = 'Player ' + (Math.floor(Math.random() * 899) + 100);
    var setupUrl = 'https://www.raccoongame.com/login?redirect_uri=' + encodeURIComponent(window.location.origin + '/autoplay?game_b64=' + btoa(targetGameUrl));
    window.location.href = window.location.origin + '/?url=' + encodeURIComponent(setupUrl) + '&autocreate_name=' + encodeURIComponent(customName);
  }
})();
</script>
</body>
</html>
