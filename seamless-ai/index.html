<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🔗 Seamless AI 🔗</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0f0;
      --bg: #000;
      --surface: #050505;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    body.fade-in { opacity: 1; }
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }
    .title {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 3s infinite alternate;
      user-select: none;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 1s ease;
    }
    body.fade-in .title {
      opacity: 1;
      transform: translateY(0);
    }
    @keyframes textPulse {
      from { text-shadow: 0 0 10px var(--accent); }
      to { text-shadow: 0 0 20px var(--accent), 0 0 30px #0f0, 0 0 40px #0f0; }
    }
    .chat-container {
      width: 100%;
      max-width: 800px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      transition: all 1s ease 0.3s;
    }
    body.fade-in .chat-container {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .chat-messages {
      height: 400px;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      opacity: 0;
      transform: translateY(10px);
      animation: messageAppear 0.5s ease forwards;
    }
    @keyframes messageAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.user {
      align-self: flex-end;
      background: rgba(0, 255, 0, 0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
      animation-delay: 0.1s;
    }
    .message.ai {
      align-self: flex-start;
      background: rgba(0, 50, 0, 0.6);
      border: 1px solid var(--accent);
      color: #fff;
    }
    .message.loading {
      align-self: flex-start;
      background: rgba(0, 50, 0, 0.4);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-style: italic;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .message.error {
      align-self: center;
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid #f00;
      color: #f00;
    }
    .input-area {
      display: flex;
      padding: 1rem;
      border-top: 2px solid var(--accent);
      background: rgba(0, 0, 0, 0.9);
      gap: 0.75rem;
    }
    .chat-input {
      flex: 1;
      background: rgba(0, 20, 0, 0.8);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--accent);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.4s ease;
    }
    .chat-input::placeholder {
      color: rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
    }
    .chat-input:focus {
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.6);
      background: rgba(0, 30, 0, 0.9);
      transform: scale(1.02);
    }
    .chat-input:focus::placeholder {
      opacity: 0;
      transform: translateX(10px);
    }
    .send-btn {
      background: rgba(0, 50, 0, 0.8);
      border: 2px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      padding: 0.75rem 1.5rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
      overflow: hidden;
    }
    .send-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.3), transparent);
      transition: left 0.5s ease;
    }
    .send-btn:hover::before {
      left: 100%;
    }
    .send-btn:hover {
      background: rgba(0, 100, 0, 0.9);
      box-shadow: 0 0 30px var(--accent);
      transform: translateY(-3px) scale(1.05);
    }
    .send-btn:active {
      transform: translateY(-1px) scale(1.02);
      transition: all 0.1s ease;
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .send-btn:disabled::before {
      display: none;
    }
    .code-block {
      background: rgba(0, 10, 0, 0.95);
      border: 1px solid var(--accent);
      border-radius: 6px;
      margin: 0.75rem 0;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
      animation: codeAppear 0.6s ease;
    }
    @keyframes codeAppear {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .code-header {
      background: rgba(0, 50, 0, 0.8);
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .code-header::before {
      content: '▸';
      font-size: 0.6rem;
    }
    .code-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .code-content pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #0f0;
      line-height: 1.6;
    }
    .code-content code {
      color: #0f0;
      background: none;
      padding: 0;
    }
    p {
      margin: 0.5rem 0;
    }
    p:first-child {
      margin-top: 0;
    }
    p:last-child {
      margin-bottom: 0;
    }
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 20, 0, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #0c0;
      box-shadow: 0 0 10px var(--accent);
    }
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
      box-shadow: 0 0 5px var(--accent);
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>
  <h1 class="title">SEAMLESS AI</h1>
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="message ai">Welcome to Seamless AI. How can I assist you today?</div>
    </div>
    <div class="input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Enter your message..." autocomplete="off" />
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // Hardcoded Groq API Key
    const GROQ_API_KEY = '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';
    
    // Conversation memory
    let conversationHistory = [
      {
        role: 'system',
        content: 'You are Seamless AI, a helpful coding assistant. When providing code, always wrap it in triple backticks with the language identifier (e.g., ```html, ```css, ```javascript, ```python). Be concise and helpful. Remember the context of our conversation.'
      }
    ];

    // Matrix Canvas Setup
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let matrixInterval = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
    const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const nums = '0123456789';
    const alphabet = katakana + latin + nums;
    const fontSize = 16;
    let columns, rainDrops;

    function initMatrix() {
      resizeCanvas();
      columns = Math.floor(canvas.width / fontSize);
      rainDrops = new Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < rainDrops.length; i++) {
        ctx.fillText(alphabet.charAt(Math.floor(Math.random() * alphabet.length)), i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }

    function startMatrix() {
      if (!matrixInterval) {
        initMatrix();
        matrixInterval = setInterval(draw, 30);
      }
    }

    window.addEventListener('resize', () => {
      if (matrixInterval) {
        initMatrix();
      }
    });

    // Chat functionality
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatMessage(text) {
      // Handle code blocks with language identifiers
      const codeBlockRegex = /```(\w*)\n?([\s\S]*?)```/g;
      let lastIndex = 0;
      let result = '';
      let match;
      
      while ((match = codeBlockRegex.exec(text)) !== null) {
        // Add text before code block as paragraphs
        const beforeText = text.substring(lastIndex, match.index).trim();
        if (beforeText) {
          const paragraphs = beforeText.split('\n\n').filter(p => p.trim());
          paragraphs.forEach(p => {
            result += `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`;
          });
        }
        
        // Add code block with language header
        const language = match[1] || 'code';
        const code = match[2].trim();
        result += `
          <div class="code-block">
            <div class="code-header">${escapeHtml(language)}</div>
            <div class="code-content">
              <pre><code>${escapeHtml(code)}</code></pre>
            </div>
          </div>
        `;
        
        lastIndex = match.index + match[0].length;
      }
      
      // Add remaining text as paragraphs
      const remainingText = text.substring(lastIndex).trim();
      if (remainingText) {
        const paragraphs = remainingText.split('\n\n').filter(p => p.trim());
        paragraphs.forEach(p => {
          result += `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`;
        });
      }
      
      return result || `<p>${escapeHtml(text)}</p>`;
    }

    function addMessage(text, type) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      
      if (type === 'ai') {
        messageDiv.innerHTML = formatMessage(text);
      } else if (type === 'loading') {
        messageDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      } else {
        messageDiv.textContent = text;
      }
      
      chatMessages.appendChild(messageDiv);
      
      // Smooth scroll to bottom
      chatMessages.scrollTo({
        top: chatMessages.scrollHeight,
        behavior: 'smooth'
      });
      
      return messageDiv;
    }

    function removeMessage(element) {
      element.style.opacity = '0';
      element.style.transform = 'translateY(-10px)';
      element.style.transition = 'all 0.3s ease';
      setTimeout(() => element.remove(), 300);
    }

    async function sendMessage() {
      const message = chatInput.value.trim();
      if (!message) return;

      // Add user message to UI and history
      addMessage(message, 'user');
      conversationHistory.push({ role: 'user', content: message });
      
      chatInput.value = '';
      chatInput.style.transform = 'scale(0.95)';
      setTimeout(() => chatInput.style.transform = 'scale(1)', 200);
      
      sendBtn.disabled = true;
      sendBtn.style.transform = 'scale(0.95)';

      const loadingMsg = addMessage('', 'loading');

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: conversationHistory,
            temperature: 0.7,
            max_tokens: 2048
          })
        });

        removeMessage(loadingMsg);

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        const aiResponse = data.choices[0].message.content;
        
        // Add AI response to history
        conversationHistory.push({ role: 'assistant', content: aiResponse });
        
        // Keep history manageable (last 20 messages + system)
        if (conversationHistory.length > 22) {
          conversationHistory = [
            conversationHistory[0],
            ...conversationHistory.slice(-20)
          ];
        }
        
        addMessage(aiResponse, 'ai');

      } catch (error) {
        removeMessage(loadingMsg);
        addMessage(`Error: ${error.message}`, 'error');
        console.error('API Error:', error);
      } finally {
        sendBtn.disabled = false;
        sendBtn.style.transform = 'scale(1)';
        setTimeout(() => chatInput.focus(), 100);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Initialize with fade in
    window.onload = () => {
      startMatrix();
      document.body.classList.add('fade-in');
      setTimeout(() => chatInput.focus(), 800);
    };
  </script>
</body>
</html>
