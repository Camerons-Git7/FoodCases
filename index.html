  <style>
    :root {
      --accent: #0f0;
      --bg: #000;
      --surface: #050505;
      --button-size: 117.5px;
      --emoji-size: calc(var(--button-size) * 0.48);
      --text-size: calc(var(--button-size) * 0.18);
      --padding-top: calc(var(--button-size) * 0.114);
      --padding-sides: calc(var(--button-size) * 0.057);
      --padding-bottom: calc(var(--button-size) * 0.04);
      --name-margin: calc(var(--button-size) * 0.015);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
      overflow-x: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.fade-in { opacity: 1; }
    body.fade-out { opacity: 0; }
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }
    #youtube-audio {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -9999;
    }
    .title {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
    }
    @keyframes textPulse {
      from { text-shadow: 0 0 10px var(--accent); }
      to { text-shadow: 0 0 20px var(--accent), 0 0 30px #0f0; }
    }
    .button-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      width: 95vw;
      margin: 0 auto 4rem;
      flex-wrap: wrap;
    }
    .game-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: var(--button-size);
      height: var(--button-size);
      padding: var(--padding-top) var(--padding-sides) var(--padding-bottom);
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      color: var(--accent);
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: var(--text-size);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
      transition: all 0.3s ease;
      user-select: none;
      text-shadow: none;
    }
    .game-button:hover {
      transform: translateX(10px);
      box-shadow: 0 0 40px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .game-button:active { transform: translateX(5px); }
    .emoji {
      font-size: var(--emoji-size);
      color: var(--accent);
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      line-height: 1;
      filter: drop-shadow(0 0 2px var(--accent));
    }
    .game-name {
      font-size: var(--text-size);
      text-align: center;
      white-space: nowrap;
      width: 100%;
      user-select: none;
      margin-top: var(--name-margin);
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bottom-note {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }
    .mute-button {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 1.5rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 0.8rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      min-height: 50px;
    }
    .mute-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .mute-button:active { transform: scale(0.95); }
    .mute-button.fading { pointer-events: none; opacity: 0.7; }
    .mute-button.holding {
      animation: holdPulse 0.5s infinite alternate;
    }
    @keyframes holdPulse {
      from { box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
      to { box-shadow: 0 0 35px var(--accent), 0 0 50px var(--accent); }
    }
    .request-button {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 1rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      min-height: 50px;
      text-decoration: none;
    }
    .request-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .request-button:active { transform: scale(0.95); }
  </style>
</head>

  <audio id="secret-audio" loop style="display: none;">
    <source src="https://www.dropbox.com/scl/fi/m6bhb54qxs186fc8vcr8f/onlymp3.io-Charlie-Kirky-Funk-320-1775831564958.mp3?rlkey=yl3awn2kz3dqllapu2ukdrfp8&st=64t9b1ul&dl=1" type="audio/mpeg">
  </audio>
  <script>
    let ytPlayer, playerReady = false, isMuted = true, volumeFadeInterval = null, hasStartedPlaying = false;
    let isSecretTrack = false;
    let holdTimer = null;
    let isHolding = false;
    const HOLD_DURATION = 5000;
    
    const DEFAULT_VIDEO_ID = 'F0A_R2XV_os';
    const secretAudio = document.getElementById('secret-audio');
    let secretAudioVolume = 1.0;
    
    function updateMuteButton() { 
      const btn = document.getElementById('muteBtn'); 
      if (btn) btn.textContent = isMuted ? '🔈' : '🔊'; 
    }
    
    function fadeVolume(targetVolume, duration, callback) {
      if (isSecretTrack) {
        fadeSecretAudioVolume(targetVolume / 100, duration, callback);
        return;
      }
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) { 
        if (callback) callback(); 
        return; 
      }
      if (volumeFadeInterval) clearInterval(volumeFadeInterval);
      const startVolume = ytPlayer.getVolume() || 0, steps = 30, stepDuration = duration / steps, volumeDiff = targetVolume - startVolume;
      let currentStep = 0;
      const btn = document.getElementById('muteBtn'); 
      if (btn) btn.classList.add('fading');
      volumeFadeInterval = setInterval(() => {
        currentStep++;
        const easeProgress = 1 - Math.pow(1 - (currentStep / steps), 2);
        let newVolume = Math.round(startVolume + (volumeDiff * easeProgress));
        newVolume = Math.max(0, Math.min(100, newVolume));
        ytPlayer.setVolume(newVolume);
        if (currentStep >= steps) { 
          clearInterval(volumeFadeInterval); 
          volumeFadeInterval = null; 
          ytPlayer.setVolume(targetVolume); 
          if (btn) btn.classList.remove('fading'); 
          if (callback) callback(); 
        }
      }, stepDuration);
    }
    
    function fadeSecretAudioVolume(targetVolume, duration, callback) {
      if (volumeFadeInterval) clearInterval(volumeFadeInterval);
      const startVolume = secretAudioVolume, steps = 30, stepDuration = duration / steps, volumeDiff = targetVolume - startVolume;
      let currentStep = 0;
      const btn = document.getElementById('muteBtn'); 
      if (btn) btn.classList.add('fading');
      volumeFadeInterval = setInterval(() => {
        currentStep++;
        const easeProgress = 1 - Math.pow(1 - (currentStep / steps), 2);
        let newVolume = startVolume + (volumeDiff * easeProgress);
        newVolume = Math.max(0, Math.min(1, newVolume));
        secretAudioVolume = newVolume;
        secretAudio.volume = newVolume;
        if (currentStep >= steps) { 
          clearInterval(volumeFadeInterval); 
          volumeFadeInterval = null; 
          secretAudioVolume = targetVolume;
          secretAudio.volume = targetVolume;
          if (btn) btn.classList.remove('fading'); 
          if (callback) callback(); 
        }
      }, stepDuration);
    }
    
    function switchToSecretTrack() {
      if (isSecretTrack) return;
      isSecretTrack = true;
      fadeVolume(0, 300, () => {
        if (playerReady && ytPlayer) {
          ytPlayer.pauseVideo();
          ytPlayer.mute();
        }
        secretAudio.currentTime = 0;
        secretAudio.volume = 1;
        secretAudioVolume = 1;
        secretAudio.play().catch(e => console.log('Audio play failed:', e));
        isMuted = false;
        hasStartedPlaying = true;
        updateMuteButton();
      });
    }
    
    function resetToDefaultTrack() {
      if (!isSecretTrack) return;
      isSecretTrack = false;
      fadeSecretAudioVolume(0, 300, () => {
        secretAudio.pause();
        secretAudio.currentTime = 0;
        if (playerReady && ytPlayer) {
          ytPlayer.seekTo(0);
          ytPlayer.unMute();
          ytPlayer.setVolume(100);
          ytPlayer.playVideo();
        }
        isMuted = false;
        hasStartedPlaying = true;
        updateMuteButton();
      });
    }
    
    function toggleMute() {
      if (isHolding) return;
      isMuted = !isMuted; 
      updateMuteButton();
      if (isSecretTrack) {
        if (isMuted) { 
          fadeSecretAudioVolume(0, 500);
        } else { 
          if (!hasStartedPlaying) {
            secretAudio.play().catch(e => console.log('Audio play failed:', e));
            hasStartedPlaying = true;
          }
          fadeSecretAudioVolume(1, 500);
        }
      } else {
        if (!playerReady) return;
        if (isMuted) { 
          ytPlayer.mute(); 
          fadeVolume(0, 500); 
        } else { 
          ytPlayer.unMute(); 
          if (!hasStartedPlaying) { 
            ytPlayer.playVideo(); 
            hasStartedPlaying = true; 
          } 
          fadeVolume(100, 500); 
        }
      }
    }
    
    function startHoldTimer() {
      isHolding = true;
      const btn = document.getElementById('muteBtn');
      if (btn) btn.classList.add('holding');
      holdTimer = setTimeout(() => {
        if (isSecretTrack) { resetToDefaultTrack(); } else { switchToSecretTrack(); }
        isHolding = false;
        if (btn) btn.classList.remove('holding');
      }, HOLD_DURATION);
    }
    
    function cancelHoldTimer() {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      isHolding = false;
      const btn = document.getElementById('muteBtn');
      if (btn) btn.classList.remove('holding');
    }
    
    function loadYouTubeAPI() { 
      const tag = document.createElement('script'); 
      tag.src = "https://www.youtube.com/iframe_api"; 
      tag.async = true; 
      const firstScriptTag = document.getElementsByTagName('script')[0]; 
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag); 
    }
    
    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', { 
        width: 1, height: 1, videoId: DEFAULT_VIDEO_ID, 
        playerVars: { autoplay: 0, loop: 1, playlist: DEFAULT_VIDEO_ID, controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0, showinfo: 0 }, 
        events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange } 
      });
    }
    
    function onPlayerReady(event) { 
      playerReady = true; 
      ytPlayer.mute(); 
      ytPlayer.setVolume(0); 
    }
    
    function onPlayerStateChange(event) { 
      if (event.data === YT.PlayerState.ENDED) {
        if (!isSecretTrack) { ytPlayer.playVideo(); }
      }
    }
    
    function fadeOutAudio(duration, callback) {
      if (isSecretTrack) {
        fadeSecretAudioVolume(0, duration, callback);
        return;
      }
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) { 
        if (callback) callback(); 
        return; 
      }
      if (volumeFadeInterval) clearInterval(volumeFadeInterval);
      let startVolume = ytPlayer.getVolume() || 100, steps = 20, stepDuration = duration / steps, volumeStep = startVolume / steps, currentStep = 0;
      const fadeInterval = setInterval(() => {
        currentStep++;
        const newVolume = Math.max(0, startVolume - volumeStep * currentStep);
        ytPlayer.setVolume(Math.round(newVolume));
        if (currentStep >= steps || newVolume <= 0) { 
          clearInterval(fadeInterval); 
          ytPlayer.setVolume(0); 
          if (callback) callback(); 
        }
      }, stepDuration);
    }
    
    const canvas = document.getElementById('matrixCanvas'), ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);
    const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ', latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', nums = '0123456789', alphabet = katakana + latin + nums, fontSize = 16, columns = Math.floor(canvas.width / fontSize), rainDrops = new Array(columns).fill(1);
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < rainDrops.length; i++) {
        ctx.fillText(alphabet.charAt(Math.floor(Math.random() * alphabet.length)), i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }
    setInterval(draw, 30);
    
    function fitTextToButton() {
      const buttons = document.querySelectorAll('.game-button');
      const baseSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--button-size'));
      const maxFontSize = baseSize * 0.18;
      const minFontSize = baseSize * 0.09;
      buttons.forEach(button => {
        const textEl = button.querySelector('.game-name');
        const buttonWidth = button.clientWidth - (baseSize * 0.114);
        let fontSize = maxFontSize;
        textEl.style.fontSize = fontSize + 'px';
        while (textEl.scrollWidth > buttonWidth && fontSize > minFontSize) {
          fontSize -= 0.5;
          textEl.style.fontSize = fontSize + 'px';
        }
      });
    }
    
    const muteBtn = document.getElementById('muteBtn');
    
    muteBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startHoldTimer(); });
    muteBtn.addEventListener('mouseup', (e) => {
      e.preventDefault();
      if (isHolding && !holdTimer) { /* timer fired */ } 
      else if (isHolding) { cancelHoldTimer(); toggleMute(); }
    });
    muteBtn.addEventListener('mouseleave', () => { cancelHoldTimer(); });
    muteBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startHoldTimer(); });
    muteBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (isHolding && !holdTimer) { /* timer fired */ } 
      else if (isHolding) { cancelHoldTimer(); toggleMute(); }
    });
    muteBtn.addEventListener('touchcancel', () => { cancelHoldTimer(); });
    
    document.querySelectorAll('.game-button').forEach(button => {
      button.addEventListener('click', event => {
        const url = button.getAttribute('data-url');
        document.body.classList.remove('fade-in');
        document.body.classList.add('fade-out');
        fadeOutAudio(1000, () => { window.location.href = url; });
      });
    });
    
    window.onload = () => {
      updateMuteButton();
      document.body.classList.add('fade-in');
      loadYouTubeAPI();
      fitTextToButton();
    };
    
    window.addEventListener('resize', fitTextToButton);
    
    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out', 'fade-in');
      void document.body.offsetWidth;
      document.body.classList.add('fade-in');
      if (isSecretTrack) {
        if (isMuted) {
          secretAudio.volume = 0;
          secretAudioVolume = 0;
        } else {
          secretAudio.volume = 1;
          secretAudioVolume = 1;
          if (!hasStartedPlaying) {
            secretAudio.play().catch(e => console.log('Audio play failed:', e));
            hasStartedPlaying = true;
          }
        }
      } else if (playerReady && ytPlayer && ytPlayer.setVolume) {
        if (isMuted) { 
          ytPlayer.setVolume(0); ytPlayer.mute(); hasStartedPlaying = false; 
        } else { 
          ytPlayer.setVolume(100); ytPlayer.unMute(); 
          if (!hasStartedPlaying) { ytPlayer.playVideo(); hasStartedPlaying = true; } 
        }
      }
    });
  </script>
</body>
</html>
