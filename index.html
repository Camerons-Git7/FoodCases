<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🔗 Seamless Games 🔗</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0f0; /* Matrix Green */
      --bg: #000;
      --surface: #050505;
      /* CHANGE THIS VALUE TO ADJUST BUTTON SIZE */
      /* Smaller value = smaller buttons = more buttons per row */
      /* Larger value = larger buttons = fewer buttons per row */
      /* Original was 140px */
      --button-size: 100px;
      /* These scale proportionally with button size */
      --emoji-size: calc(var(--button-size) * 0.48);
      --text-size: calc(var(--button-size) * 0.097);
      --padding-top: calc(var(--button-size) * 0.114);
      --padding-sides: calc(var(--button-size) * 0.057);
      --padding-bottom: calc(var(--button-size) * 0.086);
      --name-margin: calc(var(--button-size) * 0.025);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
      overflow-x: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      
      /* Start transparent for fade-in on load */
      opacity: 0;
      transition: opacity 1s ease;
    }
    /* Fade-in to full opacity - happens immediately */
    body.fade-in {
      opacity: 1;
    }
    /* Fade-out animation */
    body.fade-out {
      opacity: 0;
    }
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }
    /* Hidden YouTube audio player container */
    #youtube-audio {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: -9999;
    }
    .title {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
    }
    @keyframes textPulse {
      from {
        text-shadow: 0 0 10px var(--accent);
      }
      to {
        text-shadow: 0 0 20px var(--accent), 0 0 30px #0f0;
      }
    }
    .button-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      width: 95vw;
      margin: 0 auto 4rem;
      flex-wrap: wrap;
    }
    .game-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      width: var(--button-size);
      height: var(--button-size);
      padding: var(--padding-top) var(--padding-sides) var(--padding-bottom);
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      color: var(--accent);
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: var(--text-size);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      overflow: hidden;
      transition: all 0.3s ease;
      user-select: none;
      text-shadow: none;
    }
    .game-button:hover {
      transform: translateX(10px);
      box-shadow: 0 0 40px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .game-button:active {
      transform: translateX(5px);
    }
    .emoji {
      font-size: var(--emoji-size);
      color: var(--accent);
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      line-height: 1;
      filter: drop-shadow(0 0 2px var(--accent));
    }
    .game-name {
      font-size: var(--text-size);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      user-select: none;
      margin-top: var(--name-margin);
      line-height: 1.2;
    }

    /* Bottom note styling */
    .bottom-note {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    /* Mute button styling - bottom left */
    .mute-button {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 1.5rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 0.8rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      min-height: 50px;
    }
    .mute-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .mute-button:active {
      transform: scale(0.95);
    }
    .mute-button.fading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* Request button styling - bottom right */
    .request-button {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      cursor: pointer;
      padding: 0.5rem 1rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
      transition: all 0.3s ease;
      user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      min-height: 50px;
      text-decoration: none;
    }
    .request-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px var(--accent);
      background: rgba(0, 50, 0, 0.9);
    }
    .request-button:active {
      transform: scale(0.95);
    }
  </style>
</head>

  <div class="bottom-note">ⓘ Don't Forget to Refresh Before Gameplay To Ensure You're Playing Latest Updates ⓘ</div>

  <!-- Mute/Unmute Button -->
  <button class="mute-button" id="muteBtn" aria-label="Toggle mute">🔈</button>

  <!-- Request Button -->
  <a class="request-button" href="https://forms.gle/tcMZUPfym8Y7zPsm8" target="_blank" rel="noopener noreferrer" aria-label="Request a game">↗ Request ↗</a>

  <!-- Hidden YouTube Audio Player container -->
  <div id="youtube-audio">
    <div id="yt-player"></div>
  </div>

  <script>
    let ytPlayer;
    let playerReady = false;
    let isMuted = true; // Always start muted as requested
    let volumeFadeInterval = null;
    let hasStartedPlaying = false; // To track if playVideo called after unmute

    // Update mute button icon
    function updateMuteButton() {
      const btn = document.getElementById('muteBtn');
      if (btn) {
        btn.textContent = isMuted ? '🔈' : '🔊';
      }
    }

    // Smooth volume transition function
    function fadeVolume(targetVolume, duration, callback) {
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) {
        if (callback) callback();
        return;
      }
      if (volumeFadeInterval) {
        clearInterval(volumeFadeInterval);
      }
      const startVolume = ytPlayer.getVolume() || 0;
      const steps = 30;
      const stepDuration = duration / steps;
      const volumeDiff = targetVolume - startVolume;
      let currentStep = 0;

      const btn = document.getElementById('muteBtn');
      if (btn) btn.classList.add('fading');

      volumeFadeInterval = setInterval(() => {
        currentStep++;
        const progress = currentStep / steps;
        const easeProgress = 1 - Math.pow(1 - progress, 2);
        let newVolume = Math.round(startVolume + (volumeDiff * easeProgress));
        newVolume = Math.max(0, Math.min(100, newVolume));
        ytPlayer.setVolume(newVolume);
        if (currentStep >= steps) {
          clearInterval(volumeFadeInterval);
          volumeFadeInterval = null;
          ytPlayer.setVolume(targetVolume);
          if (btn) btn.classList.remove('fading');
          if (callback) callback();
        }
      }, stepDuration);
    }

    // Toggle mute with smooth fade, and start video playing on first unmute
    function toggleMute() {
      if (!playerReady) return;
      isMuted = !isMuted;
      updateMuteButton();

      if (isMuted) {
        ytPlayer.mute();
        fadeVolume(0, 500);
      } else {
        ytPlayer.unMute();
        // On first unmute, play video if not started yet
        if (!hasStartedPlaying) {
          ytPlayer.playVideo();
          hasStartedPlaying = true;
        }
        fadeVolume(100, 500);
      }
    }

    // Load YouTube IFrame API asynchronously after page renders
    function loadYouTubeAPI() {
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      tag.async = true;
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('yt-player', {
        width: 1,
        height: 1,
        videoId: 'F0A_R2XV_os',
        playerVars: {
          autoplay: 0,  // do not autoplay immediately
          loop: 1,
          playlist: 'F0A_R2XV_os',
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          rel: 0,
          showinfo: 0
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      playerReady = true;
      ytPlayer.mute();
      ytPlayer.setVolume(0);
      // Do NOT call playVideo here, wait for user to unmute
    }

    function onPlayerStateChange(event) {
      // Loop video if ended
      if (event.data === YT.PlayerState.ENDED) {
        ytPlayer.playVideo();
      }
    }

    // Fade out audio smoothly before page transitions
    function fadeOutAudio(duration, callback) {
      if (!playerReady || !ytPlayer || !ytPlayer.setVolume) {
        if (callback) callback();
        return;
      }
      if (volumeFadeInterval) {
        clearInterval(volumeFadeInterval);
      }
      let startVolume = ytPlayer.getVolume() || 100;
      const steps = 20;
      const stepDuration = duration / steps;
      const volumeStep = startVolume / steps;
      let currentStep = 0;

      const fadeInterval = setInterval(() => {
        currentStep++;
        const newVolume = Math.max(0, startVolume - volumeStep * currentStep);
        ytPlayer.setVolume(Math.round(newVolume));
        if (currentStep >= steps || newVolume <= 0) {
          clearInterval(fadeInterval);
          ytPlayer.setVolume(0);
          if (callback) callback();
        }
      }, stepDuration);
    }

    // Matrix Digital Rain Effect (unchanged)
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
    const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const nums = '0123456789';
    const alphabet = katakana + latin + nums;
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const rainDrops = new Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          rainDrops[i] = 0;
        }
        rainDrops[i]++;
      }
    }
    setInterval(draw, 30);

    // Mute button event handler
    document.getElementById('muteBtn').addEventListener('click', toggleMute);

    // Fade-out animation before redirect with audio fade
    document.querySelectorAll('.game-button').forEach(button => {
      button.addEventListener('click', event => {
        const url = button.getAttribute('data-url');

        document.body.classList.remove('fade-in');
        document.body.classList.add('fade-out');

        fadeOutAudio(1000, () => {
          window.location.href = url;
        });
      });
    });

    window.onload = () => {
      updateMuteButton();
      document.body.classList.add('fade-in');
      loadYouTubeAPI();
    };

    window.addEventListener('pageshow', () => {
      document.body.classList.remove('fade-out', 'fade-in');
      void document.body.offsetWidth;
      document.body.classList.add('fade-in');

      if (playerReady && ytPlayer && ytPlayer.setVolume) {
        if (isMuted) {
          ytPlayer.setVolume(0);
          ytPlayer.mute();
          hasStartedPlaying = false;
        } else {
          ytPlayer.setVolume(100);
          ytPlayer.unMute();
          if (!hasStartedPlaying) {
            ytPlayer.playVideo();
            hasStartedPlaying = true;
          }
        }
      }
    });
  </script>
