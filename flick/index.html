<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backrooms</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;cursor:none}
#menu{cursor:default}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hud{pointer-events:none;z-index:1}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#fff}
#menu{background:radial-gradient(ellipse at center,rgba(8,18,16,0.95),rgba(2,4,4,0.98))}
#gameover{background:rgba(15,2,2,0.92);display:none}
#pause{background:rgba(0,0,0,0.7);display:none;cursor:default}
.title{font-size:clamp(40px,8vw,90px);font-weight:900;letter-spacing:6px;color:#e8e0d4;text-shadow:0 0 40px rgba(10,180,150,0.3),0 4px 0 #1a1a1a;margin-bottom:8px}
.subtitle{font-size:clamp(12px,2vw,18px);color:#5a7a72;letter-spacing:4px;margin-bottom:50px;text-transform:uppercase}
.btn{padding:14px 48px;font-family:inherit;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:2px solid #0a9a82;background:rgba(10,154,130,0.15);color:#0ccaaa;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(10,154,130,0.35);box-shadow:0 0 30px rgba(10,154,130,0.3);transform:scale(1.04)}
.controls{margin-top:40px;font-size:12px;color:#445;line-spacing:2px;text-align:center;line-height:2}
.controls span{color:#6a8a80}
.go-title{font-size:clamp(36px,7vw,72px);font-weight:900;color:#cc2a1a;text-shadow:0 0 40px rgba(200,30,10,0.4);margin-bottom:16px}
.go-score{font-size:24px;color:#e8e0d4;margin-bottom:8px}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.pulse{animation:pulse 2s ease-in-out infinite}
</style>
<base target="_blank">
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="hud"></canvas>
<div id="menu" class="overlay">
<div class="title">FLICK ARENA</div>
<div class="subtitle">Backrooms — Level 0</div>
<button class="btn" id="startBtn">ENTER THE BACKROOMS</button>
<div class="controls">
<span>WASD</span> Move &nbsp; <span>MOUSE</span> Aim &nbsp; <span>SPACE</span> Jump<br>
<span>SHIFT</span> Sprint &nbsp; <span>ESC</span> Pause
</div>
</div>
<div id="pause" class="overlay">
<div style="font-size:36px;font-weight:900;color:#e8e0d4;letter-spacing:4px">PAUSED</div>
<div style="font-size:14px;color:#5a7a72;margin-top:12px" class="pulse">Click to resume</div>
</div>
<script>
const CFG = {
    sensitivity: 0.0022,
    playerRadius: 0.35,
    playerHeight: 1.7,
    eyeHeight: 1.55,
    gravity: 22,
    jumpVel: 8.5,
    walkSpeed: 6.5,
    sprintMult: 1.65,
    accel: 40,
    decel: 18,
    stepHeight: 0.45,
    nearPlane: 0.1,
    farPlane: 120,
    fov: Math.PI / 3,
    mapHalf: 50
};

const M4 = {
    create() { return new Float32Array(16); },
    identity(o) { o.fill(0); o[0]=o[5]=o[10]=o[15]=1; return o; },
    perspective(o, fov, asp, near, far) {
        const f = 1 / Math.tan(fov * 0.5), nf = 1 / (near - far);
        o.fill(0); o[0]=f/asp; o[5]=f; o[10]=(far+near)*nf; o[11]=-1; o[14]=2*far*near*nf;
        return o;
    },
    viewFPS(o, px, py, pz, yaw, pitch) {
        const cy=Math.cos(-yaw), sy=Math.sin(-yaw), cp=Math.cos(-pitch), sp=Math.sin(-pitch);
        o[0]=cy;  o[1]=sy*sp;  o[2]=-sy*cp; o[3]=0;
        o[4]=0;   o[5]=cp;     o[6]=sp;     o[7]=0;
        o[8]=sy;  o[9]=-cy*sp; o[10]=cy*cp; o[11]=0;
        o[12]=-(cy*px+sy*pz);
        o[13]=-(sy*sp*px+cp*py-cy*sp*pz);
        o[14]=-(-sy*cp*px+sp*py+cy*cp*pz);
        o[15]=1;
        return o;
    },
    mul(o, a, b) {
        const t = new Float32Array(16);
        for(let i=0;i<4;i++) for(let j=0;j<4;j++)
            t[j*4+i]=a[i]*b[j*4]+a[4+i]*b[j*4+1]+a[8+i]*b[j*4+2]+a[12+i]*b[j*4+3];
        o.set(t); return o;
    }
};

const glCanvas = document.getElementById('gl');
const hudCanvas = document.getElementById('hud');
const gl = glCanvas.getContext('webgl', { antialias: true, alpha: false });
const ctx = hudCanvas.getContext('2d');
if (!gl) { document.body.innerHTML = '<h1 style="color:#fff;text-align:center;margin-top:40vh">WebGL not supported</h1>'; throw 'No WebGL'; }

const TEX_URLS = {
    carpet: 'https://i.ibb.co/GQYgK9X8/backrooms-carpet-diffuse.png',
    wall: 'https://i.ibb.co/WNk5cdJq/backrooms-wall-diffuse.png',
    ceilingTile: 'https://i.ibb.co/fdSNB7Kt/backrooms-ceiling-tile-diffuse.png',
    ceilingLight: 'https://i.ibb.co/jPDbvWPb/backrooms-ceiling-light-diffuse.png'
};

const VS = `
attribute vec3 aP;
attribute vec3 aN;
attribute vec2 aUV;
attribute float aTexID;
uniform mat4 uVP;
varying vec3 vP;
varying vec3 vN;
varying vec2 vUV;
varying float vTexID;
void main(){
    vP = aP; vN = aN; vUV = aUV; vTexID = aTexID;
    gl_Position = uVP * vec4(aP, 1.0);
}`;

const FS = `
precision mediump float;
varying vec3 vP, vN;
varying vec2 vUV;
varying float vTexID;
uniform vec3 uCam;
uniform sampler2D uTex0, uTex1, uTex2, uTex3;
vec3 sampleTex(int id, vec2 uv) {
    if (id == 0) return texture2D(uTex0, uv).rgb;
    if (id == 1) return texture2D(uTex1, uv).rgb;
    if (id == 2) return texture2D(uTex2, uv).rgb;
    if (id == 3) return texture2D(uTex3, uv).rgb;
    return vec3(0.5);
}
void main(){
    vec3 n = normalize(vN);
    int texID = int(vTexID + 0.5);
    vec3 bc = sampleTex(texID, vUV);
    float emission = (texID == 3) ? 1.5 : 0.0;
    vec3 ld = normalize(vec3(0.25, 1.0, 0.15));
    float d = max(dot(n, ld), 0.0);
    vec3 col = bc * (0.2 + d * 0.5) + bc * emission;
    float fd = length(vP - uCam);
    float fog = smoothstep(18.0, 55.0, fd);
    col = mix(col, vec3(0.06, 0.065, 0.055), fog);
    gl_FragColor = vec4(col, 1.0);
}`;

function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog); gl.useProgram(prog);

const aP = gl.getAttribLocation(prog, 'aP');
const aN = gl.getAttribLocation(prog, 'aN');
const aUV = gl.getAttribLocation(prog, 'aUV');
const aTexID = gl.getAttribLocation(prog, 'aTexID');
const uVP = gl.getUniformLocation(prog, 'uVP');
const uCam = gl.getUniformLocation(prog, 'uCam');
gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aN);
gl.enableVertexAttribArray(aUV); gl.enableVertexAttribArray(aTexID);

function loadTexture(url, unit) {
    const tex = gl.createTexture();
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([128,128,128,255]));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
        gl.activeTexture(gl.TEXTURE0 + unit);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
        gl.generateMipmap(gl.TEXTURE_2D);
    };
    img.src = url;
    return tex;
}

loadTexture(TEX_URLS.carpet, 0);
loadTexture(TEX_URLS.wall, 1);
loadTexture(TEX_URLS.ceilingTile, 2);
loadTexture(TEX_URLS.ceilingLight, 3);

gl.uniform1i(gl.getUniformLocation(prog, 'uTex0'), 0);
gl.uniform1i(gl.getUniformLocation(prog, 'uTex1'), 1);
gl.uniform1i(gl.getUniformLocation(prog, 'uTex2'), 2);
gl.uniform1i(gl.getUniformLocation(prog, 'uTex3'), 3);

const vbo = gl.createBuffer();
const FPV = 9, BPV = FPV * 4;
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.vertexAttribPointer(aP, 3, gl.FLOAT, false, BPV, 0);
gl.vertexAttribPointer(aN, 3, gl.FLOAT, false, BPV, 12);
gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, BPV, 24);
gl.vertexAttribPointer(aTexID, 1, gl.FLOAT, false, BPV, 32);

gl.enable(gl.DEPTH_TEST); gl.enable(gl.CULL_FACE); gl.cullFace(gl.BACK);
gl.clearColor(0.06, 0.065, 0.055, 1);

const projMat = M4.create(), viewMat = M4.create(), vpMat = M4.create();
const TEX_CARPET = 0, TEX_WALL = 1, TEX_CEILING_TILE = 2, TEX_CEILING_LIGHT = 3;

const mapBoxes = [], colliders = [];

function addBox(cx, cy, cz, sx, sy, sz, texID, solid) {
    const idx = mapBoxes.length;
    mapBoxes.push({ cx, cy, cz, sx, sy, sz, texID });
    if (solid !== false) colliders.push(idx);
}

const UV_SCALE = 0.5;

function pushBox(arr, cx, cy, cz, sx, sy, sz, defaultTexID, override) {
    const hx = sx/2, hy = sy/2, hz = sz/2;
    override = override || {};
    const faces = [
        { key: '+z', n: [0,0,1],  v: [[-hx,-hy,hz],[hx,-hy,hz],[hx,hy,hz],[-hx,-hy,hz],[hx,hy,hz],[-hx,hy,hz]] },
        { key: '-z', n: [0,0,-1], v: [[hx,-hy,-hz],[-hx,-hy,-hz],[-hx,hy,-hz],[hx,-hy,-hz],[-hx,hy,-hz],[hx,hy,-hz]] },
        { key: '+x', n: [1,0,0],  v: [[hx,-hy,hz],[hx,-hy,-hz],[hx,hy,-hz],[hx,-hy,hz],[hx,hy,-hz],[hx,hy,hz]] },
        { key: '-x', n: [-1,0,0], v: [[-hx,-hy,-hz],[-hx,-hy,hz],[-hx,hy,hz],[-hx,-hy,-hz],[-hx,hy,hz],[-hx,hy,-hz]] },
        { key: '+y', n: [0,1,0],  v: [[-hx,hy,hz],[hx,hy,hz],[hx,hy,-hz],[-hx,hy,hz],[hx,hy,-hz],[-hx,hy,-hz]] },
        { key: '-y', n: [0,-1,0], v: [[-hx,-hy,-hz],[hx,-hy,-hz],[hx,-hy,hz],[-hx,-hy,-hz],[hx,-hy,hz],[-hx,-hy,hz]] }
    ];
    for (const f of faces) {
        let faceTex = override[f.key] !== undefined ? override[f.key] : defaultTexID;
        if (override[f.key] === undefined && defaultTexID === TEX_WALL) {
            faceTex = (Math.abs(f.n[1]) > 0.5) ? (f.n[1] > 0 ? TEX_CEILING_TILE : TEX_CARPET) : TEX_WALL;
        }
        for (let i = 0; i < 6; i++) {
            const v = f.v[i];
            let u, vt;
            if (Math.abs(f.n[1]) > 0.5) { u = (v[0]+hx)*UV_SCALE; vt = (v[2]+hz)*UV_SCALE; }
            else if (Math.abs(f.n[0]) > 0.5) { u = (v[2]+hz)*UV_SCALE; vt = (v[1]+hy)*UV_SCALE; }
            else { u = (v[0]+hx)*UV_SCALE; vt = (v[1]+hy)*UV_SCALE; }
            arr.push(cx+v[0], cy+v[1], cz+v[2], f.n[0], f.n[1], f.n[2], u, vt, faceTex);
        }
    }
}

const ROOM_H = 3.5, WALL_T = 0.5, DOOR_W = 2.5;

// ================================================================
// FIXED MAP LAYOUT - No overlaps, proper connectivity
// ================================================================

// Grid system: rooms are 10x10, corridors are 6 wide
// All coordinates calculated to ensure walls touch but don't overlap

const C_W = 6;           // corridor width
const C_HW = C_W / 2;    // corridor half-width
const R_W = 10;          // room width/depth
const R_HW = R_W / 2;    // room half-width
const WALL_HALF = WALL_T / 2;

// Key insight: corridor walls are at x = +/- (C_HW + WALL_HALF) = +/- 3.25
// Room walls should be at exactly these same positions to connect

// For east rooms: room west wall at x = 3.25
// Room center x = 3.25 + R_HW + WALL_HALF = 3.25 + 5 + 0.25 = 8.5
const E_ROOM_X = C_HW + WALL_HALF + R_HW + WALL_HALF;  // 8.5
const W_ROOM_X = -(C_HW + WALL_HALF + R_HW + WALL_HALF); // -8.5

// Corridor runs N-S. Let's say from z = -20 to z = 20
// North rooms: south wall at z = -20
// Room center z = -20 - R_HW - WALL_HALF = -25.25
const N_ROOM_Z = -20 - R_HW - WALL_HALF;  // -25.25
const S_ROOM_Z = 20 + R_HW + WALL_HALF;   // 25.25

// Room positions along corridor (z coordinates)
const ROOM_Z_POSITIONS = [-12, 0, 12];

// Build corridor as a single room with open sides, not separate corridor geometry
// Actually, let's build it properly: corridor is the central spine

// CORRIDOR: central spine running N-S at x=0
// We build it as a "room" with doors on east/west sides
// Floor and ceiling span the full corridor length

const CORRIDOR_Z_START = -20;
const CORRIDOR_Z_END = 20;
const CORRIDOR_LEN = CORRIDOR_Z_END - CORRIDOR_Z_START;  // 40
const CORRIDOR_CENTER_Z = (CORRIDOR_Z_START + CORRIDOR_Z_END) / 2;  // 0

// Corridor floor and ceiling - these are the ONLY floor/ceiling in the corridor
addBox(0, 0, CORRIDOR_CENTER_Z, C_W, 0.02, CORRIDOR_LEN, TEX_WALL, false);  // floor
addBox(0, ROOM_H, CORRIDOR_CENTER_Z, C_W, 0.02, CORRIDOR_LEN, TEX_WALL, false);  // ceiling

// Corridor walls (north and south ends are closed, east/west have doorways)
// East wall segments (with doorways at room z positions)
function buildCorridorWall(isEast) {
    const wallX = isEast ? (C_HW + WALL_HALF) : -(C_HW + WALL_HALF);
    const doorPositions = ROOM_Z_POSITIONS;
    
    // Sort door positions
    doorPositions.sort((a,b) => a-b);
    
    // Build wall segments between doors
    let currentZ = CORRIDOR_Z_START;
    
    for (const doorZ of doorPositions) {
        const doorHalf = DOOR_W / 2;
        const segStart = currentZ;
        const segEnd = doorZ - doorHalf;
        
        if (segEnd > segStart + 0.1) {
            const segCenter = (segStart + segEnd) / 2;
            const segLen = segEnd - segStart;
            addBox(wallX, ROOM_H/2, segCenter, WALL_T, ROOM_H, segLen, TEX_WALL);
        }
        currentZ = doorZ + doorHalf;
    }
    
    // Final segment
    if (CORRIDOR_Z_END > currentZ + 0.1) {
        const segCenter = (currentZ + CORRIDOR_Z_END) / 2;
        const segLen = CORRIDOR_Z_END - currentZ;
        addBox(wallX, ROOM_H/2, segCenter, WALL_T, ROOM_H, segLen, TEX_WALL);
    }
}

buildCorridorWall(true);   // east wall
buildCorridorWall(false);  // west wall

// Corridor north and south end walls
addBox(0, ROOM_H/2, CORRIDOR_Z_START - WALL_HALF, C_W + WALL_T*2, ROOM_H, WALL_T, TEX_WALL);
addBox(0, ROOM_H/2, CORRIDOR_Z_END + WALL_HALF, C_W + WALL_T*2, ROOM_H, WALL_T, TEX_WALL);

// ROOMS - East wing (3 rooms along corridor)
for (const rz of ROOM_Z_POSITIONS) {
    // East room
    addRoom(E_ROOM_X, rz, R_W, R_W, ROOM_H, { west: true });
    // West room
    addRoom(W_ROOM_X, rz, R_W, R_W, ROOM_H, { east: true });
}

// North extension rooms (at corridor north end)
addRoom(0, N_ROOM_Z, R_W, R_W, ROOM_H, { south: true });
addRoom(E_ROOM_X, N_ROOM_Z, R_W, R_W, ROOM_H, { west: true, south: true });
addRoom(W_ROOM_X, N_ROOM_Z, R_W, R_W, ROOM_H, { east: true, south: true });

// South extension rooms
addRoom(0, S_ROOM_Z, R_W, R_W, ROOM_H, { north: true });
addRoom(E_ROOM_X, S_ROOM_Z, R_W, R_W, ROOM_H, { west: true, north: true });
addRoom(W_ROOM_X, S_ROOM_Z, R_W, R_W, ROOM_H, { east: true, north: true });

// Deep east/west rooms (2nd row)
const DEEP_E_X = E_ROOM_X + R_W + WALL_T;  // 8.5 + 10 + 0.5 = 19
const DEEP_W_X = W_ROOM_X - R_W - WALL_T;  // -8.5 - 10 - 0.5 = -19

for (const rz of ROOM_Z_POSITIONS) {
    addRoom(DEEP_E_X, rz, R_W, R_W, ROOM_H, { west: true });
    addRoom(DEEP_W_X, rz, R_W, R_W, ROOM_H, { east: true });
}

// Deep corner rooms
addRoom(DEEP_E_X, N_ROOM_Z, R_W, R_W, ROOM_H, { west: true, south: true });
addRoom(DEEP_W_X, N_ROOM_Z, R_W, R_W, ROOM_H, { east: true, south: true });
addRoom(DEEP_E_X, S_ROOM_Z, R_W, R_W, ROOM_H, { west: true, north: true });
addRoom(DEEP_W_X, S_ROOM_Z, R_W, R_W, ROOM_H, { east: true, north: true });

// Build a room with optional doorways on each side
function addRoom(cx, cz, w, d, h, doors) {
    doors = doors || {};
    const wt = WALL_T, hw = w/2, hd = d/2;
    const floorY = 0;  // Floor at y=0
    const ceilY = h;   // Ceiling at y=h
    
    // Floor - only this room's floor, no overlaps
    addBox(cx, floorY, cz, w, 0.02, d, TEX_WALL, false);
    // Ceiling
    addBox(cx, ceilY, cz, w, 0.02, d, TEX_WALL, false);
    
    // North wall (at z = cz - hd - wt/2)
    if (doors.north) {
        const wallZ = cz - hd - WALL_HALF;
        const seg1 = (w - DOOR_W) / 2;
        if (seg1 > 0.1) {
            addBox(cx - hw + seg1/2, h/2, wallZ, seg1, h, WALL_T, TEX_WALL);
            addBox(cx + hw - seg1/2, h/2, wallZ, seg1, h, WALL_T, TEX_WALL);
        }
    } else {
        addBox(cx, h/2, cz - hd - WALL_HALF, w + WALL_T, h, WALL_T, TEX_WALL);
    }
    
    // South wall
    if (doors.south) {
        const wallZ = cz + hd + WALL_HALF;
        const seg1 = (w - DOOR_W) / 2;
        if (seg1 > 0.1) {
            addBox(cx - hw + seg1/2, h/2, wallZ, seg1, h, WALL_T, TEX_WALL);
            addBox(cx + hw - seg1/2, h/2, wallZ, seg1, h, WALL_T, TEX_WALL);
        }
    } else {
        addBox(cx, h/2, cz + hd + WALL_HALF, w + WALL_T, h, WALL_T, TEX_WALL);
    }
    
    // West wall
    if (doors.west) {
        const wallX = cx - hw - WALL_HALF;
        const seg1 = (d - DOOR_W) / 2;
        if (seg1 > 0.1) {
            addBox(wallX, h/2, cz - hd + seg1/2, WALL_T, h, seg1, TEX_WALL);
            addBox(wallX, h/2, cz + hd - seg1/2, WALL_T, h, seg1, TEX_WALL);
        }
    } else {
        addBox(cx - hw - WALL_HALF, h/2, cz, WALL_T, h, d + WALL_T, TEX_WALL);
    }
    
    // East wall
    if (doors.east) {
        const wallX = cx + hw + WALL_HALF;
        const seg1 = (d - DOOR_W) / 2;
        if (seg1 > 0.1) {
            addBox(wallX, h/2, cz - hd + seg1/2, WALL_T, h, seg1, TEX_WALL);
            addBox(wallX, h/2, cz + hd - seg1/2, WALL_T, h, seg1, TEX_WALL);
        }
    } else {
        addBox(cx + hw + WALL_HALF, h/2, cz, WALL_T, h, d + WALL_T, TEX_WALL);
    }
}

// Interior dividers (within rooms) - make sure they don't overlap with walls
addBox(8.5, ROOM_H/2, -8, 6, ROOM_H, 0.5, TEX_WALL);
addBox(12, ROOM_H/2, 0, 0.5, ROOM_H, 5, TEX_WALL);
addBox(19, ROOM_H/2, 4, 0.5, ROOM_H, 5, TEX_WALL);

addBox(-8.5, ROOM_H/2, 8, 6, ROOM_H, 0.5, TEX_WALL);
addBox(-12, ROOM_H/2, 0, 0.5, ROOM_H, 5, TEX_WALL);
addBox(-19, ROOM_H/2, -4, 0.5, ROOM_H, 5, TEX_WALL);

// Support pillars
const pillarPositions = [
    [4,4],[4,-4],[-4,4],[-4,-4],
    [13,4],[13,-4],[-13,4],[-13,-4],
    [4,16],[4,-16],[-4,16],[-4,-16],
    [13,16],[13,-16],[-13,16],[-13,-16]
];
for (const [px,pz] of pillarPositions) addBox(px,ROOM_H/2,pz,0.6,ROOM_H,0.6,TEX_WALL);

// Desks
const desks = [[6,-10],[6,-14],[10,-10],[10,-14],[-6,10],[-6,14],[-10,10],[-10,14],
    [16,-2],[22,-2],[16,2],[22,2],[-16,-2],[-22,-2],[-16,2],[-22,2]];
for (const [dx,dz] of desks) addBox(dx,0.4,dz,1.2,0.8,0.6,TEX_WALL);

// Cubicle partitions
const partitions = [[8,-8,3,0.1,1.4,2],[8,-16,3,0.1,1.4,2],[11,-12,2,0.1,1.4,3],[5,-12,2,0.1,1.4,3],
    [-8,8,3,0.1,1.4,2],[-8,16,3,0.1,1.4,2],[-11,12,2,0.1,1.4,3],[-5,12,2,0.1,1.4,3]];
for (const [px,pz,sx,sy,sz,h] of partitions) addBox(px,h/2+0.8,pz,sx,h,sz,TEX_WALL);

// Dead end alcoves
addBox(3, ROOM_H/2, -30, 3, ROOM_H, 0.5, TEX_WALL);
addBox(-3, ROOM_H/2, -30, 3, ROOM_H, 0.5, TEX_WALL);
addBox(0, ROOM_H/2, -33, 0.5, ROOM_H, 6, TEX_WALL);

addBox(3, ROOM_H/2, 30, 3, ROOM_H, 0.5, TEX_WALL);
addBox(-3, ROOM_H/2, 30, 3, ROOM_H, 0.5, TEX_WALL);
addBox(0, ROOM_H/2, 33, 0.5, ROOM_H, 6, TEX_WALL);

// Outer boundary walls (enclose everything)
// Bounds: x from -24.5 to 24.5, z from -30.5 to 30.5
addBox(0, ROOM_H/2, -30.5, 50, ROOM_H, 0.5, TEX_WALL);
addBox(0, ROOM_H/2, 30.5, 50, ROOM_H, 0.5, TEX_WALL);
addBox(-24.5, ROOM_H/2, 0, 0.5, ROOM_H, 61, TEX_WALL);
addBox(24.5, ROOM_H/2, 0, 0.5, ROOM_H, 61, TEX_WALL);

// Ceiling light panels - attached just below ceiling, no collision, no overlap
// Place them at y = ROOM_H - 0.05 (just a tiny bit below ceiling)
const lightY = ROOM_H - 0.05;
const lightPositions = [
    [0,-10],[0,0],[0,10],[8.5,-12],[8.5,0],[8.5,12],[-8.5,-12],[-8.5,0],[-8.5,12],
    [19,-12],[19,0],[19,12],[-19,-12],[-19,0],[-19,12],[0,-25.25],[0,25.25],
    [8.5,-25.25],[-8.5,-25.25],[8.5,25.25],[-8.5,25.25],
    [19,-25.25],[-19,-25.25],[19,25.25],[-19,25.25]
];
for (const [lx,lz] of lightPositions) {
    // Very thin light panel, non-solid, positioned just below ceiling
    addBox(lx, lightY, lz, 2.0, 0.02, 2.0, TEX_CEILING_LIGHT, false);
}

// Build vertex data
const mapVerts = [];
for (const b of mapBoxes) {
    let override = null;
    // Floor detection: y near 0, thin height
    if (Math.abs(b.cy) < 0.05 && b.sy < 0.1) {
        override = { '+y': TEX_CARPET };
    }
    // Ceiling detection: y near ROOM_H, thin height
    else if (Math.abs(b.cy - ROOM_H) < 0.05 && b.sy < 0.1) {
        override = { '-y': TEX_CEILING_TILE };
    }
    // Light panel detection
    else if (b.texID === TEX_CEILING_LIGHT) {
        override = { '-y': TEX_CEILING_LIGHT, '+y': TEX_CEILING_LIGHT };
    }
    pushBox(mapVerts, b.cx, b.cy, b.cz, b.sx, b.sy, b.sz, b.texID, override);
}
const mapVertCount = mapVerts.length / FPV;

// --- Player ---
const player = { x:0, y:0.1, z:12, vx:0, vy:0, vz:0, yaw:0, pitch:0, onGround:false, health:100, maxHealth:100, score:0 };

const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space')e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code]=false; });
document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === glCanvas && gameState === 'playing') {
        player.yaw -= e.movementX * CFG.sensitivity;
        player.pitch -= e.movementY * CFG.sensitivity;
        player.pitch = Math.max(-Math.PI*0.49, Math.min(Math.PI*0.49, player.pitch));
    }
});

function getAABB(b) {
    return [b.cx-b.sx/2, b.cy-b.sy/2, b.cz-b.sz/2, b.cx+b.sx/2, b.cy+b.sy/2, b.cz+b.sz/2];
}

function resolveCollisions(px,py,pz, rad, h) {
    let ox=px,oy=py,oz=pz;
    const pmin=[ox-rad,oy,oz-rad], pmax=[ox+rad,oy+h,oz+rad];
    for (const ci of colliders) {
        const b = mapBoxes[ci];
        const [bx0,by0,bz0,bx1,by1,bz1] = getAABB(b);
        if (pmax[0]>bx0 && pmin[0]<bx1 && pmax[1]>by0 && pmin[1]<by1 && pmax[2]>bz0 && pmin[2]<bz1) {
            const oX = Math.min(pmax[0]-bx0, bx1-pmin[0]);
            const oY = Math.min(pmax[1]-by0, by1-pmin[1]);
            const oZ = Math.min(pmax[2]-bz0, bz1-pmin[2]);
            if (oY < CFG.stepHeight && oY < oX && oY < oZ && by1 > oy - 0.01 && by1 < oy + CFG.stepHeight + 0.05) {
                oy = by1; continue;
            }
            if (py >= by1 - 0.05 && oy < by1 && oY < oX && oY < oZ) {
                oy = by1;
            } else if (oX <= oZ && oX <= oY) {
                ox += (ox < b.cx) ? -oX : oX;
            } else if (oZ <= oX && oZ <= oY) {
                oz += (oz < b.cz) ? -oZ : oZ;
            } else {
                oy += (oy < b.cy) ? -oY : oY;
            }
            pmin[0]=ox-rad; pmin[1]=oy; pmin[2]=oz-rad;
            pmax[0]=ox+rad; pmax[1]=oy+h; pmax[2]=oz+rad;
        }
    }
    return [ox,oy,oz];
}

function updatePlayer(dt) {
    const sprint = keys['ShiftLeft'] || keys['ShiftRight'];
    const speed = CFG.walkSpeed * (sprint ? CFG.sprintMult : 1);
    const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
    let inputX = 0, inputZ = 0;
    if (keys['KeyW']) inputZ += 1;
    if (keys['KeyS']) inputZ -= 1;
    if (keys['KeyA']) inputX += 1;
    if (keys['KeyD']) inputX -= 1;
    const inputLen = Math.sqrt(inputX*inputX + inputZ*inputZ);
    if (inputLen > 0) { inputX /= inputLen; inputZ /= inputLen; }
    const desVX = (-inputX * cy + inputZ * (-sy)) * speed;
    const desVZ = (-inputX * (-sy) + inputZ * (-cy)) * speed;
    const accelRate = inputLen > 0 ? CFG.accel : CFG.decel;
    player.vx += (desVX - player.vx) * Math.min(1, accelRate * dt);
    player.vz += (desVZ - player.vz) * Math.min(1, accelRate * dt);
    player.vy -= CFG.gravity * dt;
    if (player.vy < -20) player.vy = -20;
    if (keys['Space'] && player.onGround) {
        player.vy = CFG.jumpVel;
        player.onGround = false;
    }
    let nx = player.x + player.vx * dt;
    let ny = player.y + player.vy * dt;
    let nz = player.z + player.vz * dt;
    const resolved = resolveCollisions(nx, ny, nz, CFG.playerRadius, CFG.playerHeight);
    player.x = resolved[0]; player.y = resolved[1]; player.z = resolved[2];
    player.onGround = false;
    if (player.y < 0.02) {
        player.onGround = true;
        if (player.y < 0) { player.y = 0; player.vy = 0; }
    } else {
        const footY = player.y - 0.01;
        const checkMin = [player.x - CFG.playerRadius, footY, player.z - CFG.playerRadius];
        const checkMax = [player.x + CFG.playerRadius, player.y + 0.05, player.z + CFG.playerRadius];
        for (const ci of colliders) {
            const b = mapBoxes[ci];
            const [bx0,by0,bz0,bx1,by1,bz1] = getAABB(b);
            if (checkMax[0] > bx0 && checkMin[0] < bx1 && checkMax[1] > by0 && checkMin[1] < by1 && checkMax[2] > bz0 && checkMin[2] < bz1) {
                if (Math.abs(player.y - by1) < 0.05) {
                    player.onGround = true; player.y = by1; player.vy = 0; break;
                }
            }
        }
    }
    player.x = Math.max(-CFG.mapHalf+0.5, Math.min(CFG.mapHalf-0.5, player.x));
    player.z = Math.max(-CFG.mapHalf+0.5, Math.min(CFG.mapHalf-0.5, player.z));
}

function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    glCanvas.width = w; glCanvas.height = h;
    hudCanvas.width = w; hudCanvas.height = h;
    gl.viewport(0, 0, w, h);
}
window.addEventListener('resize', resize);
resize();

function render() {
    const w = glCanvas.width, h = glCanvas.height;
    const aspect = w / h;
    M4.perspective(projMat, CFG.fov, aspect, CFG.nearPlane, CFG.farPlane);
    const eyeY = player.y + CFG.eyeHeight;
    M4.viewFPS(viewMat, player.x, eyeY, player.z, player.yaw, player.pitch);
    M4.mul(vpMat, projMat, viewMat);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.useProgram(prog);
    gl.uniformMatrix4fv(uVP, false, vpMat);
    gl.uniform3f(uCam, player.x, eyeY, player.z);
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(mapVerts), gl.STATIC_DRAW);
    gl.vertexAttribPointer(aP, 3, gl.FLOAT, false, BPV, 0);
    gl.vertexAttribPointer(aN, 3, gl.FLOAT, false, BPV, 12);
    gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, BPV, 24);
    gl.vertexAttribPointer(aTexID, 1, gl.FLOAT, false, BPV, 32);
    gl.drawArrays(gl.TRIANGLES, 0, mapVertCount);
}

function drawHUD() {
    const w = hudCanvas.width, h = hudCanvas.height;
    ctx.clearRect(0, 0, w, h);
}

let gameState = 'menu';
let lastTime = 0;

function startGame() {
    player.x = 0; player.y = 0.1; player.z = 12;
    player.vx = 0; player.vy = 0; player.vz = 0;
    player.yaw = 0; player.pitch = 0;
    player.health = 100; player.score = 0; player.onGround = false;
    gameState = 'playing';
    document.getElementById('menu').style.display = 'none';
    document.getElementById('pause').style.display = 'none';
    glCanvas.requestPointerLock();
}

document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement !== glCanvas && gameState === 'playing') {
        gameState = 'paused';
        document.getElementById('pause').style.display = 'flex';
    }
});

document.getElementById('pause').addEventListener('click', () => {
    if (gameState === 'paused') {
        gameState = 'playing';
        document.getElementById('pause').style.display = 'none';
        glCanvas.requestPointerLock();
    }
});

document.getElementById('startBtn').addEventListener('click', startGame);
glCanvas.addEventListener('contextmenu', e => e.preventDefault());

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
    lastTime = timestamp;
    if (gameState === 'playing') updatePlayer(dt);
    if (gameState === 'playing' || gameState === 'paused') { render(); drawHUD(); }
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
