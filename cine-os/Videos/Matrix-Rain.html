<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain</title>
  <style>
    * { margin: 0; padding: 0; overflow: hidden; }
    body {
      background: #000;
      height: 100vh;
      width: 100vw;
      position: relative;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    body.fade-in {
      opacity: 1;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    let width, height;
    let columns;
    let drops = [];
    const fontSize = 16;
    const alphabet = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      columns = Math.floor(width / fontSize);
      drops = Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, width, height);
      
      ctx.fillStyle = '#0F0';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = alphabet[Math.floor(Math.random() * alphabet.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    function startMatrix() {
      resize();
      // Start the rain loop
      setInterval(draw, 35);
    }

    // Initialize everything with fade-in
    window.onload = () => {
      startMatrix();
      // Trigger fade-in at the same time
      setTimeout(() => {
        document.body.classList.add('fade-in');
      }, 10); // Small delay ensures animation starts first
    };

    window.addEventListener('resize', resize);
  </script>

</body>
</html>
