<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imgdrop — instant image URLs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #555;
    --success: #47ffb8;
    --radius: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .card {
    width: 100%;
    max-width: 580px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }

  .card-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }

  .dot.active { background: var(--accent); }

  .card-title {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-left: auto;
  }

  /* Drop zone */
  .dropzone {
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    min-height: 220px;
    outline: none;
  }

  .dropzone.drag-over {
    background: rgba(232,255,71,0.04);
  }

  .dropzone-border {
    position: absolute;
    inset: 1rem;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    pointer-events: none;
    transition: border-color 0.15s;
  }

  .dropzone.drag-over .dropzone-border,
  .dropzone:hover .dropzone-border {
    border-color: var(--accent);
  }

  .upload-icon {
    width: 52px;
    height: 52px;
    position: relative;
    z-index: 1;
  }

  .upload-icon svg {
    width: 100%;
    height: 100%;
  }

  .drop-text {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  .drop-sub {
    font-size: 0.7rem;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }

  .drop-sub span {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }

  #fileInput { display: none; }

  /* Preview */
  .preview-section {
    display: none;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
    flex-direction: column;
    gap: 1rem;
    animation: slideUp 0.2s ease;
  }

  .preview-section.visible {
    display: flex;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .preview-img-wrap {
    width: 100%;
    max-height: 200px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-img-wrap img {
    max-width: 100%;
    max-height: 200px;
    object-fit: contain;
    display: block;
  }

  .file-meta {
    display: flex;
    gap: 1rem;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .file-meta strong {
    color: var(--text);
  }

  /* Upload button */
  .upload-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 0.85rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--radius);
    width: 100%;
    transition: background 0.1s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .upload-btn:hover { background: #d4eb30; }
  .upload-btn:active { transform: scale(0.99); }
  .upload-btn:disabled {
    background: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }

  .progress-wrap.visible { display: flex; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
  }

  /* Result */
  .result-section {
    display: none;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
    flex-direction: column;
    gap: 0.75rem;
    animation: slideUp 0.2s ease;
  }

  .result-section.visible { display: flex; }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .result-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
  }

  .url-row {
    display: flex;
    gap: 0.5rem;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .url-input:focus { border-color: var(--accent); }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0 1rem;
    cursor: pointer;
    border-radius: var(--radius);
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--success);
    color: var(--success);
  }

  .actions-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .action-link {
    font-size: 0.65rem;
    color: var(--muted);
    text-decoration: none;
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    background: none;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  .action-link:hover { border-color: var(--muted); color: var(--text); }

  /* Error */
  .error-msg {
    display: none;
    font-size: 0.7rem;
    color: var(--accent2);
    padding: 0.75rem 1rem;
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: var(--radius);
    background: rgba(255,107,53,0.05);
    margin: 0 1.5rem 1.5rem;
    animation: slideUp 0.2s ease;
  }

  .error-msg.visible { display: block; }

  /* History */
  .history-section {
    display: none;
    margin-top: 2rem;
    width: 100%;
    max-width: 580px;
  }

  .history-section.visible { display: block; }

  .history-header {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 0.25rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    animation: slideUp 0.2s ease;
  }

  .history-thumb {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .history-url {
    flex: 1;
    font-size: 0.65rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-copy {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0.2rem 0.4rem;
    border-radius: 2px;
    transition: color 0.1s;
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
  }

  .history-copy:hover { color: var(--accent); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.visible { display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="logo">img<span>drop</span></div>
  <div class="tagline">upload once → get a permanent URL</div>
</header>

<div class="card">
  <div class="card-header">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <span class="card-title">imgbb upload</span>
  </div>

  <div class="dropzone" id="dropzone" tabindex="0">
    <div class="dropzone-border"></div>
    <div class="upload-icon">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="14" width="40" height="30" rx="2" stroke="#555" stroke-width="2"/>
        <path d="M6 36l10-10 8 8 8-12 14 18" stroke="#555" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="18" cy="24" r="3" fill="#555"/>
        <path d="M26 6v12M21 9l5-5 5 5" stroke="#e8ff47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="drop-text">Drop image here</div>
    <div class="drop-sub">or <span id="browseLink">browse files</span> — PNG, JPG, GIF, WEBP</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="preview-section" id="previewSection">
    <div class="preview-img-wrap">
      <img id="previewImg" src="" alt="Preview">
    </div>
    <div class="file-meta">
      <span>File: <strong id="metaName">—</strong></span>
      <span>Size: <strong id="metaSize">—</strong></span>
      <span>Type: <strong id="metaType">—</strong></span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>
    <button class="upload-btn" id="uploadBtn">
      <div class="spinner" id="spinner"></div>
      <span id="uploadBtnText">↑ Upload & Get URL</span>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-section" id="resultSection">
    <div class="result-label">Upload successful</div>
    <div class="url-row">
      <input type="text" class="url-input" id="urlOutput" readonly>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="actions-row">
      <a class="action-link" id="openLink" target="_blank">Open ↗</a>
      <button class="action-link" id="resetBtn">Upload another</button>
    </div>
  </div>
</div>

<div class="history-section" id="historySection">
  <div class="history-header">Recent uploads</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const browseLink = document.getElementById('browseLink');
  const previewSection = document.getElementById('previewSection');
  const previewImg = document.getElementById('previewImg');
  const metaName = document.getElementById('metaName');
  const metaSize = document.getElementById('metaSize');
  const metaType = document.getElementById('metaType');
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadBtnText = document.getElementById('uploadBtnText');
  const spinner = document.getElementById('spinner');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const resultSection = document.getElementById('resultSection');
  const urlOutput = document.getElementById('urlOutput');
  const copyBtn = document.getElementById('copyBtn');
  const openLink = document.getElementById('openLink');
  const resetBtn = document.getElementById('resetBtn');
  const errorMsg = document.getElementById('errorMsg');
  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');

  // ImgBB free API key (public demo key)
  const API_KEY = '9c96da8cf964e9b1331c5275d0f455c9';
  // ↑ Replace with your own free key from https://api.imgbb.com/

  let currentFile = null;
  let uploadHistory = JSON.parse(localStorage.getItem('imgdrop_history') || '[]');

  renderHistory();

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
    else showError('Please drop an image file.');
  });

  browseLink.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('click', e => { if (e.target !== browseLink) fileInput.click(); });
  dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    currentFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      metaName.textContent = file.name.length > 22 ? file.name.slice(0, 20) + '…' : file.name;
      metaSize.textContent = formatSize(file.size);
      metaType.textContent = file.type.split('/')[1].toUpperCase();
      previewSection.classList.add('visible');
      resultSection.classList.remove('visible');
      errorMsg.classList.remove('visible');
      progressWrap.classList.remove('visible');
      progressFill.style.width = '0%';
      uploadBtn.disabled = false;
      spinner.classList.remove('visible');
      uploadBtnText.textContent = '↑ Upload & Get URL';
    };
    reader.readAsDataURL(file);
  }

  uploadBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    uploadBtn.disabled = true;
    spinner.classList.add('visible');
    uploadBtnText.textContent = 'Uploading…';
    progressWrap.classList.add('visible');
    errorMsg.classList.remove('visible');
    resultSection.classList.remove('visible');

    try {
      const base64 = await toBase64(currentFile);
      const formData = new FormData();
      formData.append('image', base64.split(',')[1]);
      formData.append('name', currentFile.name.replace(/\.[^.]+$/, ''));

      // Animated progress (simulated)
      let prog = 0;
      const progInterval = setInterval(() => {
        prog = Math.min(prog + Math.random() * 18, 85);
        setProgress(prog);
      }, 200);

      const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
        method: 'POST',
        body: formData
      });

      clearInterval(progInterval);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      if (!data.success) throw new Error(data.error?.message || 'Upload failed');

      setProgress(100);

      await delay(300);

      const url = data.data.url;
      urlOutput.value = url;
      openLink.href = url;
      resultSection.classList.add('visible');

      // Save to history
      uploadHistory.unshift({ url, thumb: data.data.thumb?.url || data.data.url, name: currentFile.name });
      if (uploadHistory.length > 10) uploadHistory.pop();
      localStorage.setItem('imgdrop_history', JSON.stringify(uploadHistory));
      renderHistory();

    } catch (err) {
      showError('Upload failed: ' + err.message + '. Make sure you have a valid ImgBB API key.');
    } finally {
      uploadBtn.disabled = false;
      spinner.classList.remove('visible');
      uploadBtnText.textContent = '↑ Upload & Get URL';
    }
  });

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(urlOutput.value);
      copyBtn.textContent = '✓ Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
    } catch {
      urlOutput.select();
      document.execCommand('copy');
    }
  });

  resetBtn.addEventListener('click', () => {
    currentFile = null;
    fileInput.value = '';
    previewSection.classList.remove('visible');
    resultSection.classList.remove('visible');
    errorMsg.classList.remove('visible');
  });

  function renderHistory() {
    if (!uploadHistory.length) { historySection.classList.remove('visible'); return; }
    historySection.classList.add('visible');
    historyList.innerHTML = '';
    uploadHistory.slice(0, 5).forEach(item => {
      const el = document.createElement('div');
      el.className = 'history-item';
      el.innerHTML = `
        <img class="history-thumb" src="${item.thumb}" alt="" loading="lazy">
        <span class="history-url">${item.url}</span>
        <button class="history-copy" data-url="${item.url}">copy</button>
      `;
      el.querySelector('.history-copy').addEventListener('click', async function() {
        await navigator.clipboard.writeText(this.dataset.url).catch(() => {});
        this.textContent = '✓';
        setTimeout(() => this.textContent = 'copy', 1500);
      });
      historyList.appendChild(el);
    });
  }

  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); progressWrap.classList.remove('visible'); }
  function setProgress(p) { progressFill.style.width = p + '%'; progressLabel.textContent = Math.round(p) + '%'; }
  function formatSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB'; }
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
  function toBase64(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); }); }
</script>
</body>
</html>
