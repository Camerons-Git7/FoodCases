<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet WASM</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .loading { background: #e3f2fd; color: #1565c0; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Scramjet WASM Loader</h1>
    <div id="status" class="status loading">Loading scripts...</div>
    <div id="output"></div>

    <!-- Load JS files -->
    <script src="/scramjet.all.js"></script>
    <script src="/scramjet.bundle.js"></script>
    <script src="/scramjet.sync.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');

        function log(msg) {
            const pre = document.createElement('pre');
            pre.textContent = msg;
            outputEl.appendChild(pre);
        }

        // Check if scripts loaded
        const scripts = ['/scramjet.all.js', '/scramjet.bundle.js', '/scramjet.sync.js'];
        let loaded = 0;

        scripts.forEach(src => {
            const script = document.querySelector(`script[src="${src}"]`);
            if (script) {
                script.onload = () => {
                    loaded++;
                    log(`Loaded: ${src}`);
                    if (loaded === scripts.length) {
                        loadWasm();
                    }
                };
                script.onerror = () => {
                    statusEl.className = 'status error';
                    statusEl.textContent = `Failed to load: ${src}`;
                    log(`Error loading: ${src}`);
                };
            }
        });

        async function loadWasm() {
            statusEl.className = 'status loading';
            statusEl.textContent = 'Loading WASM...';
            
            try {
                const response = await fetch('/scramjet.wasm.wasm');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const wasmBuffer = await response.arrayBuffer();
                log(`WASM fetched: ${wasmBuffer.byteLength} bytes`);

                // Try to instantiate the WASM module
                const wasmModule = await WebAssembly.compile(wasmBuffer);
                const wasmInstance = await WebAssembly.instantiate(wasmModule, {
                    env: {
                        memory: new WebAssembly.Memory({ initial: 256, maximum: 512 }),
                        __memory_base: 0,
                        __table_base: 0,
                        abort: () => { throw new Error('WASM abort called'); }
                    }
                });

                statusEl.className = 'status success';
                statusEl.textContent = 'WASM loaded and instantiated successfully!';
                log(`WASM exports: ${Object.keys(wasmInstance.exports).join(', ')}`);
                
                // Make wasm available globally for the loaded JS files
                window.scramjetWasm = wasmInstance;
                
            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = 'WASM loading failed';
                log(`Error: ${err.message}`);
            }
        }
    </script>
</body>
</html>
