<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .loading { background: #e3f2fd; color: #1565c0; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; }
        input, button {
            padding: 10px 14px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            background: #1565c0;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #0d47a1; }
        #proxy-frame {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Scramjet Proxy</h1>
    <div id="status" class="status loading">Loading Scramjet...</div>
    <div id="output"></div>

    <div id="proxy-ui" style="display:none; margin-top: 20px;">
        <input type="text" id="url-input" placeholder="Enter URL to proxy..." style="width: 60%;">
        <button onclick="go()">Go</button>
        <iframe id="proxy-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
    </div>

    <!-- Load Scramjet bundle -->
    <script src="/scramjet.all.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const proxyUi = document.getElementById('proxy-ui');

        function log(msg) {
            const pre = document.createElement('pre');
            pre.textContent = msg;
            outputEl.appendChild(pre);
        }

        async function initScramjet() {
            try {
                // Check if the global loader function exists
                if (typeof $scramjetLoadController !== 'function') {
                    throw new Error('scramjet.all.js did not load correctly. $scramjetLoadController is not defined.');
                }

                const { ScramjetController } = $scramjetLoadController();

                const scramjet = new ScramjetController({
                    files: {
                        wasm: "/scramjet.wasm.wasm",
                        all: "/scramjet.all.js",
                        sync: "/scramjet.sync.js",
                    }
                });

                // Initialize Scramjet (this loads the WASM internally)
                await scramjet.init();
                log('ScramjetController initialized');

                // Register the service worker
                const reg = await navigator.serviceWorker.register("sw.js");
                log('Service Worker registered: ' + reg.scope);

                // Wait for the SW to be ready
                await navigator.serviceWorker.ready;
                log('Service Worker ready');

                statusEl.className = 'status success';
                statusEl.textContent = 'Scramjet ready!';
                proxyUi.style.display = 'block';

                // Store for global use
                window.scramjet = scramjet;

            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Error: ' + err.message;
                log('Error: ' + err.stack);
            }
        }

        async function go() {
            const url = document.getElementById('url-input').value;
            if (!url) return;

            try {
                const encoded = window.scramjet.encodeUrl(url);
                document.getElementById('proxy-frame').src = encoded;
            } catch (err) {
                log('Proxy error: ' + err.message);
            }
        }

        // Start initialization when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initScramjet);
        } else {
            initScramjet();
        }
    </script>
</body>
</html>
