<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Room - Live Stream</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #08102b;
      color: #fffdfc;
    }
    .player-box {
      position: relative;
      width: 100%;
      max-width: 1280px;
      margin: 20px auto;
      background: #000;
    }
    iframe, video {
      width: 100%;
      height: 500px;
      border: none;
      background: #000;
    }
    .info-area {
      max-width: 1280px;
      margin: 0 auto;
      padding: 15px;
      text-align: center;
    }
    .scoreboard-hero {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }
    .sb-team img {
      height: 65px;
      margin-bottom: 8px;
    }
    .action-btn {
      background: #0c9784;
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    .servers-area {
      max-width: 1280px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .server-item {
      padding: 14px;
      background: #252526;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .server-item.active {
      background: #0c9784;
      color: white;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 500px;
      color: #0c9784;
    }
  </style>
</head>
<body>

<div class="player-wrap">

  <!-- PLAYER -->
  <div class="player-box" id="stp-player-box">
    <!-- LOADER -->
    <div class="loader" id="stp-loader">
      <div style="font-size:1.4rem;">Connecting to stream...</div>
    </div>

    <!-- IFRAME PLAYER -->
    <iframe id="stp-iframe" allow="fullscreen; autoplay; encrypted-media" style="display:none;"></iframe>

    <!-- HLS VIDEO -->
    <div id="vjs-container" style="display:none;">
      <video id="main-hls-video" controls autoplay playsinline></video>
    </div>
  </div>

  <!-- MATCH INFO -->
  <div class="info-area">
    <div class="scoreboard-hero">
      <div class="sb-team">
        <img id="logo-home" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/2f/No-flags-pictogram.svg'" src="">
        <div id="name-home">Home Team</div>
      </div>
      <div style="font-size:2rem; font-weight:bold;">VS</div>
      <div class="sb-team">
        <img id="logo-away" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/2f/No-flags-pictogram.svg'" src="">
        <div id="name-away">Away Team</div>
      </div>
    </div>

    <button class="action-btn" onclick="stpFullscreen()">⛶ Fullscreen</button>
  </div>

  <!-- STREAM SOURCES -->
  <div class="servers-area">
    <h3 style="color:#0c9784; text-align:center;">Available Streams</h3>
    <div id="stp-servers"></div>
  </div>

</div>

<script>
const DATA_API = "https://pew.neostream.pw/fetch/all";

let state = { matchId: "", streamIndex: 0 };
let matchDataGlobal = null;

async function fetchData() {
  try {
    const res = await fetch(`${DATA_API}?t=${Math.floor(Date.now()/60000)}`);
    const data = await res.json();
    if (!data?.length) return;

    const match = data.find(m => String(m.id) === state.matchId) || data[0];
    matchDataGlobal = match;

    // Update teams
    document.getElementById('name-home').textContent = match.team_home || 'Home';
    document.getElementById('name-away').textContent = match.team_away || 'Away';
    document.getElementById('logo-home').src = match.logo_home || '';
    document.getElementById('logo-away').src = match.logo_away || '';

    renderServers(match);

    // Auto start first stream
    if (!document.getElementById('stp-iframe').src) {
      launchPlayer(match.streams?.[0]);
    }
  } catch(e) {
    console.error(e);
  }
}

function renderServers(match) {
  const container = document.getElementById('stp-servers');
  container.innerHTML = '';

  (match.streams || []).forEach((stream, i) => {
    const div = document.createElement('div');
    div.className = `server-item ${i === state.streamIndex ? 'active' : ''}`;
    div.innerHTML = `<strong>${stream.name || 'Default Stream ' + (i+1)}</strong>`;
    div.onclick = () => switchServer(i);
    container.appendChild(div);
  });
}

function switchServer(index) {
  state.streamIndex = index;
  const stream = matchDataGlobal?.streams?.[index];
  if (stream) launchPlayer(stream);
  renderServers(matchDataGlobal);
}

function launchPlayer(stream) {
  const loader = document.getElementById('stp-loader');
  const iframe = document.getElementById('stp-iframe');
  const vjsContainer = document.getElementById('vjs-container');
  const video = document.getElementById('main-hls-video');

  loader.style.display = 'flex';

  if (stream.type?.toLowerCase() === 'm3u8' || stream.m3u8) {
    iframe.style.display = 'none';
    vjsContainer.style.display = 'block';
    video.src = stream.m3u8 || stream.page;
    video.load();
    video.play().catch(() => {});
  } else {
    vjsContainer.style.display = 'none';
    iframe.style.display = 'block';
    iframe.src = stream.page || stream.m3u8;
  }

  setTimeout(() => loader.style.display = 'none', 1200);
}

function stpFullscreen() {
  const box = document.getElementById('stp-player-box');
  if (box.requestFullscreen) box.requestFullscreen();
}

// Load data
fetchData();
setInterval(fetchData, 60000);
</script>

</body>
</html>
