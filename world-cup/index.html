<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup - Live</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: #08102b;
      color: #fffdfc;
      height: 100vh;
      overflow: hidden;
    }
    .player-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
      padding: 10px;
      gap: 10px;
    }
    .player-box {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe, video {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      display: block;
    }
    .info-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #12183a;
      border-radius: 8px;
      gap: 16px;
    }
    .scoreboard-hero {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 1.1rem;
    }
    .sb-team {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-team img {
      height: 36px;
      width: 36px;
      object-fit: contain;
    }
    .vs-text {
      font-size: 1.2rem;
      font-weight: bold;
      opacity: 0.7;
    }
    .action-btn {
      background: #0c9784;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }
    .action-btn:hover {
      background: #0aa88f;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #0c9784;
      font-size: 1.2rem;
    }
  </style>
<base target="_blank">
</head>
<body>

<div class="player-wrap">

  <!-- PLAYER -->
  <div class="player-box" id="stp-player-box">
    <!-- LOADER -->
    <div class="loader" id="stp-loader">
      <div>Connecting to stream...</div>
    </div>

    <!-- IFRAME PLAYER -->
    <iframe id="stp-iframe" allow="fullscreen; autoplay; encrypted-media" style="display:none;"></iframe>

    <!-- HLS VIDEO -->
    <div id="vjs-container" style="display:none; height:100%;">
      <video id="main-hls-video" controls autoplay playsinline></video>
    </div>
  </div>

  <!-- MATCH INFO -->
  <div class="info-area">
    <div class="scoreboard-hero">
      <div class="sb-team">
        <img id="logo-home" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/2f/No-flags-pictogram.svg'" src="">
        <div id="name-home">Home Team</div>
      </div>
      <div class="vs-text">VS</div>
      <div class="sb-team">
        <img id="logo-away" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/2f/No-flags-pictogram.svg'" src="">
        <div id="name-away">Away Team</div>
      </div>
    </div>

    <button class="action-btn" onclick="stpFullscreen()">⛶ Fullscreen</button>
  </div>

</div>

<script>
const DATA_API = "https://pew.neostream.pw/fetch/all";

let state = { matchId: "", streamIndex: 0 };
let matchDataGlobal = null;

async function fetchData() {
  try {
    const res = await fetch(`${DATA_API}?t=${Math.floor(Date.now()/60000)}`);
    const data = await res.json();
    if (!data?.length) return;

    const match = data.find(m => String(m.id) === state.matchId) || data[0];
    matchDataGlobal = match;

    // Update teams
    document.getElementById('name-home').textContent = match.team_home || 'Home';
    document.getElementById('name-away').textContent = match.team_away || 'Away';
    document.getElementById('logo-home').src = match.logo_home || '';
    document.getElementById('logo-away').src = match.logo_away || '';

    // Auto-select English stream, fallback to first
    let englishIndex = 0;
    if (match.streams && match.streams.length > 0) {
      const engIdx = match.streams.findIndex(s =>
        /english/i.test(s.name || '')
      );
      if (engIdx !== -1) englishIndex = engIdx;
    }

    state.streamIndex = englishIndex;
    const stream = match.streams?.[englishIndex];

    if (stream && !document.getElementById('stp-iframe').src) {
      launchPlayer(stream);
    }
  } catch(e) {
    console.error(e);
  }
}

function launchPlayer(stream) {
  const loader = document.getElementById('stp-loader');
  const iframe = document.getElementById('stp-iframe');
  const vjsContainer = document.getElementById('vjs-container');
  const video = document.getElementById('main-hls-video');

  loader.style.display = 'flex';

  if (stream.type?.toLowerCase() === 'm3u8' || stream.m3u8) {
    iframe.style.display = 'none';
    vjsContainer.style.display = 'block';
    video.src = stream.m3u8 || stream.page;
    video.load();
    video.play().catch(() => {});
  } else {
    vjsContainer.style.display = 'none';
    iframe.style.display = 'block';
    iframe.src = stream.page || stream.m3u8;
  }

  setTimeout(() => loader.style.display = 'none', 1200);
}

function stpFullscreen() {
  const box = document.getElementById('stp-player-box');
  if (box.requestFullscreen) box.requestFullscreen();
}

// Load data
fetchData();
setInterval(fetchData, 60000);
</script>

</body>
</html>
