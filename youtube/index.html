<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>▶︎ YouTube ▶︎</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Initial screen (input) */
    #input-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      transition: opacity 0.4s ease;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      font-size: 1.25rem;
      color: #a1a1aa;
      margin-bottom: 2.5rem;
      max-width: 500px;
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 700px;
      width: 100%;
      justify-content: center;
    }

    input[type="text"] {
      flex: 1;
      min-width: 300px;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 12px;
      color: white;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: #ff0000;
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.15);
    }

    button {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #cc0000;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Video screen */
    #video-screen {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 100vw;
      overflow: hidden;
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading state */
    .loading {
      font-size: 1.5rem;
      color: #888;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.4rem; }
      .input-group { flex-direction: column; align-items: stretch; }
      input, button { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Initial input screen -->
  <div id="input-screen">
    <h1>YouTube</h1>
    <p class="subtitle">Paste any YouTube link below to watch without restrictions.</p>
    
    <div class="input-group">
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." autofocus />
      <button id="submit">Watch</button>
    </div>
  </div>

  <!-- Full-video container (hidden until watch is clicked) -->
  <div id="video-screen">
    <div class="video-container">
      <iframe 
        id="player" 
        src="" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
    <div class="loading" id="loading">Loading video...</div>
  </div>

  <script>
    const submitBtn = document.getElementById('submit');
    const urlInput  = document.getElementById('url');
    const inputScreen = document.getElementById('input-screen');
    const videoScreen = document.getElementById('video-screen');
    const player     = document.getElementById('player');
    const loading    = document.getElementById('loading');

    const base = "https://www.youtube-nocookie.com/embed/";
    const params = "?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1";

    submitBtn.addEventListener('click', () => {
      const input = urlInput.value.trim();
      if (!input) return;

      // Extract video ID (handles many formats: full url, youtu.be, embed, etc.)
      let videoId = input.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/)?.[1];
      if (!videoId && input.length === 11) videoId = input; // raw ID

      if (!videoId) {
        alert("Couldn't find a valid YouTube video ID. Try a full link.");
        return;
      }

      // Hide input, show video area
      inputScreen.style.opacity = '0';
      setTimeout(() => { inputScreen.style.display = 'none'; }, 400);

      videoScreen.style.display = 'flex';

      // Set source with autoplay
      player.src = base + videoId + params;

      // Hide loading text after ~1–2s (iframe usually loads fast enough)
      setTimeout(() => { loading.style.display = 'none'; }, 1800);
    });

    // Optional: allow pressing Enter in input field
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });
  </script>

</body>
</html>
