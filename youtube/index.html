<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> ▶︎ YouTube ▶︎</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
    }
    #input-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      transition: opacity 0.4s ease;
      overflow-y: auto;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    }
    h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
    p.subtitle { font-size: 1.25rem; color: #a1a1aa; margin-bottom: 2.5rem; max-width: 500px; }
    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 700px;
      width: 100%;
      justify-content: center;
    }
    input[type="text"] {
      flex: 1;
      min-width: 300px;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 12px;
      color: white;
      outline: none;
      transition: all 0.2s;
    }
    input[type="text"]:focus {
      border-color: #ff0000;
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.15);
    }
    button {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #cc0000; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button.secondary { background: #333; }
    button.secondary:hover { background: #444; }
    .button-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    #video-screen {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 100vw;
      overflow: hidden;
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    #browse-screen {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: none;
      flex-direction: column;
      z-index: 20;
      height: 100vh;
      overflow-y: auto;
      padding-bottom: 2rem;
    }
    .browse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: #1f1f1f;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      height: 60px;
    }
    .browse-header h2 {
      font-size: 1.5rem;
      color: #ff0000;
      margin: 0;
      user-select: none;
    }
    .back-btn { padding: 0.5rem 1.5rem; font-size: 0.9rem; }
    .channel-section {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      display: none; /* hidden until all loaded */
    }
    .channel-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #ff0000;
      border-bottom: 2px solid #ff0000;
      padding-bottom: 0.3rem;
      user-select: none;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 3 1fr));
      gap: 1rem;
    }
    .video-card {
      background: #1f1f1f;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .video-card:hover { transform: translateY(-3px); border-color: #ff0000; }
    .video-thumb {
      width: 100%;
      padding-bottom: 56.25%;
      position: relative;
      background: #000;
      overflow: hidden;
      flex-shrink: 0;
    }
    .video-thumb img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-info {
      padding: 0.75rem 1rem;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      white-space: normal;
    }
    .loading {
      font-size: 1.5rem;
      color: #888;
      text-align: center;
      padding: 2rem 0;
    }
    .error-msg {
      color: #ff4444;
      padding: 2rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      user-select: none;
    }
    #global-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1.5rem;
    }
    #global-loading-text {
      font-size: 1.5rem;
      color: #888;
      text-align: center;
    }
    /* Red Loading Spinner */
    .red-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 0, 0, 0.2);
      border-top: 4px solid #ff0000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.4rem; }
      .input-group { flex-direction: column; align-items: stretch; }
      input, button { width: 100%; }
      .browse-header { padding: 1rem; height: auto; }
      .browse-header h2 { font-size: 1.2rem; }
      #browse-screen { padding: 0 0 2rem 0; }
      .channel-section { max-width: 100%; margin: 1rem 1rem 2rem; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="input-screen">
    <h1>▶︎ YouTube</h1>
    <p class="subtitle">Paste Your YouTube Link Below or Browse Videos</p>
    <div class="input-group">
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." autofocus />
    </div>
    <div class="button-group" style="margin-top: 1rem;">
      <button id="submit">Watch</button>
      <button id="browse-btn" class="secondary">Browse Videos</button>
    </div>
  </div>

  <div id="video-screen">
    <div class="video-container">
      <iframe id="player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="loading" id="loading">Loading video...</div>
  </div>

  <div id="browse-screen">
    <div class="browse-header">
      <h2>Joe Bart Videos</h2>
      <button class="back-btn secondary" onclick="closeBrowse()">Back</button>
    </div>
    <div id="global-loading">
      <div id="global-loading-text">Loading Videos...</div>
      <div class="red-spinner"></div>
    </div>
    <div id="browse-content"></div>
  </div>

  <script>
    const submitBtn = document.getElementById("submit");
    const browseBtn = document.getElementById("browse-btn");
    const urlInput = document.getElementById("url");
    const inputScreen = document.getElementById("input-screen");
    const videoScreen = document.getElementById("video-screen");
    const browseScreen = document.getElementById("browse-screen");
    const browseContent = document.getElementById("browse-content");
    const globalLoading = document.getElementById("global-loading");
    const player = document.getElementById("player");
    const loading = document.getElementById("loading");

    const proxies = [
      "https://api.allorigins.win/raw?url=",
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://thingproxy.freeboard.io/fetch/",
    ];

    const channels = [
      { id: "joe-bart-gaming", title: "Joe Bart Gaming", url: "https://www.youtube.com/@JoeBartGames/videos" },
      { id: "joe-bart", title: "General Videos", url: "https://www.youtube.com/@JoeBartolozzi/videos" },
      { id: "joe-bart-vods", title: "Vods", url: "https://www.youtube.com/@JoeBartVOD/videos" },
      { id: "joe-bart-philosophy", title: "Philosophy Videos", url: "https://www.youtube.com/@Joe-Bart-Philosophy/videos" },
    ];

    let allChannelVideos = {};
    let channelStates = {};

    submitBtn.addEventListener("click", handleSubmit);
    urlInput.addEventListener("keypress", e => { if (e.key === "Enter") handleSubmit(); });
    browseBtn.addEventListener("click", () => openBrowse());

    function handleSubmit() {
      let input = urlInput.value.trim();
      if (!input) return;
      
      // Check if it's a channel/profile link
      const channelMatch = input.match(/youtube\.com\/(@[^/]+|channel\/[^/]+|c\/[^/]+)/i);
      if (channelMatch) {
        let url = input;
        // Ensure it ends with /videos
        if (!/\/videos/i.test(url)) {
          // Remove any trailing slashes or query params before adding /videos
          url = url.replace(/\/?(\?.*)?$/, '') + "/videos";
        }
        // Force English/US region
        if (!url.includes("gl=") && !url.includes("hl=")) {
          url += (url.includes("?") ? "&" : "?") + "gl=US&hl=en";
        }
        
        // Create a dynamic single channel entry for the pasted URL
        const dynamicChannel = [
          { id: "dynamic-channel", title: "Channel Videos", url: url }
        ];
        
        openBrowse(null, dynamicChannel);
        return;
      }
      
      // Otherwise treat as video
      playVideo(input);
    }

    function playVideo(input) {
      let videoId = input.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/)?.[1] || (input.length === 11 ? input : null);
      if (!videoId) {
        alert("Couldn't find a valid YouTube video ID. Try a full link.");
        return;
      }
      inputScreen.style.opacity = "0";
      setTimeout(() => inputScreen.style.display = "none", 400);
      browseScreen.style.display = "none";
      videoScreen.style.display = "flex";
      player.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1`;
      loading.style.display = "block";
      setTimeout(() => loading.style.display = "none", 1800);
    }

    async function openBrowse(e, customChannels = null) {
      inputScreen.style.display = "none";
      videoScreen.style.display = "none";
      browseScreen.style.display = "flex";
      browseContent.innerHTML = "";
      globalLoading.style.display = "flex";

      allChannelVideos = {};
      channelStates = {};
      
      // Use custom channels if provided (from pasted URL), otherwise use default Joe Bart channels
      const channelsToLoad = customChannels || channels;
      
      // Update header title if custom channel
      const headerTitle = document.querySelector(".browse-header h2");
      if (customChannels) {
        headerTitle.textContent = "Channel Videos";
      } else {
        headerTitle.textContent = "Joe Bart Videos";
      }

      channelsToLoad.forEach(ch => {
        const section = document.createElement("section");
        section.className = "channel-section";
        section.id = `channel-section-${ch.id}`;

        const titleEl = document.createElement("h2");
        titleEl.className = "channel-title";
        titleEl.textContent = ch.title;

        const grid = document.createElement("div");
        grid.className = "video-grid";
        grid.id = `video-grid-${ch.id}`;

        section.append(titleEl, grid);
        browseContent.appendChild(section);

        allChannelVideos[ch.id] = [];
        channelStates[ch.id] = { continuationToken: null, apiKey: null, clientVersion: null, proxy: null, loading: true, error: null };
      });

      await Promise.all(channelsToLoad.map(ch => loadAllChannelVideos(ch)));

      globalLoading.style.display = "none";
      document.querySelectorAll(".channel-section").forEach(sec => sec.style.display = "block");
    }

    async function loadAllChannelVideos(channel) {
      const grid = document.getElementById(`video-grid-${channel.id}`);
      try {
        let initSuccess = false;
        let lastError = null;

        for (const proxy of proxies) {
          try {
            // Add hl=en&gl=US to force English titles
            let fetchUrl = channel.url;
            if (!fetchUrl.includes("hl=")) {
              fetchUrl += (fetchUrl.includes("?") ? "&" : "?") + "hl=en&gl=US";
            }
            
            const res = await fetch(proxy + encodeURIComponent(fetchUrl), { 
              headers: { 
                "Accept": "text/html",
                "Accept-Language": "en-US,en;q=0.9"
              } 
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const html = await res.text();
            if (html.length < 2000) throw new Error("Empty response");

            const apiKey = html.match(/"INNERTUBE_API_KEY":"([^"]+)"/)?.[1];
            const clientVersion = html.match(/"INNERTUBE_CLIENT_VERSION":"([^"]+)"/)?.[1];
            if (!apiKey || !clientVersion) throw new Error("Missing API key/version");

            const videos = parseVideos(html);
            if (videos.length === 0) throw new Error("No videos parsed from initial page");

            const continuationToken = findContinuation(html);

            allChannelVideos[channel.id] = videos;
            channelStates[channel.id] = {
              continuationToken,
              apiKey,
              clientVersion,
              proxy,
              loading: false,
              error: null
            };

            renderChannelVideos(channel);
            initSuccess = true;
            break;
          } catch (e) {
            lastError = e;
          }
        }

        if (!initSuccess) throw lastError || new Error("All proxies failed");

        while (channelStates[channel.id].continuationToken && allChannelVideos[channel.id].length < 120) {
          const ok = await loadMoreVideos(channel);
          if (!ok) break;
          renderChannelVideos(channel);
          await new Promise(r => setTimeout(r, 200));
        }
      } catch (err) {
        grid.innerHTML = `<div class="error-msg">Failed to load videos<br>${err.message}</div>`;
        channelStates[channel.id].error = err.message;
        console.error(channel.title + " error:", err);
      } finally {
        channelStates[channel.id].loading = false;
        renderChannelVideos(channel);
      }
    }

    function findContinuation(html) {
      const m = html.match(/"continuationCommand":\s*{"token":"([^"]+)"}/) ||
                html.match(/"continuation":"([^"]+)"/);
      return m ? m[1] : null;
    }

    function parseVideos(html) {
      const videos = [];
      try {
        const match = html.match(/var ytInitialData = ({.+?});<\/script>/s);
        if (match) {
          const data = JSON.parse(match[1]);
          function recurse(obj) {
            if (!obj || typeof obj !== "object") return;
            if (obj.videoRenderer || obj.gridVideoRenderer) {
              const vr = obj.videoRenderer || obj.gridVideoRenderer;
              if (vr?.videoId) {
                // Prioritize runs[0].text for English titles, avoid accessibilityData which may contain localized text
                let title = "";
                if (vr.title?.runs?.[0]?.text) {
                  title = vr.title.runs[0].text.trim();
                } else if (vr.title?.simpleText) {
                  title = vr.title.simpleText.trim();
                } else {
                  title = "Untitled Video";
                }
                
                const thumbs = vr.thumbnail?.thumbnails || [];
                const thumb = thumbs[thumbs.length - 1]?.url || `https://i.ytimg.com/vi/${vr.videoId}/hqdefault.jpg`;
                videos.push({ id: vr.videoId, title, thumbnail: thumb });
              }
            }
            if (obj.richItemRenderer?.content?.videoRenderer) {
              const vr = obj.richItemRenderer.content.videoRenderer;
              if (vr?.videoId) {
                let title = "";
                if (vr.title?.runs?.[0]?.text) {
                  title = vr.title.runs[0].text.trim();
                } else if (vr.title?.simpleText) {
                  title = vr.title.simpleText.trim();
                } else {
                  title = "Untitled Video";
                }
                
                const thumbs = vr.thumbnail?.thumbnails || [];
                const thumb = thumbs[thumbs.length - 1]?.url || `https://i.ytimg.com/vi/${vr.videoId}/hqdefault.jpg`;
                videos.push({ id: vr.videoId, title, thumbnail: thumb });
              }
            }
            Object.values(obj).forEach(recurse);
          }
          recurse(data);
        }
      } catch (e) {
        console.error("JSON parse failed:", e);
      }

      // Fallback: regex scan if JSON empty or failed
      if (videos.length === 0) {
        const idMatches = [...html.matchAll(/"videoId":"([a-zA-Z0-9_-]{11})"/g)];
        const seen = new Set();
        idMatches.forEach(m => {
          const id = m[1];
          if (seen.has(id)) return;
          seen.add(id);
          videos.push({
            id,
            title: "Video (fallback)",
            thumbnail: `https://i.ytimg.com/vi/${id}/hqdefault.jpg`
          });
        });
      }

      // Dedupe just in case
      const unique = [];
      const seenIds = new Set();
      for (const v of videos) {
        if (!seenIds.has(v.id)) {
          seenIds.add(v.id);
          unique.push(v);
        }
      }
      return unique;
    }

    async function loadMoreVideos(channel) {
      const s = channelStates[channel.id];
      if (!s.continuationToken || !s.apiKey || !s.proxy) return false;
      try {
        const url = `https://www.youtube.com/youtubei/v1/browse?key=${s.apiKey}`;
        const body = {
          context: {
            client: {
              clientName: "WEB",
              clientVersion: s.clientVersion || "2.20250301.01.00",
              hl: "en",
              gl: "US"
            }
          },
          continuation: s.continuationToken
        };
        const res = await fetch(s.proxy + encodeURIComponent(url), {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Accept-Language": "en-US,en;q=0.9"
          },
          body: JSON.stringify(body)
        });
        if (!res.ok) return false;
        const data = await res.json();

        const newVideos = parseContinuationVideos(data);
        if (newVideos.length === 0) {
          s.continuationToken = null;
          return false;
        }

        const seen = new Set(allChannelVideos[channel.id].map(v => v.id));
        allChannelVideos[channel.id].push(...newVideos.filter(v => !seen.has(v.id)));

        s.continuationToken =
          data?.continuationContents?.gridContinuation?.continuations?.[0]?.nextContinuationData?.continuation ||
          data?.onResponseReceivedActions?.[0]?.appendContinuationItemsAction?.continuationItems
            ?.find(i => i.continuationItemRenderer)
            ?.continuationItemRenderer?.continuationEndpoint?.continuationCommand?.token ||
          null;

        return true;
      } catch (e) {
        console.warn("Continuation error:", e);
        return false;
      }
    }

    function parseContinuationVideos(data) {
      const videos = [];
      function recurse(obj) {
        if (!obj || typeof obj !== "object") return;
        const vr = obj.gridVideoRenderer || obj.videoRenderer || obj.richItemRenderer?.content?.videoRenderer;
        if (vr?.videoId) {
          // Prioritize runs[0].text for English titles, avoid accessibilityData
          let title = "";
          if (vr.title?.runs?.[0]?.text) {
            title = vr.title.runs[0].text.trim();
          } else if (vr.title?.simpleText) {
            title = vr.title.simpleText.trim();
          } else {
            title = "Untitled";
          }
          
          const thumbs = vr.thumbnail?.thumbnails || [];
          const thumb = thumbs[thumbs.length - 1]?.url || `https://i.ytimg.com/vi/${vr.videoId}/hqdefault.jpg`;
          videos.push({ id: vr.videoId, title, thumbnail: thumb });
        }
        Object.values(obj).forEach(recurse);
      }
      recurse(data);
      return videos;
    }

    function renderChannelVideos(channel) {
      const grid = document.getElementById(`video-grid-${channel.id}`);
      if (!grid) return;
      grid.innerHTML = "";
      const videos = allChannelVideos[channel.id] || [];
      if (videos.length === 0) {
        grid.innerHTML = `<div class="loading">No videos found</div>`;
        return;
      }
      videos.forEach(v => grid.appendChild(createVideoCard(v)));
    }

    function createVideoCard(video) {
      const card = document.createElement("div");
      card.className = "video-card";
      card.onclick = () => playVideo(video.id);
      card.innerHTML = `
        <div class="video-thumb">
          <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy"
               onerror="this.src='https://i.ytimg.com/vi/${video.id}/mqdefault.jpg'; this.onerror=null;">
        </div>
        <div class="video-info">${escapeHtml(video.title)}</div>
      `;
      return card;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function closeBrowse() {
      browseScreen.style.display = "none";
      inputScreen.style.display = "flex";
      inputScreen.style.opacity = "1";
      player.src = "";
      loading.style.display = "none";
      globalLoading.style.display = "none";
      browseContent.innerHTML = "";
      allChannelVideos = {};
      channelStates = {};
      
      // Reset header title
      const headerTitle = document.querySelector(".browse-header h2");
      headerTitle.textContent = "Joe Bart Videos";
    }
  </script>
</body>
</html>
