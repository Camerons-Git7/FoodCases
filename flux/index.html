<!DOCTYPE html>
<html>
<head>
  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HJ3Y1WQHM3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HJ3Y1WQHM3');
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <link rel="shortcut icon" href="favicon.ico" />
  <title>Flux</title>
  <link rel="stylesheet" href="index.css">

  <style>
    body { margin:0; height:100vh; overflow:hidden; font-family:'Segoe UI',sans-serif; }
    #particles-js { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
    
    .content-area { width:100%; height:100vh; }
    .content-area iframe { width:100%; height:100%; border:none; }

    .bottom-bar {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:rgba(230, 210, 34, 0.9); backdrop-filter:blur(15px);
      border-radius:30px; padding:12px 30px; display:flex; gap:35px;
      align-items:center; box-shadow:0 0 25px rgba(255, 187, 0, 0.5); z-index:9999;
    }
    .bottom-bar button { all:unset; cursor:pointer; }
    .bottom-bar img { width:26px; height:26px; opacity:0.9; transition:0.25s; }
    .bottom-bar button:hover img { opacity:1; transform:scale(1.2); }
  </style>
</head>

<body>
  <div id="particles-js"></div>

  <main class="content-area">
    <iframe src="proxy.html"></iframe>
  </main>

  <div class="bottom-bar">
    <button onclick="location.href='index.html'"><img src="icons/home.svg"></button>
    <button onclick="location.href='games/index.html'"><img src="icons/games.svg"></button>
    <button onclick="location.href='apps/index.html'"><img src="icons/apps.svg"></button>
    <button onclick="location.href='godgames/index.html'"><img src="icons/specials.svg"></button>
    <button onclick="location.href='settings/index.html'"><img src="icons/settings.svg"></button>
  </div>

  <!-- Fixed Stats script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r17/Stats.min.js"></script>
  
  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <script>
    // Particles
    particlesJS("particles-js", {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: "#ffd100" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 6 }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true }
      },
      retina_detect: true
    });

    // Stats
    const stats = new Stats();
    stats.setMode(0);
    stats.domElement.style.position = 'absolute';
    stats.domElement.style.left = '0px';
    stats.domElement.style.top = '0px';
    document.body.appendChild(stats.domElement);

    function update() {
      stats.begin();
      stats.end();
      requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  </script>
</body>
</html>
