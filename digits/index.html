<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digits</title>
    <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico"/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .glowing-text {
            color: #fff;
            text-align: center;
            font-weight: bold;
            line-height: 1.1;
            /* Use viewport width for responsive, large text */
            font-size: 10vw; 
            
            /* Glowing effect */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0f0,
                0 0 30px #0f0,
                0 0 40px #0f0,
                0 0 50px #0f0;
        }
    </style>
</head>
<body>
    <div class="glowing-text">
        66.23.198.252<br>
        66.94.105.229<br>
        167.86.91.171<br>
        0.0.0.0
    </div>
</body>
</html>
