<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seamless Widgets</title>
  <link rel="icon" type="image/x-icon" href="https://math.hws.edu/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0f0;
      --bg: #000;
      --surface: #050505;
      --glow: 0 0 15px rgba(0, 255, 0, 0.5);
      --glow-strong: 0 0 25px var(--accent);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.fade-in { opacity: 1; }
    .title {
      font-size: 4rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: textPulse 2s infinite alternate;
      user-select: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.fade-in .title {
      opacity: 1;
    }
    @keyframes textPulse {
      from { text-shadow: 0 0 10px var(--accent); }
      to { text-shadow: 0 0 20px var(--accent), 0 0 30px #0f0; }
    }
    .main-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1400px;
      height: calc(100vh - 150px);
      gap: 1.5rem;
      opacity: 0;
      transition: opacity 1s ease;
    }
    body.fade-in .main-container {
      opacity: 1;
    }
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 35%;
      min-width: 300px;
    }
    .right-panel {
      width: 65%;
      min-width: 400px;
    }
    .widget-card {
      position: relative;
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: var(--glow);
      padding: 2rem;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
      text-align: center;
    }
    .widget-card.full-height {
      height: 100%;
    }
    .widget-label {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 1rem;
      text-shadow: 0 0 5px var(--accent);
      user-select: none;
    }
    .widget-value {
      font-size: 3.5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      user-select: none;
    }
    .time-seconds {
      font-size: 2rem;
      color: #fff;
      margin-left: 0.5rem;
    }
    .time-ampm {
      font-size: 1.2rem;
      color: var(--accent);
    }
    .weather-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      gap: 1rem;
    }
    .current-temp-section {
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 255, 0, 0.05);
      box-shadow: var(--glow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .current-temp-value {
      font-size: 5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      line-height: 1;
    }
    .current-temp-label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-top: 0.5rem;
    }
    .weather-details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .weather-cube {
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 255, 0, 0.05);
      box-shadow: var(--glow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      min-height: 0;
      overflow: hidden;
    }
    .condition-section {
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: rgba(0, 255, 0, 0.05);
      box-shadow: var(--glow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .cube-label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.5rem;
      user-select: none;
    }
    .cube-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      user-select: none;
      line-height: 1;
    }
    .cube-condition {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-transform: capitalize;
      user-select: none;
      line-height: 1.2;
    }
    .condition-icon {
      font-size: 4rem;
      filter: drop-shadow(0 0 5px var(--accent));
      margin-bottom: 0.5rem;
    }
    .location-tag {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      color: var(--accent);
      opacity: 0.7;
      user-select: none;
    }
    .loading {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .error-text {
      color: #ff4444;
      font-size: 1rem;
    }
    * {
      caret-color: transparent;
    }
    @media (max-width: 900px) {
      .main-container {
        flex-direction: column;
        height: auto;
      }
      .left-panel, .right-panel {
        width: 100%;
        min-width: auto;
      }
      .right-panel {
        height: 600px;
      }
      .weather-details {
        grid-template-columns: repeat(2, 1fr);
      }
      .condition-section {
        flex: none;
      }
      .title { font-size: 2.5rem; }
      .widget-value { font-size: 2.5rem; }
      .time-seconds { font-size: 1.5rem; }
      .time-ampm { font-size: 1rem; }
      .current-temp-value { font-size: 3.5rem; }
      .cube-value { font-size: 1.5rem; }
      .cube-condition { font-size: 1.5rem; }
      .condition-icon { font-size: 3rem; }
      .cube-label { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <h1 class="title">SEAMLESS WIDGETS</h1>

  <div class="main-container">
    <!-- Left Panel: Time and Date -->
    <div class="left-panel">
      <!-- Time Widget -->
      <div class="widget-card">
        <div class="widget-label">⏰ Current Time</div>
        <div class="widget-value" id="timeDisplay">
          <span class="loading">Loading...</span>
        </div>
      </div>

      <!-- Date Widget -->
      <div class="widget-card">
        <div class="widget-label">📅 Today's Date</div>
        <div class="widget-value" id="dateDisplay">
          <span class="loading">Loading...</span>
        </div>
      </div>
    </div>

    <!-- Right Panel: Weather -->
    <div class="right-panel">
      <div class="widget-card full-height">
        <div class="location-tag">📍 Williamston, MI</div>
        <div class="widget-label">🌤️ Weather</div>
        <div class="weather-layout">
          <!-- Current Temp - Full Width Top -->
          <div class="current-temp-section">
            <div class="current-temp-value loading" id="currentTemp">--°F</div>
            <div class="current-temp-label">Current Temperature</div>
          </div>
          
          <!-- Weather Details Grid -->
          <div class="weather-details">
            <div class="weather-cube">
              <div class="cube-label">High Today</div>
              <div class="cube-value loading" id="highTemp">--°</div>
            </div>
            <div class="weather-cube">
              <div class="cube-label">Low Today</div>
              <div class="cube-value loading" id="lowTemp">--°</div>
            </div>
            <div class="weather-cube">
              <div class="cube-label">High Tomorrow</div>
              <div class="cube-value loading" id="tomorrowHigh">--°</div>
            </div>
            <div class="weather-cube">
              <div class="cube-label">Low Tomorrow</div>
              <div class="cube-value loading" id="tomorrowLow">--°</div>
            </div>
          </div>
          
          <!-- Condition - Takes up all remaining space -->
          <div class="condition-section">
            <div class="cube-label">Condition</div>
            <div class="condition-icon loading" id="conditionIcon">⏳</div>
            <div class="cube-condition loading" id="conditionText">--</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Clock emoji lookup table - 24 emojis for each hour and half hour
    const clockEmojis = {
      "0.0": "🕛", "0.30": "🕧",
      "1.0": "🕐", "1.30": "🕜",
      "2.0": "🕑", "2.30": "🕝",
      "3.0": "🕒", "3.30": "🕞",
      "4.0": "🕓", "4.30": "🕟",
      "5.0": "🕔", "5.30": "🕠",
      "6.0": "🕕", "6.30": "🕡",
      "7.0": "🕖", "7.30": "🕢",
      "8.0": "🕗", "8.30": "🕣",
      "9.0": "🕘", "9.30": "🕤",
      "10.0": "🕙", "10.30": "🕥",
      "11.0": "🕚", "11.30": "🕦"
    };

    // Get the closest clock emoji for current time
    function getClockEmoji(date) {
      // Add 15 minutes and round down to closest half hour
      const adjustedTime = new Date(date.getTime() + 15 * 60 * 1000);
      const hours = adjustedTime.getHours() % 12;
      const minutes = adjustedTime.getMinutes() < 30 ? 0 : 30;
      return clockEmojis[`${hours}.${minutes}`];
    }

    // Update the document title with current clock emoji
    function updateTitleEmoji() {
      const emoji = getClockEmoji(new Date());
      document.title = `${emoji} Seamless Widgets ${emoji}`;
    }

    // Time and Date Functions
    function getOrdinalSuffix(day) {
      if (day > 3 && day < 21) return 'th';
      switch (day % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    }

    function formatDate(date) {
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                      'July', 'August', 'September', 'October', 'November', 'December'];
      const month = months[date.getMonth()];
      const day = date.getDate();
      const year = date.getFullYear();
      return `${month} ${day}${getOrdinalSuffix(day)}, ${year}`;
    }

    function formatTime(date) {
      let hours = date.getHours();
      const minutes = date.getMinutes().toString().padStart(2, '0');
      const seconds = date.getSeconds().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      return {
        time: `${hours}:${minutes}`,
        seconds: seconds,
        ampm: ampm
      };
    }

    function updateTime() {
      const now = new Date();
      const formatted = formatTime(now);
      const timeDisplay = document.getElementById('timeDisplay');
      timeDisplay.innerHTML = `${formatted.time}<span class="time-seconds">:${formatted.seconds}</span> <span class="time-ampm">${formatted.ampm}</span>`;
    }

    function updateDate() {
      const now = new Date();
      const dateDisplay = document.getElementById('dateDisplay');
      dateDisplay.textContent = formatDate(now);
    }

    // Weather Functions
    const weatherIcons = {
      'clear': '☀️',
      'sunny': '☀️',
      'mostly clear': '🌤️',
      'mostly sunny': '🌤️',
      'partly cloudy': '⛅',
      'cloudy': '☁️',
      'mostly cloudy': '☁️',
      'overcast': '🌥️',
      'rain': '🌧️',
      'showers': '🌦️',
      'rain showers': '🌦️',
      'thunderstorms': '⛈️',
      'snow': '❄️',
      'snow showers': '🌨️',
      'fog': '🌫️',
      'mist': '🌫️',
      'drizzle': '🌧️',
      'windy': '💨',
      'hail': '🌨️'
    };

    function getWeatherIcon(condition) {
      const lowerCondition = condition.toLowerCase();
      for (const [key, icon] of Object.entries(weatherIcons)) {
        if (lowerCondition.includes(key)) return icon;
      }
      return '🌡️';
    }

    async function fetchWeather() {
      try {
        const lat = 42.6892;
        const lon = -84.2830;
        
        const response = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/Detroit`
        );
        
        if (!response.ok) throw new Error('Weather fetch failed');
        
        const data = await response.json();
        
        const currentTemp = Math.round(data.current.temperature_2m);
        document.getElementById('currentTemp').textContent = `${currentTemp}°F`;
        document.getElementById('currentTemp').classList.remove('loading');
        
        const highTemp = Math.round(data.daily.temperature_2m_max[0]);
        const lowTemp = Math.round(data.daily.temperature_2m_min[0]);
        document.getElementById('highTemp').textContent = `${highTemp}°F`;
        document.getElementById('highTemp').classList.remove('loading');
        document.getElementById('lowTemp').textContent = `${lowTemp}°F`;
        document.getElementById('lowTemp').classList.remove('loading');
        
        const tomorrowHigh = Math.round(data.daily.temperature_2m_max[1]);
        const tomorrowLow = Math.round(data.daily.temperature_2m_min[1]);
        document.getElementById('tomorrowHigh').textContent = `${tomorrowHigh}°F`;
        document.getElementById('tomorrowHigh').classList.remove('loading');
        document.getElementById('tomorrowLow').textContent = `${tomorrowLow}°F`;
        document.getElementById('tomorrowLow').classList.remove('loading');
        
        const wmoCode = data.current.weather_code;
        const condition = getWMOWeatherDescription(wmoCode);
        const icon = getWeatherIcon(condition);
        
        document.getElementById('conditionIcon').textContent = icon;
        document.getElementById('conditionIcon').classList.remove('loading');
        document.getElementById('conditionText').textContent = condition;
        document.getElementById('conditionText').classList.remove('loading');
        
        return true;
      } catch (error) {
        console.error('Weather fetch error:', error);
        document.getElementById('currentTemp').textContent = '--°F';
        document.getElementById('highTemp').textContent = '--°F';
        document.getElementById('lowTemp').textContent = '--°F';
        document.getElementById('tomorrowHigh').textContent = '--°F';
        document.getElementById('tomorrowLow').textContent = '--°F';
        document.getElementById('conditionIcon').textContent = '⚠️';
        document.getElementById('conditionText').textContent = 'Error';
        document.getElementById('conditionText').classList.add('error-text');
        return true;
      }
    }

    function getWMOWeatherDescription(code) {
      const weatherCodes = {
        0: 'Clear sky',
        1: 'Mostly clear',
        2: 'Partly cloudy',
        3: 'Overcast',
        45: 'Foggy',
        48: 'Depositing rime fog',
        51: 'Light drizzle',
        53: 'Moderate drizzle',
        55: 'Dense drizzle',
        56: 'Light freezing drizzle',
        57: 'Dense freezing drizzle',
        61: 'Slight rain',
        63: 'Moderate rain',
        65: 'Heavy rain',
        66: 'Light freezing rain',
        67: 'Heavy freezing rain',
        71: 'Slight snow',
        73: 'Moderate snow',
        75: 'Heavy snow',
        77: 'Snow grains',
        80: 'Slight rain showers',
        81: 'Moderate rain showers',
        82: 'Violent rain showers',
        85: 'Slight snow showers',
        86: 'Heavy snow showers',
        95: 'Thunderstorms',
        96: 'Thunderstorms with hail',
        99: 'Heavy thunderstorms with hail'
      };
      return weatherCodes[code] || 'Unknown';
    }

    // Initialize - Load data first, then fade in
    window.onload = async () => {
      // Update time, date, and title emoji immediately (local data)
      updateTime();
      updateDate();
      updateTitleEmoji();
      
      // Wait for weather data to load
      await fetchWeather();
      
      // Now fade in everything
      document.body.classList.add('fade-in');
      
      // Start intervals after fade
      setInterval(updateTime, 1000);
      setInterval(updateTitleEmoji, 1000); // Update title emoji every second
      setInterval(fetchWeather, 30 * 60 * 1000);
    };
  </script>
</body>
</html>
